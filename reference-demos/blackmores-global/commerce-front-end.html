    --ink:#16201f; --muted:#6a7472; --bg:#f4f7f7; --card:#ffffff; --line:#e6ecec;
    --display:Georgia,'Times New Roman','Songti SC','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}

  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:26px;max-width:1180px;margin:0 auto;padding:14px 22px}
  .brand{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.02em;color:var(--ink)}
  .brand sup{font-size:10px;color:var(--brand)}
  .tabs{display:flex;gap:22px}
  .tabs a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 0;cursor:pointer;
    border-bottom:2px solid transparent;transition:.2s}
  .tabs a.on{color:var(--brand);border-color:var(--brand)}
  .tabs a:hover{color:var(--ink)}
  .navsp{flex:1}
  .ntool{display:flex;align-items:center;gap:14px}
  .chip-en{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 9px;
    font-size:12.5px;font-weight:600;cursor:pointer;position:relative}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--bg);cursor:pointer;position:relative}
  .badge{position:absolute;top:-4px;right:-4px;background:#e0564a;color:#fff;font-size:10px;font-weight:700;
    width:16px;height:16px;border-radius:50%;display:grid;place-items:center}
  .me{display:flex;align-items:center;gap:9px;cursor:pointer}
  .ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f0a890);
    display:grid;place-items:center;font-size:17px}
  .me b{font-size:13px;display:block} .me small{font-size:11px;color:var(--muted)}
  .menu{position:absolute;top:42px;right:0;background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:6px;min-width:150px;box-shadow:0 12px 30px rgba(0,0,0,.12);display:none;z-index:50}
  .menu.open{display:block} .menu button{display:flex;width:100%;gap:8px;align-items:center;border:0;background:0;
    font:inherit;font-size:13px;font-weight:500;padding:8px 9px;border-radius:7px;cursor:pointer;text-align:left;color:var(--ink)}
  .menu button:hover{background:var(--soft)} .dot{width:11px;height:11px;border-radius:50%}

  /* hero */
  .hero{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;position:relative;overflow:hidden}
  .hero .wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:30px;padding:54px 22px 92px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
    border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;margin-bottom:20px}
  .hero h1{font-family:var(--display);font-weight:700;font-size:clamp(34px,5.2vw,56px);line-height:1.04;letter-spacing:-.01em}
  .hero p{margin:18px 0 26px;font-size:15.5px;max-width:46ch;color:rgba(255,255,255,.9)}
  .cta{display:flex;gap:13px;flex-wrap:wrap}
  .btn{border:0;font:inherit;font-size:14px;font-weight:700;padding:14px 22px;border-radius:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;transition:.2s}
  .btn.w{background:#fff;color:var(--brand)} .btn.w:hover{transform:translateY(-2px)}
  .btn.o{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.4)} .btn.o:hover{background:rgba(255,255,255,.18)}
  .cards{position:relative;height:300px}
  .pcard{position:absolute;background:#fff;color:var(--ink);border-radius:18px;padding:18px;width:210px;
    box-shadow:0 18px 44px rgba(0,0,0,.18)}
  .pcard .em{font-size:30px} .pcard .tg{display:inline-block;background:var(--soft);color:var(--brand);font-size:9.5px;
    font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:6px;margin:8px 0 6px}
  .pcard h4{font-size:15px;font-family:var(--display)} .pcard .ds{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .pcard .pr{font-size:20px;font-weight:800;color:var(--brand);margin-top:9px} .pcard .pr span{font-size:11px;font-weight:500;color:var(--muted)}
  .c1{top:0;right:30px;transform:rotate(3deg);z-index:3}
  .c2{top:40px;right:0;transform:rotate(-5deg);z-index:1;opacity:.96}
  .c3{top:150px;right:54px;transform:rotate(-2deg);z-index:2}
  .wave{position:absolute;bottom:-1px;left:0;width:100%;line-height:0}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin:-40px auto 0;position:relative;z-index:5}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;gap:13px;align-items:center;
    box-shadow:0 8px 22px rgba(0,0,0,.04)}

  .stat b{font-size:20px;font-family:var(--display)} .stat small{font-size:11.5px;color:var(--muted);display:block}

  /* sections */
  section{padding:40px 0}
  .shead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .shead h2{font-family:var(--display);font-size:25px;font-weight:700} .shead a{color:var(--brand);font-size:13px;font-weight:700;cursor:pointer}
  .qa{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .qac{background:linear-gradient(150deg,var(--brand),var(--brand-d));color:#fff;border-radius:18px;padding:22px;cursor:pointer;
    position:relative;overflow:hidden;transition:.22s}
  .qac:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.16)}
  .qac .em{font-size:30px} .qac h3{font-family:var(--display);font-size:20px;margin:14px 0 8px}
  .qac p{font-size:13px;color:rgba(255,255,255,.88);line-height:1.5} .qac .go{margin-top:16px;font-size:13px;font-weight:700}
  .qac .arr{position:absolute;right:18px;bottom:18px;width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:17px}
  .qac::after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06);right:-40px;top:-40px}

  .grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:6px}
  .prod .em{font-size:26px} .prod h4{font-family:var(--display);font-size:16px} .prod .ds{font-size:12px;color:var(--muted)}
  .prod .pr{font-weight:800;color:var(--brand);font-size:17px;margin-top:2px}
  .add{margin-top:8px;border:1px solid var(--brand);background:var(--soft);color:var(--brand);font:inherit;font-weight:700;
    font-size:12.5px;padding:8px;border-radius:9px;cursor:pointer} .add:hover{background:var(--brand);color:#fff}

  /* bundles */
  .bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .bcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:7px;position:relative}
  .bcard .em{font-size:26px} .bcard h4{font-family:var(--display);font-size:16px}
  .bcard .save{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;border-radius:7px;padding:3px 8px}
  .bchips{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 4px}
  .bchip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:var(--bg);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--muted)}

  .bprice .now{font-weight:800;color:var(--brand);font-size:19px} .bprice .was{font-size:12.5px;color:var(--muted);text-decoration:line-through}
  .bfeat{grid-column:1/-1;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border:0;border-radius:18px;padding:22px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;position:relative;overflow:hidden}

  .bfeat h3{font-family:var(--display);font-size:23px;margin-bottom:7px} .bfeat .bfd{font-size:13px;color:rgba(255,255,255,.9);line-height:1.5}

  .bfeat .addf{margin-top:10px;border:0;background:#fff;color:var(--brand);font:inherit;font-weight:800;font-size:13.5px;padding:11px 20px;border-radius:11px;cursor:pointer}
  .bfeat .addf:hover{transform:translateY(-2px)} .bfeat::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);right:-50px;bottom:-60px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
  .field{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font:inherit;font-size:14px;margin-top:8px;resize:vertical}
  .pchips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  .pc{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
  .pc.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
  .kc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .kc b{font-size:28px;font-family:var(--display);color:var(--brand)} .kc small{display:block;font-size:12px;color:var(--muted);margin-top:3px}
  .bars{display:flex;align-items:flex-end;gap:12px;height:160px;padding:14px;background:var(--card);border:1px solid var(--line);border-radius:14px}
  .bar{flex:1;background:linear-gradient(var(--brand),var(--soft));border-radius:7px 7px 0 0;position:relative;transition:height .6s ease}
  .bar span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}
  .rows .row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}

  .ov{position:fixed;inset:0;background:rgba(15,25,24,.45);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;

  .toast.show{transform:translateX(-50%);opacity:1}
  .fab{position:fixed;right:22px;bottom:22px;width:54px;height:54px;border-radius:50%;background:var(--brand);color:#fff;

  @media(max-width:820px){.hero .wrap{grid-template-columns:1fr}.cards{display:none}.stats{grid-template-columns:repeat(2,1fr)}

</style>
</head>

  $$('[data-add]').forEach(btn=>btn.onclick=()=>{state.cart++;$('#cartv').textContent='🛒 '+state.cart;toast('🛒 '+b.products[btn.dataset.add].h);});
  wireBundles();
}

  $('#main').innerHTML=`<div class="wrap"><section><div class="shead"><h2>${d.mar}</h2></div>
    <div class="panel"><b style="font-family:var(--display);font-size:17px">🎨 ${d.campT}</b>
    <textarea class="field" id="cd" placeholder="${d.desc}…">Everyday wellness for the whole family — Odourless Fish Oil, Glucosamine 1500, Probiotics Daily Health, Vitamin C 1000, Multivitamin, Lutein Vision, ${M().langs}</textarea>

    <div id="genout"></div></div></section></div>`;
  $$('.pc').forEach(c=>c.onclick=()=>c.classList.toggle('on'));

    <span style="color:var(--brand);font-size:12px">#Blackmores #FishOil #Glucosamine #Probiotics #Lutein #${M().partner.replace(/\s/g,'')}</span>
    <div style="margin-top:10px;color:var(--muted);font-size:12px">🖼️ ${d.genned}</div></div>`;};
}

// menus
function buildMenu(menuEl,items,onPick){menuEl.innerHTML='';items.forEach(it=>{const b=document.createElement('button');
  b.innerHTML=it.html;b.onclick=e=>{e.stopPropagation();onPick(it.key);menuEl.classList.remove('open');};menuEl.appendChild(b);});}
$('#meChip').onclick=e=>{e.stopPropagation();$('#mktMenu').classList.toggle('open');};
document.addEventListener('click',()=>$$('.menu').forEach(m=>m.classList.remove('open')));
const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=document.querySelector('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();applyText();render();};box.appendChild(b);});}
renderLangs();
buildMenu($('#mktMenu'),Object.keys(MARKETS).map(k=>({key:k,html:`🌐 ${k} · ${MARKETS[k].partner}`})),
  k=>{state.market=k;state.lang=MARKETS[k].defLang;renderLangs();applyText();render();});

// fab = brand switch (the white-label wow)
$('#fab').onclick=()=>{const keys=Object.keys(BRANDS);const i=keys.indexOf(state.brand);
  state.brand=keys[(i+1)%keys.length];applyBrand();render();toast('🎨 '+B().name);};

$('#tabs').addEventListener('click',e=>{const a=e.target.closest('a');if(!a)return;state.tab=a.dataset.tab;render();});

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_m=_p.get("market"),_l=_p.get("lang");if(_b&&typeof BRANDS!=="undefined"&&BRANDS[_b])state.brand=_b;if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(["ANZ","CN","SEA","JP"].indexOf(_m)>=0)state.market=_m;else if(!CURRENCY[state.market])state.market="ANZ";}catch(e){}
// inbound market sync from the studio: {t:"es",market}
window.addEventListener("message",function(e){try{var m=e.data;if(m&&m.t==="es"&&["ANZ","CN","SEA","JP"].indexOf(m.market)>=0&&m.market!==state.market){state.market=m.market;applyText();render();}}catch(_){}});
applyBrand();applyText();render();
(function(){var _l="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"")+"|"+(state.market||"");if(c!==_l){_l=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null,market:state.market||null},"*");}}catch(e){}},400);})();
</script>
