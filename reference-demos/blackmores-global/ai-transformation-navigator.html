<style>

  .hz{display:flex;gap:16px;align-items:flex-start;padding:18px 20px}.hz .hnum{flex-shrink:0;width:54px;text-align:center}.hz .hn{font-family:var(--display);font-size:30px;font-weight:500;color:var(--brand);line-height:1}.hz .hw{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px}.hz h3{font-family:var(--display);font-weight:500;font-size:18px;margin-bottom:5px}.hz .hb{font-size:13.5px;color:var(--muted);line-height:1.55}
  .closing{text-align:center;font-family:var(--display);font-weight:300;font-size:clamp(20px,3.4vw,30px);line-height:1.3;margin:46px auto 8px;max-width:28ch}.closing b{color:var(--brand);font-weight:500}.src{text-align:center;font-size:11px;color:var(--muted);margin-top:14px}
  .gov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}.gov-grid.two{grid-template-columns:repeat(2,1fr)}@media(max-width:760px){.gov-grid,.gov-grid.two{grid-template-columns:1fr}}
  .gov-card{padding:18px;box-shadow:0 10px 24px rgba(11,19,32,.04)}.gov-card.accent{border-color:rgba(0,155,164,.35);background:linear-gradient(180deg,#fff,var(--soft))}.gov-card h3{font-family:var(--display);font-size:21px;line-height:1.15;margin-bottom:10px;font-weight:600}.gov-card h4{font-size:15px;line-height:1.25;margin-bottom:8px}.gov-card p{font-size:13.5px;color:var(--muted);line-height:1.62}.gov-card ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:8px}.gov-card li{font-size:13.5px;color:var(--ink);line-height:1.45;padding-left:18px;position:relative}.gov-card li:before{content:"";position:absolute;left:0;top:.58em;width:6px;height:6px;border-radius:50%;background:var(--brand)}
  .gov-stages{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:24px;position:relative}.gov-stages:before{content:"";position:absolute;left:4%;right:4%;top:30px;height:2px;background:var(--brand);opacity:.35}.gov-stage{position:relative;padding:54px 12px 14px;min-height:210px}.gov-stage .num{position:absolute;top:10px;left:12px;width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:900}.gov-stage h4{font-size:14px;line-height:1.25;margin-bottom:7px}.gov-stage p{font-size:12.5px;line-height:1.5;color:var(--muted)}@media(max-width:860px){.gov-stages{grid-template-columns:1fr}.gov-stages:before{display:none}.gov-stage{min-height:0}}
  .gov-table-wrap{margin-top:22px;overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table.gov-table{width:100%;min-width:980px;border-collapse:collapse;font-size:12.5px}.gov-table th{background:var(--black);color:#fff;text-align:left;padding:12px 13px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;vertical-align:top}.gov-table td{padding:12px 13px;border-top:1px solid var(--line);vertical-align:top;line-height:1.45}.gov-table tr:nth-child(even) td{background:#fbfcfd}.gov-table .component{font-weight:800;color:var(--brand-d);min-width:170px}.gov-mini-list{display:grid;gap:4px}
  .gov-outcomes{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:24px}.gov-outcome{padding:16px 14px;min-height:168px}.gov-outcome:before{content:attr(data-n);display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--soft);color:var(--brand);font-weight:900;margin-bottom:12px}.gov-outcome h4{font-size:14px;line-height:1.25;margin-bottom:8px}.gov-outcome p{font-size:12.5px;color:var(--muted);line-height:1.52}@media(max-width:860px){.gov-outcomes{grid-template-columns:1fr 1fr}}@media(max-width:560px){.gov-outcomes{grid-template-columns:1fr}}
  .gov-journey{margin-top:28px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:20px}.gov-journey-head{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.gov-phase{min-height:170px;padding:16px;background:#fbfcfd}.gov-phase .label{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}.gov-phase h3{font-family:var(--display);font-size:23px;line-height:1.15;margin-bottom:8px}.gov-phase p{font-size:13px;color:var(--muted);line-height:1.5}.gov-phase ul{margin-top:12px;display:grid;gap:6px;list-style:none}.gov-phase li{font-size:12.5px;color:var(--ink);padding-left:14px;position:relative;line-height:1.35}.gov-phase li:before{content:"";position:absolute;left:0;top:.5em;width:5px;height:5px;background:var(--brand);border-radius:50%}@media(max-width:760px){.gov-journey-head{grid-template-columns:1fr}}

<header><div class="nav"><div class="brand" id="brandName">Blackmores<sup>®</sup></div><div class="sub" id="sub">AI Transformation Navigator</div><div class="sp"></div><div class="langs" id="langs"></div></div></header>
<div class="wrap" id="main"></div>
<script>
const DL={geo:['geo.html','GEO'],aigc:['aigc.html','AIGC Studio'],social:['social-hub.html','Social Hub'],voc:['voc.html','VOC'],agentic:['agentic-commerce.html','Agentic Commerce'],merch:['merchandising.html','Shelf / Retail Execution'],compliance:['compliance-hub.html','Compliance Hub'],chat:['conversational.html','Conversational Service'],flywheel:['wechat-miniprogram.html','WeChat / Mini-Program'],health:['health.html','Health Twin'],loyalty:['loyalty.html','Loyalty'],commerce:['order-management.html','Order Management'],data:['data-driven-customer-experience.html','Data-Driven Operation'],kg:['knowledge-graph.html','Knowledge Graph'],bridge:['cross-entity-bridge.html','Consent Bridge'],training:['partner-training.html','Partner Training AI'],trading:['trading-hub.html','Trading Hub']};
const T={
sub:{en:'AI Transformation Navigator',zh:'AI 转型导览'},eye:{en:'AI TRANSFORMATION NAVIGATOR',zh:'AI TRANSFORMATION NAVIGATOR'},
h1:{en:'AI is changing the rules.<br><em>How Blackmores responds.</em>',zh:'AI 正在改写规则。<br><em>Blackmores 如何应对。</em>'},
lead:{en:'The systems and channels already exist. The real question is how to transform on top of them: platform commerce, pharmacy retail, distributor enablement, compliant health content and the long-term direct consumer relationship. This navigator walks through what AI changes for Blackmores and how to respond responsibly.',zh:'系统和渠道其实已经存在。真正的问题是如何在其上转型：平台电商、药房零售、分销商赋能、合规健康内容，以及长期的消费者直接关系。本导览拆解 AI 给 Blackmores 带来的变化，并说明如何负责任地应对。'},
scroll:{en:'Scroll to begin',zh:'向下滚动开始'},s1eye:{en:'01 · The New Reality',zh:'01 · 新现实'},s1h:{en:'AI becomes the new discovery, advice and service layer',zh:'AI 成为新的发现、建议与服务入口'},
s1b:{en:'Consumers no longer only search shelves or platform categories. They ask AI which supplement fits immunity, sleep, pregnancy, energy or heart-health goals. Pharmacists, distributors and marketplace operators also expect answers instantly: what can we claim, what should we stock, what content is approved, what should we do next?',zh:'消费者不再只是搜索货架或平台类目。他们会问 AI：免疫、睡眠、孕期、能量、心血管目标适合什么补充剂。药房店员、分销商和平台运营也期待即时答案：能宣称什么、该补什么货、哪些内容已批准、下一步该做什么。'},
baBefore:{en:'Before',zh:'过去'},baAfter:{en:'After',zh:'现在'},onepick:{en:'One governed recommendation, grounded in product facts and market rules',zh:'一个受治理的推荐，基于产品事实与市场规则'},s1punch:{en:'The answer is not just “better AI”. It is a governed, AI-readable Blackmores operating model.',zh:'答案不只是“更好的 AI”，而是一个受治理、AI 可读的 Blackmores 运营模型。'},
s2eye:{en:'02 · Four shifts',zh:'02 · 四个转变'},s2h:{en:'Four shifts Blackmores has to make',zh:'Blackmores 必须完成的四个转变'},
shifts:[
{sn:{en:'Shift 1 · Discovery',zh:'转变 1 · 发现'},h:{en:'From platform search to AI-mediated recommendation',zh:'从平台搜索到 AI 中介推荐'},chg:{en:'Product facts, claims and availability have to be structured so AI can recommend Blackmores accurately.',zh:'产品事实、宣称与可得性必须结构化，AI 才能准确推荐 Blackmores。'},detail:{en:'Example: a consumer asks “what supplement supports immunity during a busy season?” The old path depends on platform ranking and ad spend. The new path depends on whether AI can read approved claims, ingredients, dosage, market rules, reviews and product availability. GEO and the knowledge graph become the new shelf position.',zh:'例：消费者问“忙碌季节吃什么支持免疫？”过去依赖平台排名和广告预算；现在取决于 AI 是否能读取批准宣称、成分、剂量、市场规则、评论和库存。GEO 与知识图谱成为新的货架位。'},resp:{en:'Respond: build structured product truth, GEO-ready content and a governed claim knowledge graph.',zh:'应对：建设结构化产品事实、GEO 就绪内容与受治理的宣称知识图谱。'},keys:{en:['AI-recommendable','Claim grounded','Content discoverable'],zh:['可被 AI 推荐','宣称有依据','内容可被发现']},demos:['geo','kg','compliance']},
{sn:{en:'Shift 2 · Content',zh:'转变 2 · 内容'},h:{en:'From hand-made local content to AI-assisted, compliant content operations',zh:'从手工本地内容到 AI 辅助的合规内容运营'},chg:{en:'Content speed rises, but every claim must still respect supplement regulations and local platform rules.',zh:'内容速度提升，但每条宣称仍必须符合保健品法规与本地平台规则。'},detail:{en:'Example: a Tmall, WeChat and pharmacy campaign for Bio C or Fish Oil. The old way creates assets, then reviews claims late. The new way generates PDP lines, social posts, shelf cards and staff scripts from approved facts, with compliance checking before release. People move from production to editing, approving and governing.',zh:'例：Bio C 或 Fish Oil 的天猫、微信和药房活动。过去先做素材，最后才审宣称；现在从批准事实生成 PDP 文案、社媒帖子、货架卡和店员话术，并在发布前完成合规检查。人的工作从制作转向编辑、审批与治理。'},resp:{en:'Respond: connect AIGC, content workflow and compliance review to the same claim foundation.',zh:'应对：把 AIGC、内容工作流和合规审核连接到同一套宣称底座。'},keys:{en:['Days → minutes','Review before launch','Approved content reuse'],zh:['天→分钟','发布前审核','批准内容复用']},demos:['aigc','compliance','social']},
{sn:{en:'Shift 3 · Interface',zh:'转变 3 · 界面'},h:{en:'The center of gravity shifts to conversation and agentic action',zh:'重心移向对话与 Agent 行动'},chg:{en:'Consumers, staff and partners expect to ask one question and get the next action, not navigate multiple systems.',zh:'消费者、店员和伙伴期待问一句就得到下一步动作，而不是操作多个系统。'},detail:{en:'Example: a consumer says “I usually buy Fish Oil, remind me when to reorder.” A store associate asks “what can I safely say about immune support?” A distributor asks “which SKUs are below safety stock?” The agent reads consent, product facts, stock, market rules and channel context, then answers or creates the right task.',zh:'例：消费者说“我常买鱼油，到复购时提醒我”；店员问“免疫支持能安全地怎么说？”；分销商问“哪些 SKU 低于安全库存？”Agent 读取授权、产品事实、库存、市场规则和渠道上下文，然后回答或创建任务。'},resp:{en:'Respond: design conversational journeys that hide backend complexity while preserving approvals and audit trails.',zh:'应对：设计对话式旅程，把后端复杂性隐藏起来，同时保留审批和审计痕迹。'},keys:{en:['One sentence','One ID','Chat = interface'],zh:['一句话','一个 ID','对话=界面']},demos:['agentic','chat','flywheel']},
{sn:{en:'Shift 4 · Operations',zh:'转变 4 · 运营'},h:{en:'From periodic reporting to continuous retail and channel intelligence',zh:'从周期报表到连续的零售与渠道智能'},chg:{en:'Sell-through, stock, content health, VOC and compliance signals should trigger actions as they happen.',zh:'Sell-through、库存、内容健康、VOC 和合规信号应在发生时触发行动。'},detail:{en:'Example: a pharmacy chain shows rising Bio C demand, a marketplace PDP has unapproved wording, and reviews show confusion about dosage. Instead of waiting for a monthly meeting, AI recommends replenishment, flags the PDP, pushes a corrected answer to service and updates the staff script.',zh:'例：某药房连锁 Bio C 需求上升，平台 PDP 出现未批准表达，评论里出现剂量困惑。无需等月会，AI 会推荐补货、标记 PDP、向客服推送修正答案并更新店员话术。'},resp:{en:'Respond: let AI push next actions into commerce, channel, service and compliance workflows.',zh:'应对：让 AI 把下一步动作推入电商、渠道、客服与合规工作流。'},keys:{en:['Demand sensing','Next action','Closed loop'],zh:['需求感知','下一步行动','闭环']},demos:['trading','merch','voc']}
],
s3eye:{en:'03 · How to respond',zh:'03 · 如何应对'},s3h:{en:'One AI-readable foundation, applications across the Blackmores operating model',zh:'一个 AI 可读底座，铺到 Blackmores 运营全域'},foundT:{en:'The foundation',zh:'底座'},foundH:{en:'Every responsible AI future runs on knowledge AI can read.',zh:'所有负责任 AI 的未来，都跑在 AI 能读懂的知识之上。'},foundB:{en:'Unify product, claim, consumer, channel, sell-through, service and content data; make it AI-readable with RAG and a knowledge graph; protect rights, quality and compliance with consent, governance and market-specific rules.',zh:'统一产品、宣称、消费者、渠道、sell-through、服务与内容数据；用 RAG 和知识图谱变成 AI 可读资产；用授权、治理和分市场规则保护权利、质量与合规。'},foundChips:{en:['CDP','RAG','Knowledge graph','Consent','Governance'],zh:['CDP','RAG','知识图谱','授权','治理']},domLab:{en:'Applications across the Blackmores enterprise',zh:'铺到 Blackmores 企业全域'},
domains:[
{ic:'📣',h:{en:'Consumer Growth',zh:'消费者增长'},d:{en:'Be recommended by AI, generate approved content, measure campaigns and listen to VOC.',zh:'被 AI 推荐、生成批准内容、衡量活动并倾听 VOC。'},demos:['geo','aigc','social','voc']},
{ic:'🛒',h:{en:'Platform Commerce',zh:'平台电商'},d:{en:'Run marketplace content, offers, orders and stock with governed product truth.',zh:'用受治理的产品事实运营平台内容、优惠、订单与库存。'},demos:['commerce','compliance','data']},
{ic:'🤝',h:{en:'Retail & Channel Operations',zh:'零售与渠道运营'},d:{en:'Equip pharmacies, distributors and field teams with replenishment, shelf execution and staff scripts.',zh:'用补货、货架执行和店员话术赋能药房、分销商与一线团队。'},demos:['trading','merch','training']},
{ic:'🔁',h:{en:'Membership & Health Engagement',zh:'会员与健康互动'},d:{en:'Turn channel shoppers into consented members, then orchestrate health companion, loyalty and repurchase.',zh:'把渠道购物者转成授权会员，再编排健康陪伴、会员与复购。'},demos:['bridge','health','loyalty','chat']},
{ic:'🗄️',h:{en:'Trust, Compliance & Data Foundation',zh:'信任、合规与数据底座'},d:{en:'The AI-readable backbone: consent, claim governance, knowledge graph, CDP, audit and Responsible AI controls.',zh:'AI 可读底座：授权、宣称治理、知识图谱、CDP、审计与负责任 AI 控制。'},demos:['kg','compliance','data','bridge']}
