<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance Hub · Blackmores · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --neg:#c0563f; --warn:#b5731a; --black:#0b1320;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  button{font-family:inherit;cursor:pointer}
  textarea,input{font-family:inherit}
  header{background:var(--black);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto;padding:14px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px;color:#fff;letter-spacing:.02em}
  .sub{font-size:11px;color:#9fb4c8;border-left:1px solid #2a3647;padding-left:12px;letter-spacing:.04em}
  .sp{flex:1}
  .chip{display:flex;align-items:center;gap:5px;border:1px solid #2a3647;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;position:relative;color:#dce6f0}
  .menu{position:absolute;top:40px;right:0;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:6px;min-width:120px;box-shadow:0 12px 30px rgba(0,0,0,.18);display:none;z-index:50}
  .menu.open{display:block}.menu button{display:block;width:100%;border:0;background:0;font:inherit;font-size:13px;padding:8px 9px;border-radius:7px;cursor:pointer;text-align:left;color:var(--ink)}.menu button:hover{background:var(--soft)}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.06);border:1px solid #2a3647;border-radius:9px;padding:3px}
  .langs button{border:0;background:0;font:inherit;font-size:12px;font-weight:700;color:#9fb4c8;min-width:30px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.15s}
  .langs button.on{background:#fff;color:var(--brand-d)}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 70px}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);font-weight:700}
  h1.h{font-family:var(--display);font-weight:400;font-size:clamp(22px,4.8vw,30px);margin:9px 0 5px;line-height:1.18}
  .lead{color:var(--muted);font-size:14px;max-width:60ch}
  .cov{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
  .lawchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:700;color:var(--ink)}
  .lawdot{width:8px;height:8px;border-radius:50%}

  /* mode tabs */
  .modetabs{display:flex;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:5px;margin-top:18px}
  .modetabs button{flex:1;border:0;background:0;font:inherit;font-size:13.5px;font-weight:700;color:var(--muted);padding:11px 8px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .modetabs button.on{background:var(--card);color:var(--brand-d);box-shadow:0 1px 4px rgba(0,0,0,.1)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:16px}
  .ptitle{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:8px}

  .types{display:flex;gap:8px;flex-wrap:wrap}
  .typ{flex:1;min-width:108px;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px;cursor:pointer;transition:.15s}
  .typ.on{border-color:var(--brand);background:var(--soft)}
  .typ .tn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
  .typ .tm{font-size:11px;color:var(--muted);margin-top:3px}

  .scorewrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .ring{--p:0;width:96px;height:96px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--rc,var(--neg)) calc(var(--p)*1%),#eef2f6 0);display:grid;place-items:center;transition:.5s}
  .ring .inner{width:74px;height:74px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}
  .ring .sv{font-family:var(--display);font-size:30px;font-weight:500;line-height:1}
  .ring .sl{font-size:9.5px;color:var(--muted);letter-spacing:.08em}
  .scoremeta{flex:1;min-width:200px}
  .verdict{font-family:var(--display);font-size:18px;font-weight:500;line-height:1.25}
  .verdict.bad{color:var(--neg)}.verdict.ok{color:var(--accent)}.verdict.mid{color:var(--warn)}
  .counts{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  .cnt{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:8px}
  .cnt.hi{background:#fdecea;color:var(--neg)}.cnt.mi{background:#fdf2e2;color:var(--warn)}.cnt.lo{background:#eef2f6;color:var(--muted)}
  .cnt.ok{background:#eafaf0;color:var(--accent)}

  .copybox{font-size:14.5px;line-height:2;color:var(--ink);background:var(--bg);border-radius:12px;padding:15px;border:1px solid var(--line);white-space:pre-wrap}
  .copybox mark{background:color-mix(in srgb,var(--neg) 14%,#fff);color:#8f2f22;border-bottom:2px solid var(--neg);border-radius:3px;padding:0 2px;cursor:pointer;transition:.15s}
  .copybox mark.mid{background:color-mix(in srgb,var(--warn) 16%,#fff);color:#8a5710;border-bottom-color:var(--warn)}
  .copybox mark.hl{background:color-mix(in srgb,var(--neg) 30%,#fff)}
  .copybox mark.mid.hl{background:color-mix(in srgb,var(--warn) 32%,#fff)}
  .copybox ins{background:color-mix(in srgb,var(--accent) 15%,#fff);color:#077a3c;text-decoration:none;border-radius:3px;padding:0 2px}

  .ta{width:100%;min-height:128px;border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;line-height:1.7;color:var(--ink);background:var(--bg);resize:vertical}
  .ta:focus{outline:0;border-color:var(--brand)}
  .frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:11px}
  .ghostbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-weight:600;font-size:12.5px;padding:9px 13px;border-radius:9px}
  .ghostbtn:hover{border-color:var(--brand);color:var(--brand-d)}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;color:var(--ink);background:var(--bg)}
  .inp:focus{outline:0;border-color:var(--brand)}

  .flaghead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 0 9px}
  .flaghead .ft{font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--ink)}
  .applyall{border:0;background:var(--ink);color:#fff;font:inherit;font-weight:700;font-size:12px;padding:8px 13px;border-radius:9px}
  .applyall:hover{background:#000}.applyall:disabled{opacity:.4}
  .flag{border:1px solid var(--line);border-left:3px solid var(--neg);border-radius:12px;padding:12px 14px;margin-bottom:9px;background:var(--card);transition:.15s}
  .flag.mid{border-left-color:var(--warn)}
  .flag.done{border-left-color:var(--accent);opacity:.62}
  .flag.hl{box-shadow:0 0 0 2px var(--soft)}
  .frow1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .lawtag{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;color:#fff}
  .sev{font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.04em}
  .sev.hi{background:#fdecea;color:var(--neg)}.sev.mid{background:#fdf2e2;color:var(--warn)}.sev.lo{background:#eef2f6;color:var(--muted)}
  .fbad{font-weight:700;font-size:13.5px;color:#8f2f22}
  .flag.done .fbad{color:var(--muted);text-decoration:line-through}
  .freason{font-size:12.5px;color:var(--muted);margin:7px 0 8px;line-height:1.5}
  .ffix{display:flex;align-items:flex-start;gap:8px;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .ffix .arrow{color:var(--accent);font-weight:800;flex-shrink:0}
  .ffix .fixtext{color:#077a3c;font-weight:600}
  .fapply{margin-left:auto;border:1px solid var(--accent);background:#eafaf0;color:#077a3c;font:inherit;font-weight:700;font-size:11.5px;padding:6px 11px;border-radius:8px;flex-shrink:0;white-space:nowrap}
  .fapply:hover{background:var(--accent);color:#fff}
  .fdone{font-size:11.5px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .nofind{font-size:13px;color:var(--accent);background:#eafaf0;border:1px solid color-mix(in srgb,var(--accent) 30%,#fff);border-radius:10px;padding:11px 13px}

  .submitbtn{width:100%;border:0;background:var(--brand);color:#fff;font:inherit;font-weight:800;font-size:15px;padding:14px;border-radius:12px;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:8px}
  .submitbtn.small{width:auto;font-size:13px;padding:10px 16px;margin-top:0;margin-left:auto}
  .submitbtn:hover{background:var(--brand-d)}
  .audit{margin-top:6px}
  .astep{display:flex;gap:12px;align-items:flex-start;padding:9px 0;opacity:.3;transition:.4s}
  .astep.on{opacity:1}
  .astep .aic{width:26px;height:26px;border-radius:50%;background:var(--soft);display:grid;place-items:center;font-size:13px;flex-shrink:0}
  .astep.bad .aic{background:#fdecea}.astep.good .aic{background:#eafaf0}
  .astep .at{font-size:13.5px;font-weight:700}.astep .as{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
  .astamp{font-family:var(--display);font-size:12px;color:var(--muted);margin-top:2px}
  .verdictcard{border-radius:13px;padding:14px;margin-top:8px;font-size:13.5px;line-height:1.55}
  .verdictcard.ok{background:#eafaf0;border:1px solid color-mix(in srgb,var(--accent) 35%,#fff);color:#0a6e38}
  .verdictcard.bad{background:#fdecea;border:1px solid color-mix(in srgb,var(--neg) 30%,#fff);color:#8f2f22}
  .verdictcard b{font-weight:800}
  .vnum{font-family:var(--display);font-weight:600}

  /* campaign */
  .seg{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .seg.on{border-color:var(--brand);background:var(--soft)}
  .seg .sx{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;font-size:12px;flex-shrink:0;color:transparent}
  .seg.on .sx{border-color:var(--brand);background:var(--brand);color:#fff}
  .seg .sn{font-weight:700;font-size:13px}.seg .sm{font-size:11.5px;color:var(--muted);margin-top:1px}
  .seg .sc{margin-left:auto;text-align:right;flex-shrink:0;font-size:11px;font-weight:800}
  .seg .sc.full{color:var(--accent)}.seg .sc.part{color:var(--warn)}.seg .sc.none{color:var(--neg)}
  .secblock{border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:11px}
  .secblock.warnb{border-color:color-mix(in srgb,var(--warn) 40%,#fff);background:#fffaf2}
  .secblock.okb{border-color:color-mix(in srgb,var(--accent) 30%,#fff);background:#f5fcf8}
  .secblock.badb{border-color:color-mix(in srgb,var(--neg) 30%,#fff);background:#fdf4f2}
  .sech{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13.5px;margin-bottom:8px}
  .sech .sicon{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:13px;flex-shrink:0}
  .sech .stat{margin-left:auto;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .stat.ok{background:#eafaf0;color:var(--accent)}.stat.warn{background:#fdf2e2;color:var(--warn)}.stat.bad{background:#fdecea;color:var(--neg)}
  .secbody{font-size:12.5px;color:var(--muted);line-height:1.55}
  .conrow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .conrow:last-child{border-bottom:0}
  .conrow .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .exclbtn{border:1px solid var(--warn);background:#fffaf2;color:var(--warn);font:inherit;font-weight:700;font-size:12px;padding:8px 13px;border-radius:9px;margin-top:9px}
  .exclbtn:hover{background:var(--warn);color:#fff}
  .tip{font-size:12px;color:var(--brand-d);background:var(--soft);border-radius:8px;padding:8px 11px;margin-top:7px}

  .reset{display:block;margin:14px auto 0;border:0;background:0;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;text-decoration:underline}
  .editlink{margin-left:auto;border:0;background:0;color:var(--brand);font:inherit;font-size:12px;font-weight:600;text-decoration:underline;cursor:pointer;text-transform:none;letter-spacing:0}
  .refitem{border-top:1px solid var(--line);padding:11px 0}
  .refitem:first-child{border-top:0}
  .refh{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
  .refl{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;padding-left:16px}
  .foot{text-align:center;font-family:var(--display);font-weight:300;font-size:clamp(15px,2.8vw,19px);color:var(--ink);margin:26px auto 0;max-width:40ch;line-height:1.35}
  .foot b{color:var(--brand);font-weight:500}
  .src{text-align:center;font-size:11px;color:var(--muted);margin-top:12px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:11px 17px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:80;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%);opacity:1}
</style>
</head>
<body>
<header><div class="nav">
  <div class="brand" id="brandName">Blackmores</div>
  <div class="sub" id="sub">Compliance Hub</div>
  <div class="sp"></div>

</div></header>

<div class="wrap">
  <div class="eyebrow" id="eye">AI COMPLIANCE REVIEW</div>

  <div class="cov" id="cov"></div>
  <div class="modetabs" id="modeTabs"></div>
  <div id="view"></div>
  <div class="panel"><div class="ptitle" id="refTitle"></div><div id="refList"></div></div>
  <div class="foot" id="foot"></div>
  <div class="src" id="src"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BRANDS={
  blackmores:{name:"BLACKMORES",sup:"®",c:["#009BA4","#007A82","#e0f2f3","#E91E63"]},

const LAWS={
  yakki:{c:"#c0563f",name:{ja:"TGA 治療効果規制",en:"TGA · No therapeutic claims",zh:"TGA·禁治疗宣称",th:"TGA · ห้ามอ้างสรรพคุณรักษา"},
    desc:{ja:"豪 TGA 広告コード：補助食品で疾病の治療・治癒・予防を標榜することを禁止。",en:"AU TGA Advertising Code: supplements must not claim to treat, cure or prevent any disease.",zh:"澳洲 TGA 广告守则：保健食品不得宣称治疗、治愈或预防任何疾病。",th:"TGA ออสเตรเลีย: อาหารเสริมห้ามอ้างว่ารักษา บำบัด หรือป้องกันโรคใด ๆ"}},
  keihyo:{c:"#d98f2e",name:{ja:"誤認・No.1表示",en:"Misleading / No.1 claims",zh:"误导/No.1宣称",th:"ทำให้เข้าใจผิด / No.1"},
    desc:{ja:"豪 NZ 消費者法：根拠のない最上級・No.1表示や競合誹謗、誤認を招く表現を禁止。",en:"ANZ Consumer Law: bans unsubstantiated superiority/No.1, competitor knocking and misleading claims.",zh:"澳新消费者法：禁止无依据的最高级/No.1、贬损竞品及误导性表述。",th:"กฎหมายผู้บริโภค ANZ: ห้ามอ้าง No.1/เหนือกว่าโดยไม่มีหลักฐาน ดูถูกคู่แข่ง หรือทำให้เข้าใจผิด"}},
  kenzo:{c:"#b5731a",name:{ja:"中国 保健食品規制",en:"China · Health-food ad rules",zh:"中国·保健食品广告",th:"จีน · กฎโฆษณาอาหารเพื่อสุขภาพ"},
    desc:{ja:"中国 保健食品広告：「治療・治癒」禁止（「支持・有助于」のみ）、競合誹謗禁止、蓝帽子登録機能のみ表示可。",en:"China health-food rules: no '治疗/治愈' (only '支持/有助于'), no competitor disparagement, only registered 蓝帽子 functions.",zh:"中国保健食品广告：禁用「治疗/治愈」（只能「支持/有助于」），禁止贬损竞品，仅可宣传蓝帽子注册功能。",th:"กฎอาหารสุขภาพจีน: ห้าม '治疗/治愈' (ได้เฉพาะ '支持/有助于') ห้ามดูถูกคู่แข่ง อ้างได้เฉพาะฟังก์ชัน 蓝帽子 ที่ขึ้นทะเบียน"}},
  hyoji:{c:"#8a5cc0",name:{ja:"許可表示・成分表示",en:"Permitted indications & label",zh:"许可宣称与标识",th:"ข้ออ้างที่อนุญาต & ฉลาก"},
    desc:{ja:"TGA 許可表示リスト内の表現のみ可。成分・アレルゲン・用量を正確に表示する義務。",en:"Only TGA permitted indications allowed; accurate ingredient, allergen and dosage labelling required.",zh:"仅可使用 TGA 许可宣称清单内表述；须如实标识成分、过敏原与用量。",th:"ใช้ได้เฉพาะข้ออ้างที่ TGA อนุญาต ต้องแสดงส่วนผสม สารก่อภูมิแพ้ และปริมาณอย่างถูกต้อง"}},

  consent:{c:"#2f8f7a",name:{ja:"配信同意・プライバシー",en:"Marketing consent / privacy",zh:"营销同意/隐私",th:"ความยินยอม / ความเป็นส่วนตัว"},
    desc:{ja:"豪 Spam Act・各国プライバシー法：配信には同意（オプトイン）が必要。未同意者への配信は不可。",en:"AU Spam Act & regional privacy law: marketing requires opt-in consent; no sending to non-consented users.",zh:"澳洲 Spam Act 及各地隐私法：营销推送需 opt-in 同意，不可发给未同意者。",th:"Spam Act ออสเตรเลีย & กฎหมายความเป็นส่วนตัว: การส่งต้องได้รับความยินยอม (opt-in) ห้ามส่งให้ผู้ที่ไม่ยินยอม"}}};
const SEVW={hi:26,mid:14,lo:7};

/* ---- authored content samples ---- */

function scanText(txt){const out=[];if(!txt)return out;
  LEX.forEach(e=>{const m=e.re.exec(txt);if(m){const w=m[0];out.push({bad:{ja:w,en:w,zh:w},law:e.law,sev:e.sev,reason:e.reason,fix:e.fix});}});
  // sort by appearance order
  out.sort((a,b)=>txt.indexOf(a.bad.ja)-txt.indexOf(b.bad.ja));
  return out;}
/* GEO suitability: adjectives vs structured facts */
const GEO_ADJ=/上質|こだわり|特別|健やか|プレミアム|極上|至福|最高級|premium|crafted|special|trusted|pure|上质|匠心|特别|纯净|健康每一天/g;
const GEO_FACT=/\d|mg|IU|µg|mcg|EPA|DHA|ビタミン|vitamin|维生素|粒|capsule|錠|％|%|配合|TGA|AUST.?L|蓝帽子/gi;
function geoScore(txt){if(!txt)return {score:40,adj:0,fact:0};
  const a=(txt.match(GEO_ADJ)||[]).length,f=(txt.match(GEO_FACT)||[]).length;
  return {score:Math.max(8,Math.min(100,38+f*14-a*9)),adj:a,fact:f};}

  campApprovedBody:{ja:"内容合規 OK・配信同意 OK。承認記録を発行しました（GEO は推奨改善点として記録）。",en:"Content & consent OK. Approval issued (GEO logged as a recommended improvement).",zh:"内容合规与配信同意均 OK，已签发审批记录（GEO 作为建议改进点记录）。",th:"เนื้อหาและความยินยอมผ่าน ออกการอนุมัติแล้ว (บันทึก GEO เป็นข้อแนะนำให้ปรับปรุง)"},
  campReturnedBody:{ja:"重大な指摘または未同意配信が残っています。上の対応を完了して再審査してください。",en:"Serious findings or non-consented sending remain. Resolve the above and re-review.",zh:"仍有重大指摘或未同意配信。请完成上方处理后再审核。",th:"ยังมีข้อค้นพบร้ายแรงหรือการส่งถึงผู้ที่ไม่ยินยอม โปรดดำเนินการด้านบนให้เสร็จแล้วตรวจสอบใหม่"},
  campWho:{ja:"提出：マーケティング / キャンペーン担当",en:"By: Marketing / Campaign owner",zh:"提交：市场 / 活动负责人",th:"ส่งโดย: ฝ่ายการตลาด / ผู้ดูแลแคมเปญ"}
};
const SUBNUM="BLK-AD-";

let state={lang:"en",brand:"blackmores",mode:"content",ct:0,resolved:{},submitted:false,
  freeText:"",freeScanned:false,freeFlags:[],
  camp:{ran:false,segs:[0,1,2,3,4,5],resolved:{},excluded:false,c:null}};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const L=o=>(o&&typeof o==='object')?(o[state.lang]||o.ja||o.en):o;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* current content sample (authored or free) */
function curSample(){
  if(state.ct<3)return SAMPLES[state.ct];
  return {key:"free",who:T.freeWho,text:{ja:state.freeText,en:state.freeText,zh:state.freeText},flags:state.freeFlags};
}
function scoreOf(flags,resolved){let pen=0;flags.forEach((f,i)=>{if(!resolved[i])pen+=SEVW[f.sev];});return Math.max(0,Math.min(100,100-pen));}
function countOf(flags,resolved){let hi=0,mi=0,lo=0;flags.forEach((f,i)=>{if(!resolved[i]){if(f.sev==='hi')hi++;else if(f.sev==='mid')mi++;else lo++;}});return{hi,mi,lo};}
function sevLab(s){return s==='hi'?L(T.cHi):s==='mid'?L(T.cMi):L(T.cLo);}

/* ---------- shared renderers ---------- */
function ringHtml(v){const rc=v>=100?'var(--accent)':v>=70?'var(--warn)':'var(--neg)';
  return `<div class="ring" style="--p:${v};--rc:${rc}"><div class="inner"><div class="sv">${v}</div><div class="sl">${L(T.scoreL)}</div></div></div>`;}
function flagHtml(f,i,resolved){const law=LAWS[f.law],done=resolved[i];
  return `<div class="flag ${f.sev!=='hi'?'mid':''} ${done?'done':''}" data-i="${i}">
    <div class="frow1"><span class="lawtag" style="background:${law.c}">${L(law.name)}</span>
      <span class="sev ${f.sev}">${sevLab(f.sev)}</span><span class="fbad">「${L(f.bad)}」</span></div>
    <div class="freason">${L(f.reason)}</div>
    ${done?`<div class="fdone">✓ ${L(T.applied)} → <span style="color:#077a3c">「${L(f.fix)}」</span></div>`
      :`<div class="ffix"><span class="arrow">→</span><span class="fixtext">「${L(f.fix)}」</span><button class="fapply" data-fx="${i}">${L(T.apply)}</button></div>`}</div>`;}
function editorHtml(s,resolved,editLink){let html=esc(L(s.text));
  s.flags.forEach((f,i)=>{const bad=esc(L(f.bad));
    if(resolved[i])html=html.replace(bad,`<ins data-i="${i}">${esc(L(f.fix))}</ins>`);
    else html=html.replace(bad,`<mark class="${f.sev!=='hi'?'mid':''}" data-i="${i}">${bad}</mark>`);});
  return `<div class="ptitle"><span>${L(T.editorTitle)}</span>${editLink?`<button class="editlink" id="editFree">${L(T.edit)}</button>`:`<span id="subTag" style="margin-left:auto;font-weight:600;text-transform:none;letter-spacing:0">${L(s.who)}</span>`}</div>
    <div class="copybox" id="copybox">${html}</div>`;}

/* ---------- CONTENT MODE ---------- */
function typesHtml(){
  const tabs=SAMPLES.map((s,i)=>({i,icon:s.icon,label:s.label,meta:s.meta}));
  tabs.push({i:3,icon:"📄",label:T.freeLabel,meta:T.freeMeta});
  return tabs.map(t=>`<div class="typ ${t.i===state.ct?'on':''}" data-t="${t.i}"><div class="tn">${t.icon} ${L(t.label)}</div><div class="tm">${L(t.meta)}</div></div>`).join('');
}
function renderContent(){
  let h=`<div class="panel"><div class="ptitle">${L(T.typeTitle)}</div><div class="types">${typesHtml()}</div></div>`;
  const isFree=state.ct===3;
  if(isFree && !state.freeScanned){
    h+=`<div class="panel"><div class="ptitle">${L(T.freeTitle)}</div>
      <textarea class="ta" id="freeInput" placeholder="${L(T.freePh)}">${esc(state.freeText||'')}</textarea>
      <div class="frow"><button class="ghostbtn" id="freeUp">${L(T.freeUpload)}</button>
        <button class="ghostbtn" id="freeSample">${L(T.freeSample)}</button>
        <button class="ghostbtn" id="freeClear">${L(T.freeClear)}</button>
        <button class="submitbtn small" id="freeScan">${L(T.freeScan)}</button></div></div>`;
    $('#view').innerHTML=h;bindTypes();
    $('#freeUp').onclick=()=>{state.freeText=L(T.freeDefault);toast(L(T.uploaded));renderContent();};
    $('#freeSample').onclick=()=>{state.freeText=L(T.freeDefault);renderContent();};
    $('#freeClear').onclick=()=>{state.freeText="";renderContent();};
    $('#freeScan').onclick=()=>{state.freeText=$('#freeInput').value;state.freeFlags=scanText(state.freeText);state.freeScanned=true;state.resolved={};state.submitted=false;renderContent();};
    const ta=$('#freeInput');if(ta){ta.oninput=()=>state.freeText=ta.value;}
    return;
  }
  const s=curSample();
  const sc=scoreOf(s.flags,state.resolved),ct=countOf(s.flags,state.resolved);
  // score panel
  let cc='';if(ct.hi)cc+=`<span class="cnt hi">${L(T.cHi)} ${ct.hi}</span>`;if(ct.mi)cc+=`<span class="cnt mi">${L(T.cMi)} ${ct.mi}</span>`;if(ct.lo)cc+=`<span class="cnt lo">${L(T.cLo)} ${ct.lo}</span>`;
  if(!ct.hi&&!ct.mi&&!ct.lo)cc=`<span class="cnt ok">✓ ${L(T.cOk)}</span>`;
  const vcls=ct.hi?'bad':(ct.mi+ct.lo)?'mid':'ok',vtxt=ct.hi?L(T.vBad):(ct.mi+ct.lo)?L(T.vMid):L(T.vOk);
  h+=`<div class="panel"><div class="ptitle">${L(T.scoreTitle)}</div><div class="scorewrap">${ringHtml(sc)}
     <div class="scoremeta"><div class="verdict ${vcls}">${vtxt}</div><div class="counts">${cc}</div></div></div></div>`;
  // editor + flags + submit + audit
  h+=`<div class="panel">${editorHtml(s,state.resolved,isFree)}
     <div class="flaghead"><span class="ft">${L(T.flagTitle)}</span><button class="applyall" id="applyAll" ${s.flags.length===0||s.flags.every((f,i)=>state.resolved[i])?'disabled':''}>${L(T.applyAll)}</button></div>
     <div id="flags">${s.flags.length?s.flags.map((f,i)=>flagHtml(f,i,state.resolved)).join(''):`<div class="nofind">${L(T.noFind)}</div>`}</div>
     <button class="submitbtn" id="submitBtn">${state.submitted?L(T.resubmit):L(T.submit)}</button>
     <div class="audit" id="audit"></div></div>`;
  $('#view').innerHTML=h;
  bindTypes();bindContentEditor(s);
  if(state.submitted)renderAudit(s);
}
function bindTypes(){$$('.typ').forEach(t=>t.onclick=()=>{state.ct=+t.dataset.t;state.resolved={};state.submitted=false;
  if(state.ct===3&&!state.freeText)state.freeText="";if(state.ct===3)state.freeScanned=false;renderContent();});}
function bindContentEditor(s){
  const ef=$('#editFree');if(ef)ef.onclick=()=>{state.freeScanned=false;state.submitted=false;renderContent();};
  $$('#copybox mark').forEach(m=>{m.onmouseenter=()=>hl(m.dataset.i,true);m.onmouseleave=()=>hl(m.dataset.i,false);});
  $$('#flags .flag').forEach(fl=>{fl.onmouseenter=()=>hl(fl.dataset.i,true);fl.onmouseleave=()=>hl(fl.dataset.i,false);});
  $$('[data-fx]').forEach(b=>b.onclick=()=>{state.resolved[+b.dataset.fx]=true;state.submitted=false;toast(L(T.toastApplied));renderContent();});
  const aa=$('#applyAll');if(aa)aa.onclick=()=>{s.flags.forEach((f,i)=>state.resolved[i]=true);state.submitted=false;toast(L(T.toastAll));renderContent();};
  $('#submitBtn').onclick=()=>{state.submitted=true;renderContent();};
}
function hl(i,on){const m=document.querySelector('#copybox mark[data-i="'+i+'"]');const fl=document.querySelector('#flags .flag[data-i="'+i+'"]');
  if(m)m.classList.toggle('hl',on);if(fl)fl.classList.toggle('hl',on);}
function pad(n){return String(n).padStart(2,'0');}
function stamp(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function approvalNo(seed){const d=new Date();return SUBNUM+`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-`+String(100+seed).padStart(3,'0');}
function renderAudit(s){
  let hi=0;s.flags.forEach((f,i)=>{if(!state.resolved[i]&&f.sev==='hi')hi++;});
  const ok=hi===0;const num=approvalNo(state.ct*7+Object.keys(state.resolved).length);
  $('#audit').innerHTML=`
    <div class="astep on" data-a="0"><div class="aic">📤</div><div><div class="at">${L(T.aSubmit)}</div><div class="as">${L(s.who)}</div><div class="astamp">${stamp()}</div></div></div>
    <div class="astep on ${ok?'good':'bad'}"><div class="aic">${ok?'🛡':'⚠'}</div><div><div class="at">${L(T.aCheck)}</div><div class="as">${ok?L(T.aCheckOk):L(T.aCheckBad(hi))}</div></div></div>
    <div class="astep on ${ok?'good':'bad'}"><div class="aic">${ok?'✓':'↩'}</div><div><div class="at">${L(T.aJudge)}</div><div class="as">${ok?L(T.approved):L(T.returned)}</div></div></div>
    ${ok?`<div class="verdictcard ok"><b>✓ ${L(T.approved)}</b><br>${L(T.approvedBody)}<br><span style="display:inline-block;margin-top:7px">${L(T.refNo)}: <span class="vnum">${num}</span></span></div>`
       :`<div class="verdictcard bad"><b>↩ ${L(T.returned)}</b><br>${L(T.returnedBody)}</div>`}`;
}

/* ---------- CAMPAIGN MODE ---------- */
function renderCampaign(){
  const c=state.camp;
  if(!c.ran){
    const segs=SEGMENTS.map((s,i)=>{const cls=s.rate>=1?'full':s.rate>0?'part':'none';const on=c.segs.includes(i);
      return `<div class="seg ${on?'on':''}" data-seg="${i}"><div class="sx">✓</div>
        <div style="min-width:0"><div class="sn">${L(s.nm)}</div><div class="sm">${L(s.detail)} · ${s.size.toLocaleString()}</div></div>
        <div class="sc ${cls}">${Math.round(s.rate*100)}%</div></div>`;}).join('');
    $('#view').innerHTML=`
      <div class="panel"><div class="ptitle">${L(T.modeCampaign)}</div>
        <div class="lead" style="margin-bottom:14px">${L(T.campIntro)}</div>
        <div class="fld"><label>${L(T.fCampName)}</label><input class="inp" id="cName" value="${esc(L(CAMP_SAMPLE.name))}"></div>
        <div class="fld"><label>${L(T.fContent)}</label><textarea class="ta" id="cContent">${esc(L(CAMP_SAMPLE.content))}</textarea></div>
        <div class="fld"><label>${L(T.fInvite)}</label><textarea class="ta" id="cInvite" style="min-height:84px">${esc(L(CAMP_SAMPLE.invite))}</textarea></div>
        <div class="fld"><label>${L(T.fUrl)}</label><input class="inp" id="cUrl" value="${esc(CAMP_SAMPLE.url)}"></div>
        <div class="fld"><label>${L(T.fLp)}</label><textarea class="ta" id="cLp" style="min-height:84px">${esc(L(CAMP_SAMPLE.lp))}</textarea></div>
        <div class="fld"><label>${L(T.fSeg)}</label>${segs}</div>
        <button class="submitbtn" id="runCamp">${L(T.runCamp)}</button></div>`;
    $$('.seg').forEach(s=>s.onclick=()=>{const i=+s.dataset.seg;const k=c.segs.indexOf(i);if(k<0)c.segs.push(i);else c.segs.splice(k,1);renderCampaign();});
    $('#runCamp').onclick=()=>{
      if(!c.segs.length){toast(L(T.pickSeg));return;}
      const content=$('#cContent').value,invite=$('#cInvite').value,lp=$('#cLp').value,name=$('#cName').value;
      const flags=scanText(content+'\n'+invite+'\n'+lp);
      c.c={name,content,invite,lp,flags,geo:geoScore(lp)};c.resolved={};c.excluded=false;c.ran=true;renderCampaign();};
    return;
  }
  // results
  const cc=c.c,g=cc.geo;
  const segList=c.segs.map(i=>SEGMENTS[i]);
  const total=segList.reduce((a,s)=>a+s.size,0);
  const reachable=segList.reduce((a,s)=>a+Math.round(s.size*s.rate),0);
  const nonCon=total-reachable;
  const compHi=cc.flags.filter((f,i)=>!c.resolved[i]&&f.sev==='hi').length;
  const compRemain=cc.flags.filter((f,i)=>!c.resolved[i]).length;
  const consentResolved=nonCon===0||c.excluded;
  const overallOk=compHi===0&&consentResolved;
  // GEO section
  const geoOk=g.score>=70;
  let geoStat=geoOk?'ok':'warn';
  let h=`<div class="panel"><div class="ptitle">${L(T.resultTitle)} · ${esc(cc.name)}<button class="editlink" id="campEdit" style="margin-left:auto">${L(T.rerun)}</button></div>`;
  h+=`<div class="secblock ${geoOk?'okb':'warnb'}"><div class="sech"><span class="sicon" style="background:var(--soft)">🎯</span>${L(T.geoSec)}
      <span class="stat ${geoStat}">${geoOk?L(T.statOk):L(T.statWarn)}</span></div>
      <div class="scorewrap" style="gap:14px">${ringHtml(g.score)}<div class="scoremeta"><div class="secbody">${geoOk?L(T.geoOk):L(T.geoBad)}</div>
      ${!geoOk?`<div class="tip">${L(T.geoTip)}</div>`:''}</div></div></div>`;
  // compliance section
  h+=`<div class="secblock ${compHi?'badb':compRemain?'warnb':'okb'}"><div class="sech"><span class="sicon" style="background:var(--soft)">🛡</span>${L(T.compSec)}
      <span class="stat ${compHi?'bad':compRemain?'warn':'ok'}">${compHi?L(T.statBad):compRemain?L(T.statWarn):L(T.statOk)}</span></div>`;
  if(cc.flags.length){
    h+=`<div class="secbody" style="margin-bottom:9px">${compRemain?L(T.compBad(compRemain)):L(T.compOk)}</div>
      ${cc.flags.map((f,i)=>flagHtml(f,i,c.resolved)).join('')}
      <button class="applyall" id="campApplyAll" style="margin-top:4px" ${cc.flags.every((f,i)=>c.resolved[i])?'disabled':''}>${L(T.applyAll)}</button>`;
  }else h+=`<div class="nofind">${L(T.compOk)}</div>`;
  h+=`</div>`;
  // consent section
  h+=`<div class="secblock ${nonCon&&!c.excluded?'badb':'okb'}"><div class="sech"><span class="sicon" style="background:var(--soft)">👥</span>${L(T.consentSec)}
      <span class="stat ${consentResolved?'ok':'bad'}">${consentResolved?L(T.statOk):L(T.statBad)}</span></div>
      <div style="margin:4px 0 8px">${segList.map(s=>{const cls=s.rate>=1?'full':s.rate>0?'part':'none',dot=s.rate>=1?'var(--accent)':s.rate>0?'var(--warn)':'var(--neg)';
        return `<div class="conrow"><span class="cdot" style="background:${dot}"></span>${L(s.nm)} · ${s.size.toLocaleString()} <span style="margin-left:auto;font-weight:800" class="sc ${cls}">${L({ja:"同意",en:"opt-in",zh:"同意",th:"ยินยอม"})} ${Math.round(s.rate*100)}%</span></div>`;}).join('')}</div>
      <div class="secbody">${L(T.consentReach(total,c.excluded?reachable:reachable))}</div>`;
  if(nonCon&&!c.excluded){
    let bkNo=0,bkOut=0,bkOver=0;segList.forEach(s=>{const non=s.size-Math.round(s.size*s.rate);
      if(s.kind==='optout')bkOut+=non;else if(s.kind==='overseas')bkOver+=non;else bkNo+=non;});
    const bk=[];if(bkNo)bk.push(`${L(T.bkNo)} ${bkNo.toLocaleString()}`);if(bkOut)bk.push(`${L(T.bkOut)} ${bkOut.toLocaleString()}`);if(bkOver)bk.push(`${L(T.bkOver)} ${bkOver.toLocaleString()}`);
    h+=`<div class="secbody" style="color:var(--neg);font-weight:700;margin-top:6px">${L(T.consentBad(nonCon))}</div>
      <div class="secbody" style="margin-top:3px">${L(T.bkLabel)}：${bk.join(' · ')}</div>
      <button class="exclbtn" id="excl">${L(T.exclude).replace('{n}',nonCon.toLocaleString())}</button>`;}
  else if(c.excluded){h+=`<div class="tip" style="background:#eafaf0;color:#0a6e38;margin-top:6px">${L(T.excluded)}</div>`;}
  h+=`</div>`;
  // overall + audit
  h+=`<div class="audit">
    <div class="astep on"><div class="aic">📤</div><div><div class="at">${L(T.aSubmit)}</div><div class="as">${L(T.campWho)}</div><div class="astamp">${stamp()}</div></div></div>
    <div class="astep on ${overallOk?'good':'bad'}"><div class="aic">${overallOk?'🛡':'⚠'}</div><div><div class="at">${L(T.aCheck)}</div><div class="as">GEO ${g.score} · ${compRemain?L(T.compBad(compRemain)):L(T.compOk)} · ${consentResolved?L(T.consentOk):L(T.consentBad(nonCon))}</div></div></div>
    <div class="astep on ${overallOk?'good':'bad'}"><div class="aic">${overallOk?'✓':'↩'}</div><div><div class="at">${L(T.aJudge)}</div><div class="as">${overallOk?L(T.campApproved):L(T.campReturned)}</div></div></div>
    ${overallOk?`<div class="verdictcard ok"><b>✓ ${L(T.campApproved)}</b><br>${L(T.campApprovedBody)}<br><span style="display:inline-block;margin-top:7px">${L(T.refNo)}: <span class="vnum">${approvalNo(700+compRemain)}</span></span></div>`
       :`<div class="verdictcard bad"><b>↩ ${L(T.campReturned)}</b><br>${L(T.campReturnedBody)}</div>`}</div></div>`;
  $('#view').innerHTML=h;
  $('#campEdit').onclick=()=>{c.ran=false;renderCampaign();};
  $$('#view .flag [data-fx]').forEach(b=>b.onclick=()=>{c.resolved[+b.dataset.fx]=true;toast(L(T.toastApplied));renderCampaign();});
  $$('#view [data-fx]').forEach(b=>b.onclick=()=>{c.resolved[+b.dataset.fx]=true;toast(L(T.toastApplied));renderCampaign();});
  const ca=$('#campApplyAll');if(ca)ca.onclick=()=>{cc.flags.forEach((f,i)=>c.resolved[i]=true);toast(L(T.toastAll));renderCampaign();};
  const ex=$('#excl');if(ex)ex.onclick=()=>{c.excluded=true;toast('✓');renderCampaign();};
}

/* ---------- shell ---------- */
function renderCoverage(){$('#cov').innerHTML=Object.keys(LAWS).map(k=>`<span class="lawchip"><span class="lawdot" style="background:${LAWS[k].c}"></span>${L(LAWS[k].name)}</span>`).join('');}
function renderRef(){$('#refTitle').textContent=L(T.refTitle);
  $('#refList').innerHTML=Object.keys(LAWS).map(k=>`<div class="refitem"><div class="refh"><span class="lawdot" style="background:${LAWS[k].c}"></span>${L(LAWS[k].name)}</div><div class="refl">${L(LAWS[k].desc)}</div></div>`).join('');}
function renderModeTabs(){$('#modeTabs').innerHTML=`
  <button data-m="content" class="${state.mode==='content'?'on':''}">${L(T.modeContent)}</button>
  <button data-m="campaign" class="${state.mode==='campaign'?'on':''}">${L(T.modeCampaign)}</button>`;
  $$('#modeTabs button').forEach(b=>b.onclick=()=>{if(state.mode===b.dataset.m)return;state.mode=b.dataset.m;renderAll();});}
function renderAll(){
  $('#sub').textContent=L(T.sub);$('#eye').textContent=L(T.eye);$('#title').textContent=L(T.title);$('#lead').innerHTML=L(T.lead);
  $('#foot').innerHTML=L(T.foot);$('#src').textContent=L(T.src);
  document.documentElement.lang=state.lang;
  renderCoverage();renderModeTabs();renderRef();
  if(state.mode==='content')renderContent();else renderCampaign();
}
function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brandName').innerHTML=b.name+(b.sup?`<sup style="font-size:9px">${b.sup}</sup>`:'');}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

function renderLangs(){const box=$('#langs');box.innerHTML='';[['en','EN'],['zh','中'],['ja','日'],['th','ไท']].forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();state.camp.ran=false;state.freeScanned=false;renderAll();};box.appendChild(b);});}
renderLangs();

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_l=_p.get("lang");
  if(_b&&BRANDS[_b])state.brand=_b;if(_l&&["ja","en","zh","th"].indexOf(_l)>=0)state.lang=_l;}catch(e){}
applyBrand();renderAll();
(function(){var _s="";setInterval(function(){try{if(window.parent&&window.parent!==window){var c=state.brand+"|"+state.lang;if(c!==_s){_s=c;window.parent.postMessage({t:"es",brand:state.brand,lang:state.lang},"*");}}}catch(e){}},400);})();
</script>
