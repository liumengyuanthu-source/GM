<style>
  :root{
    --brand:#009BA4;--brand-d:#007A82;--soft:#e0f2f3;--accent:#E91E63;

    --ink:#16201f;--muted:#6a7480;--bg:#f4f7fb;--card:#fff;--line:#e6ecf2;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN','Songti SC',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:11px;max-width:1060px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:18px}.brand sup{font-size:9px;color:var(--brand)}
  .subt{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:11px}.sp{flex:1}
  .badge{display:inline-flex;align-items:center;gap:5px;color:#fff;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:7px;background:var(--brand)}
  .langs{display:flex;gap:3px}
  .langs button,.markets button{border:1px solid var(--line);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);height:30px;border-radius:8px;transition:.15s;padding:0 8px}
  .langs button.on,.markets button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:1060px;margin:0 auto;padding:24px 18px 64px}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);font-weight:800}
  h1{font-family:var(--display);font-weight:400;font-size:clamp(23px,4vw,32px);margin:9px 0 6px;line-height:1.18}
  .lead{color:var(--muted);font-size:14px;max-width:76ch}
  .markets{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 8px}
  .markets button{height:auto;padding:8px 11px;display:flex;gap:7px;align-items:center;color:var(--ink);background:#fff}
  .markets button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .market-note{font-size:12px;color:var(--muted);max-width:82ch;margin-bottom:20px}
  .stage{display:grid;grid-template-columns:minmax(0,420px) 284px minmax(0,260px);gap:26px;align-items:start}
  @media(max-width:930px){.stage{grid-template-columns:1fr 284px}.side{grid-column:1/-1}}
  @media(max-width:680px){.stage{grid-template-columns:1fr;justify-items:center}.side{width:100%}}
  .fly{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .ring{position:relative;aspect-ratio:1;max-width:390px;margin:0 auto;border-radius:50%;background:conic-gradient(from -90deg,var(--brand),var(--line) 15%,var(--soft) 28%,var(--accent) 45%,var(--brand) 68%,var(--soft) 84%,var(--brand));display:grid;place-items:center}
  .ring::before{content:"";position:absolute;inset:74px;border-radius:50%;background:var(--card);box-shadow:inset 0 0 0 1px var(--line)}
  .hub{position:relative;text-align:center;width:150px}
  .hub b{font-family:var(--display);font-size:24px;font-weight:500;display:block}
  .hub span{font-size:11px;color:var(--muted);font-weight:700}
  .node{position:absolute;width:98px;min-height:72px;border:1px solid var(--line);background:rgba(255,255,255,.96);border-radius:13px;padding:8px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.06);transition:.16s}
  .node:hover,.node.on{border-color:var(--brand);box-shadow:0 6px 18px rgba(0,155,164,.16)}
  .node.on{background:var(--soft)}
  .node .num{font-size:10px;font-weight:900;color:var(--brand-d)}
  .node .ico{font-size:20px;line-height:1.2}
  .node .lab{font-size:11px;font-weight:800;line-height:1.15;margin-top:2px}
  .n0{top:4px;left:50%;transform:translateX(-50%)}.n1{top:80px;right:4px}.n2{right:20px;bottom:62px}.n3{bottom:4px;left:50%;transform:translateX(-50%)}.n4{left:20px;bottom:62px}.n5{top:80px;left:4px}
  .detail{margin-top:14px;border-top:1px solid var(--line);padding-top:13px}
  .detail h2{font-family:var(--display);font-size:20px;font-weight:500;margin-bottom:6px}
  .detail p{font-size:13.5px;color:var(--muted);line-height:1.65}
  .metric{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .metric span{font-size:11.5px;font-weight:800;color:var(--brand-d);background:var(--soft);border-radius:999px;padding:5px 10px}
  .phone{width:284px;border:9px solid #18202c;border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 16px 38px rgba(0,0,0,.22);position:sticky;top:78px}
  .ph-notch{height:22px;background:#18202c;display:flex;justify-content:center;align-items:flex-start}.ph-notch i{width:82px;height:15px;background:#18202c;border-radius:0 0 12px 12px;margin-top:-2px}
  .ph-bar{color:#fff;font-size:12px;font-weight:800;padding:9px 12px;display:flex;align-items:center;gap:7px}.dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.86}.clk{margin-left:auto;font-size:10.5px;opacity:.9}
  .ph-body{height:474px;overflow:auto;background:#eef1f5;padding:11px}.ph-card{background:#fff;border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .acct{display:flex;gap:8px;align-items:center;font-size:12.5px;font-weight:800}.ava{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--soft);font-size:16px;flex-shrink:0}
  .hero{height:94px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:800;font-size:13px;line-height:1.25;margin:9px 0;position:relative;overflow:hidden}.hero::after{content:"";position:absolute;width:92px;height:92px;border-radius:50%;right:-28px;top:-24px;background:rgba(255,255,255,.18)}
  .msg{max-width:86%;border-radius:13px;padding:8px 10px;font-size:11.5px;line-height:1.45;margin:7px 0}.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}.me{margin-left:auto;color:#fff;border-bottom-right-radius:4px}
  .quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.quick button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:10.5px;font-weight:800;color:var(--brand-d)}
  .product{display:flex;gap:9px;align-items:center;border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.product img{width:42px;height:42px}.product b{font-size:11.5px}.product span{display:block;font-size:10px;color:var(--muted)}
  .btn{width:100%;border:0;border-radius:9px;color:#fff;font-size:12.5px;font-weight:800;padding:9px;margin-top:8px}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.menu div{background:var(--soft);border-radius:8px;padding:8px 5px;text-align:center;color:var(--brand-d);font-size:10.5px;font-weight:800}
  .progress{height:7px;background:var(--soft);border-radius:999px;overflow:hidden;margin-top:9px}.progress i{display:block;height:100%;background:var(--accent)}
  .cap{font-size:10.5px;color:var(--muted);margin-top:5px}.row{display:flex;justify-content:space-between;font-size:11.5px;padding:5px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row b{color:var(--brand-d)}
  .side{display:flex;flex-direction:column;gap:12px}.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .panel h3{font-family:var(--display);font-size:17px;font-weight:500;margin-bottom:6px}.panel p,.panel li{font-size:12.5px;color:var(--muted);line-height:1.55}.panel ul{padding-left:17px;margin-top:7px}.servingrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.serving{font-size:10.5px;font-weight:800;border-radius:999px;padding:4px 8px;background:var(--soft);color:var(--brand-d)}
  .map{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:30px}
  @media(max-width:760px){.map{grid-template-columns:1fr}}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}.mcard .mi{font-size:23px}.mcard h3{font-family:var(--display);font-weight:500;font-size:17px;margin:7px 0 5px}.mcard p{font-size:12.5px;color:var(--muted);line-height:1.55}
  .foot{text-align:center;font-family:var(--display);font-size:18px;margin-top:34px}.foot b{color:var(--accent);font-weight:500}
</style>
