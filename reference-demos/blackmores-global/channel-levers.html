<!DOCTYPE html>

<head>

<title>Channel Performance Levers · General Mills · Experience Studio</title>
<style>
  :root{--brand:#009BA4;--brand-d:#007A82;--soft:#e0f2f3;--accent:#E91E63;--ink:#16201f;--muted:#6a7472;--bg:#f4f7fb;--card:#fff;--line:#e6ecf2;--ok:#1a8f4c;--display:Georgia,'Times New Roman','Songti SC',serif;--body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Kaku Gothic ProN','Microsoft YaHei','Helvetica Neue',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}button{font-family:inherit;cursor:pointer}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}.nav{display:flex;align-items:center;gap:16px;max-width:1120px;margin:0 auto;padding:13px 22px}.logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;font-size:19px;letter-spacing:-.01em;color:var(--ink)}.mark{width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:16px}.logo small{display:block;font-family:var(--body);font-weight:500;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:1px}.sp{flex:1}.langs{display:flex;gap:3px}.langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:700;color:var(--muted);min-width:34px;height:34px;padding:0 9px;border-radius:9px;transition:.2s}.langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:1120px;margin:0 auto;padding:30px 22px 90px}.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);font-weight:800}h1{font-family:var(--display);font-weight:400;font-size:clamp(28px,4.8vw,46px);margin:8px 0 10px;line-height:1.12;max-width:31ch}.lead{color:var(--muted);font-size:15px;max-width:84ch}.meter{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 8px}.chip{font-size:11.5px;font-weight:800;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 12px;color:var(--brand-d);transition:.15s}.chip:hover{border-color:var(--brand);background:var(--soft)}
  .src{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-top:16px;scroll-margin-top:80px}.src-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}.src-n{width:38px;height:38px;border-radius:10px;background:var(--soft);color:var(--brand-d);display:grid;place-items:center;font-size:19px;flex:none}.src-t{font-family:var(--display);font-size:20px;font-weight:600;line-height:1.2}.src-tag{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px 26px}@media(max-width:760px){.cols{grid-template-columns:1fr}}.blk h4{font-size:10.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);margin-bottom:6px}.blk p{font-size:13px;color:var(--ink)}.blk.bg p{color:var(--muted)}ol.how{list-style:none;counter-reset:s}ol.how li{font-size:12.5px;padding:5px 0 5px 28px;position:relative;color:var(--ink);border-bottom:1px dashed var(--line)}ol.how li:last-child{border-bottom:0}ol.how li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:5px;width:18px;height:18px;border-radius:50%;background:var(--brand);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center}.demo-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);flex-wrap:wrap}.demo-note{font-size:11.5px;color:var(--muted)}.demo-btn{display:inline-flex;align-items:center;gap:8px;border:0;background:var(--brand);color:#fff;font:inherit;font-weight:800;font-size:13px;padding:10px 18px;border-radius:10px;transition:.2s}.demo-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,155,164,.22)}.closer{margin-top:22px;background:linear-gradient(180deg,#f1fbfb,#fff);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:14px;padding:16px 18px}.closer .ct{font-weight:900;font-size:13px;color:var(--brand-d);margin-bottom:4px}.closer .cd{font-size:12.5px;color:var(--muted)}
</style>
<link rel="stylesheet" href="gm-demo-theme.css">

<body>
<header><div class="nav"><div class="logo"><span class="mark">B</span><span><span>General Mills</span><small>Retail Experience Studio</small></span></div><div class="sp"></div><div class="langs" id="langs"><button data-l="en" class="on">EN</button><button data-l="zh">中</button><button data-l="ja">日本語</button><button data-l="th">ไทย</button></div></div></header>
<div class="wrap"><div class="eyebrow" id="eyebrow"></div><h1 id="h1"></h1><p class="lead" id="lead"></p><div class="meter" id="meter"></div><div id="sources"></div><div class="closer"><div class="ct" id="closerT"></div><div class="cd" id="closerD"></div></div></div>
<script>
let state={lang:'en'};const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);const pick=o=>o[state.lang]||o.en;
var _p=new URLSearchParams(location.search);var brandParam=_p.get('brand')||'generalmills';var marketParam=_p.get('market')||'ANZ';var l=_p.get('lang');if(['en','zh','ja','th'].indexOf(l)>=0)state.lang=l;
const UI={
 en:{eye:'Channel Performance Levers · From red partners to green execution',h1:'How do you turn an under-performing channel partner green?',lead:'Six levers — and how each closes the performance gap across pharmacies, distributors, marketplace stores and field teams. Understand the business case first, then open the live demo.',bg:'Business background',what:'What it does',how:'How we do it',demo:'See live demo',note:'See it working in a live, interactive demo.',closeT:'See the gap to partner / store / SKU level, diagnose why, generate a plan.',closeD:'Standardize field execution, listen to VOC, and build staff capability — turning red channel performance green.'},
 zh:{eye:'渠道绩效杠杆 · 把红色 Partner 变成绿色执行',h1:'如何把表现不佳的渠道伙伴变成绿色？',lead:'6 个绩效杠杆——分别关闭门店、分销商、平台店铺与一线团队的经营差距。先看业务问题，再进入可交互 demo。',bg:'业务背景',what:'它解决什么',how:'如何实现',demo:'查看演示',note:'在可交互 demo 中查看它如何运转。',closeT:'把差距下钻到 Partner / 门店 / SKU，诊断原因，再生成行动计划。',closeD:'标准化一线执行、听取 VOC、补齐店员能力——把红色渠道表现变绿。'},
 ja:{eye:'チャネル業績レバー · 赤いパートナーを緑の実行へ',h1:'不振なチャネルパートナーをどう緑に変えるか？',lead:'小売店、販売店、マーケットプレイス店舗、フィールドチームの業績ギャップを閉じる6つのレバー。まず事業課題を理解し、ライブデモを開きます。',bg:'ビジネス背景',what:'できること',how:'どう実現するか',demo:'ライブデモを見る',note:'インタラクティブなライブデモで動きを確認。',closeT:'ギャップをパートナー/店舗/SKUまで下げ、理由を診断し、計画を生成。',closeD:'フィールド実行を標準化し、VOCを聞き、スタッフ能力を高め、赤いチャネル業績を緑に変えます。'},
 th:{eye:'Channel Performance Levers · เปลี่ยน partner สีแดงเป็นสีเขียว',h1:'จะเปลี่ยน channel partner ที่ผลงานต่ำให้เป็นสีเขียวได้อย่างไร?',lead:'หก levers เพื่อปิดช่องว่างของ retail, distributor, marketplace store และ field team เข้าใจ business case ก่อน แล้วเปิด demo สด',bg:'ภูมิหลังธุรกิจ',what:'ทำอะไรได้',how:'เราทำอย่างไร',demo:'ดูเดโมสด',note:'ดูการทำงานจริงในเดโมแบบโต้ตอบ',closeT:'เจาะ gap ถึงระดับ partner / store / SKU วินิจฉัยสาเหตุ และสร้าง action plan',closeD:'ทำ field execution ให้เป็นมาตรฐาน ฟัง VOC และเพิ่ม staff capability เพื่อเปลี่ยน performance เป็นสีเขียว'}
};
const SOURCES=[
 {n:'📊',file:'channel-ops.html',focus:'kpi',t:{en:'KPI tracking to partner / store / SKU level',zh:'KPI 下钻到 Partner / 门店 / SKU',ja:'KPIをパートナー/店舗/SKUまで追跡',th:'KPI ระดับ partner / store / SKU'},tag:{en:'See the gap',zh:'看见差距',ja:'ギャップを見る',th:'เห็นช่องว่าง'},bg:{en:'HQ sees regional averages, not where the real sell-through or execution gap is. A healthy region can hide a few red retail partners, marketplaces or SKUs.',zh:'总部看到的是区域平均，而不是 sell-through 或执行差距到底在哪里。一个看似健康的区域，可能藏着几个红色门店伙伴、平台店铺或 SKU。',ja:'本部は地域平均しか見えず、販売実績や実行ギャップの本当の場所が分かりません。健全に見える地域が、赤い小売店パートナー、マーケットプレイス、SKUを隠すことがあります。',th:'สำนักงานใหญ่เห็นค่าเฉลี่ย ไม่เห็นว่า sell-through หรือ execution gap อยู่ตรงไหน'},what:{en:'Drill KPIs down to partner, store and SKU with red/amber/green status, so exact under-performers surface on a watchlist.',zh:'把 KPI 下钻到 Partner、门店和 SKU，并用红黄绿状态呈现，让真正表现差的对象进入 watchlist。',ja:'KPIをパートナー、店舗、SKUまで掘り下げ、赤/黄/緑で表示し、不振対象をウォッチリストに出します。',th:'เจาะ KPI ถึง partner, store และ SKU พร้อม RAG status'},how:['Ingest sell-through, order, stock and campaign data','Compute KPI RAG by partner / store / SKU','Build the watchlist','Send alerts to owner']},
 {n:'🔍',file:'channel-ops.html',focus:'gap',t:{en:'Gap diagnosis engine',zh:'差距诊断引擎',ja:'ギャップ診断エンジン',th:'Gap diagnosis engine'},tag:{en:'Know why',zh:'知道为什么',ja:'理由を知る',th:'รู้สาเหตุ'},bg:{en:'Knowing a partner is red is not knowing why. Without the cause, HQ sends generic pressure instead of a fix.',zh:'知道某个 Partner 是红色，不等于知道原因。没有原因，总部只会发泛泛的压力，而不是有效整改。',ja:'パートナーが赤だと分かっても、理由までは分かりません。原因がなければ本部は修正策ではなく圧力を送ります。',th:'รู้ว่า partner สีแดงไม่ได้แปลว่ารู้สาเหตุ'},what:{en:'Diagnose the weak step: traffic, shelf availability, content quality, conversion, reorder rhythm or staff capability.',zh:'诊断具体弱项：流量、货架可得性、内容质量、转化、补货节奏或店员能力。',ja:'弱い工程を診断：流量、棚在庫、コンテンツ品質、転換、補充リズム、スタッフ能力。',th:'วินิจฉัยจุดอ่อน เช่น traffic, shelf availability, content, conversion, reorder หรือ staff capability'},how:['Compare with peer partners','Isolate the weak step','Root-cause with VOC and execution data']},
 {n:'🤖',file:'channel-ops.html',focus:'action',t:{en:'AI action-plan generation',zh:'AI 行动计划生成',ja:'AIアクションプラン生成',th:'AI action-plan generation'},tag:{en:'What to do',zh:'该做什么',ja:'何をすべきか',th:'ต้องทำอะไร'},bg:{en:'Generic advice does not move channel performance. “Sell more” tells a partner nothing it can act on by Monday.',zh:'泛泛建议不会改善渠道表现。“多卖一点”并不能告诉 Partner 周一应该做什么。',ja:'一般論では業績は動きません。「もっと売れ」では月曜から何をすべきか分かりません。',th:'คำแนะนำทั่วไปไม่ช่วยให้ performance ขยับ'},what:{en:'AI creates partner-specific actions with owner, due date, expected impact and evidence tied to the diagnosed gap.',zh:'AI 生成 Partner 专属行动：责任人、截止日期、预期影响和证据，并绑定到诊断出的差距。',ja:'AIがパートナー別の施策、担当者、期限、想定効果、根拠を診断ギャップに結び付けます。',th:'AI สร้าง action เฉพาะ partner พร้อม owner, due date และ expected impact'},how:['Start from diagnosed gap','Generate tailored actions','Assign owner + due date','Track progress and impact']},
 {n:'✅',file:'channel-ops.html',focus:'checklist',t:{en:'Field visit checklist',zh:'一线拜访检查表',ja:'フィールド訪問チェックリスト',th:'Field visit checklist'},tag:{en:'Standardize the visit',zh:'标准化拜访',ja:'訪問を標準化',th:'ทำ visit ให้เป็นมาตรฐาน'},bg:{en:'Field visits are inconsistent and findings often disappear after the visit. Different teams check different things.',zh:'一线拜访不一致，拜访后问题常常消失在聊天记录里。不同团队检查的内容也不同。',ja:'フィールド訪問は一貫せず、所見は訪問後に消えがちです。チームごとに確認項目が違います。',th:'field visit ไม่สม่ำเสมอ และ findings มักหายไปหลัง visit'},what:{en:'A standardized digital checklist for shelf, POP, fixture, stock, QR attribution, staff readiness and follow-up actions.',zh:'数字化标准检查表，覆盖货架、POP、器架、库存、QR 归因、店员准备度与后续行动。',ja:'棚、POP、什器、在庫、QR帰属、スタッフ準備、フォローアップを標準チェックリスト化。',th:'digital checklist สำหรับ shelf, POP, fixture, stock, QR และ follow-up'},how:['Schedule visit','Run checklist','Capture photos','Score execution','Assign follow-up actions']},
 {n:'🗣️',file:'voc.html',focus:'collect',t:{en:'VOC partner feedback',zh:'VOC 渠道反馈',ja:'VOCパートナーフィードバック',th:'VOC partner feedback'},tag:{en:'Hear the customer',zh:'听见消费者',ja:'顧客の声を聞く',th:'ฟังเสียงลูกค้า'},bg:{en:'Reviews and service chats reveal channel issues that sell-through numbers cannot explain: poor advice, confusing claims, slow service or missing stock.',zh:'评价和客服对话能揭示 sell-through 解释不了的渠道问题：推荐不专业、宣称混乱、服务慢或缺货。',ja:'レビューやサービスチャットは、販売数字だけでは分からないチャネル課題を示します。',th:'reviews และ service chat เผยปัญหา channel ที่ตัวเลขขายอธิบายไม่ได้'},what:{en:'Tag VOC to partner, store, SKU and issue type, then feed it into gap diagnosis and action plans.',zh:'把 VOC 标签到 Partner、门店、SKU 和问题类型，再送入差距诊断与行动计划。',ja:'VOCをパートナー、店舗、SKU、課題タイプにタグ付けし、ギャップ診断と施策へ送ります。',th:'tag VOC กับ partner, store, SKU และ issue type แล้วป้อนเข้า diagnosis'},how:['Collect VOC','Tag to partner / store / SKU','Feed gap diagnosis','Prioritize follow-up']},
 {n:'🎓',file:'partner-training.html',focus:'academy',t:{en:'Partner staff enablement & E-Learning',zh:'Partner 店员赋能与 E-Learning',ja:'パートナー店員育成・Eラーニング',th:'Partner staff enablement & E-Learning'},tag:{en:'Fix the capability gap',zh:'补齐能力差距',ja:'能力ギャップを是正',th:'ปิดช่องว่าง capability'},bg:{en:'Many red partners are red because of people, not only process: high turnover, weak product knowledge and inconsistent recommendation skills.',zh:'很多红色 Partner 的问题不只是流程，而是人：流动率高、产品知识弱、推荐能力不稳定。',ja:'赤いパートナーの多くはプロセスだけでなく人の問題です。離職、商品知識、推奨スキルにばらつきがあります。',th:'หลาย partner สีแดงเกิดจากคน ไม่ใช่แค่ process'},what:{en:'Role-based micro-learning, AI role-play, certification and manager dashboard tied to each partner’s weak step.',zh:'按角色配置微课、AI 对练、认证与经理看板，并绑定每个 Partner 的弱项。',ja:'役割別マイクロラーニング、AIロールプレイ、認定、管理ダッシュボードを弱い工程に紐付けます。',th:'micro-learning, AI role-play, certification และ dashboard ที่ผูกกับ weak step'},how:['Map gap to required skills','Assign micro-learning paths','Certify and refresh','Track skills vs KPIs']}
];
function go(file,focus){location.href=file+'?brand='+encodeURIComponent(brandParam)+'&market='+encodeURIComponent(marketParam)+'&lang='+state.lang+(new URLSearchParams(location.search).get('embed')==='1'?'&embed=1':'')+(focus?'&focus='+focus:'');}
function render(){const u=UI[state.lang]||UI.en;$('#eyebrow').textContent=u.eye;$('#h1').textContent=u.h1;$('#lead').textContent=u.lead;$('#meter').innerHTML=SOURCES.map((s,i)=>'<span class="chip" data-jump="'+i+'">'+s.n+' '+pick(s.t)+'</span>').join('');$('#sources').innerHTML=SOURCES.map((s,i)=>'<div class="src" id="src'+i+'"><div class="src-top"><div class="src-n">'+s.n+'</div><div><div class="src-tag">'+pick(s.tag)+'</div><div class="src-t">'+pick(s.t)+'</div></div></div><div class="cols"><div class="blk bg"><h4>'+u.bg+'</h4><p>'+pick(s.bg)+'</p><h4 style="margin-top:12px">'+u.what+'</h4><p>'+pick(s.what)+'</p></div><div class="blk"><h4>'+u.how+'</h4><ol class="how">'+s.how.map(x=>'<li>'+x+'</li>').join('')+'</ol></div></div><div class="demo-row"><div class="demo-note">'+u.note+'</div><button class="demo-btn" data-file="'+s.file+'" data-focus="'+(s.focus||'')+'">▶ '+u.demo+'</button></div></div>').join('');$('#closerT').textContent=u.closeT;$('#closerD').textContent=u.closeD;$$('#sources .demo-btn').forEach(b=>b.onclick=()=>go(b.dataset.file,b.dataset.focus));$$('#meter .chip').forEach(c=>c.onclick=()=>{var el=$('#src'+c.dataset.jump);if(el)el.scrollIntoView({behavior:'smooth'});});document.documentElement.lang=state.lang;$$('#langs button').forEach(x=>x.classList.toggle('on',x.dataset.l===state.lang));}
$('#langs').onclick=e=>{const b=e.target.closest('button');if(!b)return;state.lang=b.dataset.l;render();};window.addEventListener('message',e=>{const d=e.data;if(!d||d.t!=='es')return;if(d.lang&&['en','zh','ja','th'].indexOf(d.lang)>=0){state.lang=d.lang;render();}if(d.brand)brandParam=d.brand;if(d.market)marketParam=d.market;});render();
</script>
<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent="header,.langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
