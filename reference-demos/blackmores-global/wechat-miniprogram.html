<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackmores · WeChat Mini-Program · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63; --wx-green:#07c160;
    --ink:#16201f; --muted:#6a7480; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:11px;max-width:960px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:18px}.brand sup{font-size:9px;color:var(--brand)}
  .subt{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:11px}.sp{flex:1}
  .wxbadge{display:inline-flex;align-items:center;gap:4px;background:var(--wx-green);color:#fff;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
  .backst{display:none;align-items:center;gap:5px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font:inherit;font-size:12px;font-weight:700;padding:6px 11px;border-radius:9px;cursor:pointer}
  .backst:hover{background:var(--soft);border-color:var(--brand)}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:960px;margin:0 auto;padding:24px 18px 64px}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);font-weight:700}
  h1{font-family:var(--display);font-weight:400;font-size:clamp(21px,4.4vw,29px);margin:9px 0 5px;line-height:1.2}
  .lead{color:var(--muted);font-size:14px;max-width:64ch}

  .stage{display:grid;grid-template-columns:264px minmax(0,1fr);justify-content:center;gap:32px;align-items:start;margin-top:24px}
  @media(max-width:760px){.stage{grid-template-columns:1fr;justify-items:center}}
  .phone{width:264px;border:9px solid #18202c;border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 16px 38px rgba(0,0,0,.22);position:sticky;top:78px}
  .ph-notch{height:22px;background:#18202c;display:flex;justify-content:center;align-items:flex-start}
  .ph-notch i{width:80px;height:15px;background:#18202c;border-radius:0 0 12px 12px;margin-top:-2px}
  .ph-bar{background:#1f2733;color:#fff;font-size:11.5px;font-weight:700;padding:8px 12px;display:flex;align-items:center;gap:7px}
  .ph-bar .dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.8}
  .ph-bar .clk{margin-left:auto;font-weight:600;opacity:.85}
  .ph-body{height:470px;overflow:auto;background:#eef1f5;padding:10px 10px 6px}
  .ph-card{background:#fff;border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .ph-cap{font-size:10px;color:var(--muted);margin-top:6px}
  .ph-sech{font-size:11px;font-weight:800;color:var(--ink);margin:2px 0 7px;display:flex;align-items:center;gap:5px}
  .ph-sech .more{margin-left:auto;font-size:9.5px;color:var(--muted);font-weight:600}
  .ph-btn{width:100%;border:0;border-radius:9px;padding:9px;font-size:12px;font-weight:700;color:#fff;background:var(--brand);margin-top:8px;cursor:pointer;transition:.15s}
  .ph-btn:active{transform:scale(.97)}
  .ph-btn.wx{background:var(--wx-green)}
  .ph-btn.acc{background:var(--accent)}
  .ph-btn.done{background:var(--soft);color:var(--brand-d)}
  .ph-btn.ghost{background:#fff;color:var(--brand-d);border:1px solid var(--line)}
  .ph-btn:disabled{opacity:.45;cursor:default}

  /* legend chips for AU viewers */
  .ph-leg{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 9px}
  .ph-leg .lg{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:700;color:var(--muted);cursor:help}
  .ph-leg .lg b{color:var(--brand-d)}
  .ecoTag{display:inline-flex;align-items:center;gap:3px;background:var(--soft);color:var(--brand-d);font-size:8.5px;font-weight:800;padding:1px 6px;border-radius:6px;vertical-align:middle}

  /* home banner */
  .ph-banner{position:relative;height:96px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-d));display:flex;flex-direction:column;justify-content:center;padding:12px 13px;color:#fff;overflow:hidden;margin-bottom:9px}
  .ph-banner::after{content:'❄️';position:absolute;right:-6px;top:-8px;font-size:64px;opacity:.18}
  .ph-banner .bt{font-family:var(--display);font-size:15px;font-weight:600;line-height:1.2;position:relative}
  .ph-banner .bs{font-size:10px;opacity:.92;margin-top:4px;position:relative}
  .ph-banner .bb{display:inline-block;margin-top:8px;background:#fff;color:var(--brand-d);font-size:9.5px;font-weight:800;padding:4px 10px;border-radius:999px;position:relative;width:fit-content}

  .ph-goals{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .ph-goal{background:var(--soft);border-radius:10px;padding:8px 3px;text-align:center;cursor:pointer;transition:.12s}
  .ph-goal:active{transform:scale(.95)}
  .ph-goal:hover{background:var(--brand);color:#fff}
  .ph-goal .gi{font-size:18px}.ph-goal .gn{font-size:9px;font-weight:700;margin-top:2px;line-height:1.1}

  .ph-quiz .qq{font-size:11.5px;font-weight:700;line-height:1.35;margin-bottom:8px}
  .ph-quiz .opt{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 10px;font-size:11px;font-weight:600;margin-bottom:6px;cursor:pointer;transition:.12s}
  .ph-quiz .opt:hover{border-color:var(--brand);background:var(--soft)}
  .ph-prog{height:5px;border-radius:99px;background:var(--soft);overflow:hidden;margin-bottom:9px}
  .ph-prog i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:.3s}

  .ph-content{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ph-cw{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;cursor:pointer;transition:.15s}
  .ph-cw:hover{border-color:var(--brand);box-shadow:0 3px 10px rgba(0,0,0,.06)}
  .ph-cw .thumb{position:relative;height:74px;background:linear-gradient(135deg,#0f6fb4,#009BA4);display:grid;place-items:center;font-size:30px}
  .ph-cw .thumb.v2{background:linear-gradient(135deg,#E91E63,#ff8a5c)}
  .ph-cw .thumb.v3{background:linear-gradient(135deg,#7b5cff,#009BA4)}
  .ph-cw .thumb.v4{background:linear-gradient(135deg,#0f9b6c,#009BA4)}
  .ph-cw .play{position:absolute;inset:0;margin:auto;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;font-size:12px;color:var(--brand-d)}
  .ph-cw .tg{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.55);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px}
  .ph-cw .ct{font-size:10px;font-weight:700;line-height:1.25;padding:7px 7px 2px;min-height:34px}
  .ph-cw .cm{display:flex;align-items:center;gap:8px;font-size:8.5px;color:var(--muted);padding:0 7px 7px}
  .ph-cw .cm button{border:0;background:0;font:inherit;font-size:8.5px;color:var(--muted);cursor:pointer;padding:0}
  .ph-cw .cm button.on{color:var(--accent)}

  .ph-live{position:relative;height:88px;border-radius:11px;background:linear-gradient(135deg,#E91E63,#7b1fa2);display:flex;align-items:flex-end;padding:9px;overflow:hidden;cursor:pointer}
  .ph-live .ld{position:absolute;top:7px;left:7px;background:#ff3b3b;color:#fff;font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:5px;display:flex;align-items:center;gap:3px}
  .ph-live .ld i{width:5px;height:5px;border-radius:50%;background:#fff;animation:bl 1s infinite}
  @keyframes bl{50%{opacity:.3}}
  .ph-live .lv{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.4);color:#fff;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:5px}
  .ph-live .ltx{color:#fff;font-size:10.5px;font-weight:800;line-height:1.25;text-shadow:0 1px 4px rgba(0,0,0,.4)}

  .ph-store{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
  .ph-store:last-child{border-bottom:0}
  .ph-store .si{width:34px;height:34px;border-radius:9px;background:var(--soft);display:grid;place-items:center;font-size:17px;flex-shrink:0}
  .ph-store .sn{flex:1;font-size:11px}.ph-store .sn b{font-weight:700}.ph-store .sn span{display:block;color:var(--muted);font-size:9px;margin-top:1px}
  .ph-store .stk{font-size:9px;font-weight:800;color:var(--brand-d);background:var(--soft);padding:2px 7px;border-radius:6px}
  .ph-store .stk.low{color:#c2410c;background:#fff2e8}

  /* shop */
  .ph-stbar{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 7px}
  .ph-stback{border:none;background:none;color:var(--brand);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
  .ph-stcart{border:1px solid var(--line);background:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink)}
  .ph-search{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:11px;color:var(--muted);margin-bottom:8px}
  .ph-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
  .ph-cat{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:14px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;transition:.12s}
  .ph-cat.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ph-catlbl{font-size:9px;font-weight:800;color:var(--muted);margin:2px 0 5px;letter-spacing:.04em}
  .ph-pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ph-pcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 8px;text-align:center;cursor:pointer;transition:.15s}
  .ph-pcard:active{transform:scale(.97)}
  .ph-pcard:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(0,0,0,.06)}
  .ph-pcard img{width:46px;height:46px;object-fit:contain}
  .ph-pcn{font-size:10px;font-weight:700;color:var(--ink);line-height:1.25;margin:5px 0 3px;min-height:26px}
  .ph-ptags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:4px}
  .ph-ptag{font-size:8px;font-weight:700;color:var(--brand-d);background:var(--soft);padding:1px 5px;border-radius:5px}
  .ph-pcp{font-size:13px;font-weight:800;color:var(--accent)}
  .ph-pcp s{font-size:9px;color:var(--muted);font-weight:600;margin-left:3px}
  .ph-pcr{font-size:8.5px;color:#f5a623;font-weight:700}

  .ph-detail .dimg{width:96px;height:96px;object-fit:contain;margin:0 auto;display:block}
  .ph-dtags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:6px 0}
  .ph-dtag{font-size:9px;font-weight:700;color:#fff;background:var(--brand);padding:2px 8px;border-radius:6px}
  .ph-price{display:flex;align-items:baseline;gap:8px;justify-content:center;margin:8px 0}
  .ph-price .mp{font-size:20px;font-weight:800;color:var(--accent)}
  .ph-price .lp{font-size:11px;color:var(--muted);text-decoration:line-through}
  .ph-price .mb{font-size:8.5px;font-weight:800;color:var(--brand-d);background:var(--soft);padding:2px 6px;border-radius:5px}
  .ph-spec{border-top:1px solid var(--line);padding:8px 0;font-size:10.5px}
  .ph-spec .row{display:flex;gap:8px;padding:3px 0}
  .ph-spec .row .k{color:var(--muted);min-width:62px;flex-shrink:0;font-weight:700}
  .ph-spec .row .v{flex:1;line-height:1.4}
  .ph-cert{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .ph-cert div{display:flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:9px;font-weight:700;color:var(--brand-d);background:#fafdfd}
  .ph-rev{border-top:1px solid var(--line);padding:8px 0 0}
  .ph-rev .rv{padding:6px 0;border-bottom:1px solid var(--line);font-size:10px}
  .ph-rev .rv:last-child{border-bottom:0}
  .ph-rev .rv .rh{display:flex;align-items:center;gap:6px;font-weight:700}
  .ph-rev .rv .rh .st{color:#f5a623;font-size:9px;margin-left:auto}
  .ph-rev .rv .rt{color:var(--muted);margin-top:2px;line-height:1.4}
  .ph-pair{border:1px dashed var(--accent);background:#fff5f8;border-radius:9px;padding:8px;margin-top:8px;font-size:10px}
  .ph-pair b{color:var(--accent)}
  .ph-dbar{display:flex;gap:6px;margin-top:9px}
  .ph-dbar .ph-btn{margin-top:0}

  .ph-prow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .ph-prow:last-of-type{border-bottom:0}
  .ph-pimg{width:32px;height:32px;flex-shrink:0;object-fit:contain}
  .ph-pn{flex:1;font-size:11px;font-weight:600;line-height:1.2}
  .ph-pp{font-size:10px;color:var(--accent);font-weight:800;margin-top:2px}
  .ph-qty{display:flex;align-items:center;gap:6px}
  .ph-qty button{width:21px;height:21px;border:1px solid var(--line);background:var(--bg);border-radius:6px;font-size:13px;line-height:1;color:var(--brand);cursor:pointer}
  .ph-qty b{min-width:14px;text-align:center;font-size:12px}
  .ph-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;color:var(--muted)}
  .ph-row.tot{color:var(--ink);font-weight:800;font-size:13px}
  .ph-row .disc{color:var(--accent);font-weight:700}
  .ph-field{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:11px}
  .ph-field .fi{font-size:15px}.ph-field .ft{flex:1}.ph-field .ft b{font-weight:700}.ph-field .ft span{display:block;color:var(--muted);font-size:9px}
  .ph-field .fa{color:var(--muted);font-size:14px}
  .ph-couponrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff5f8;border:1px dashed var(--accent);border-radius:9px;padding:8px 10px;margin:8px 0;font-size:10.5px;font-weight:700;color:var(--accent)}
  .ph-couponrow button{border:0;background:var(--accent);color:#fff;border-radius:7px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer}
  .ph-couponrow button.done{background:var(--soft);color:var(--brand-d)}

  /* AI */
  .ph-aimode{display:flex;gap:5px;margin-bottom:9px}
  .ph-aimode button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 4px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;transition:.12s}
  .ph-aimode button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .ph-disc{background:#fffbe8;border:1px solid #f0e2a8;border-radius:9px;padding:8px 10px;font-size:9.5px;color:#8a6d1a;line-height:1.4;margin-bottom:9px}
  .ph-chat{display:flex;flex-direction:column;gap:8px}
  .ph-msg{max-width:85%;font-size:11px;line-height:1.45;padding:8px 10px;border-radius:12px}
  .ph-msg.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px;align-self:flex-start}
  .ph-msg.me{background:var(--brand);color:#fff;border-bottom-right-radius:3px;align-self:flex-end}
  .ph-msg .av{font-weight:800;color:var(--brand-d);font-size:10px;display:block;margin-bottom:2px}
  .ph-quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .ph-quick button{border:1px solid var(--brand);background:#fff;color:var(--brand-d);border-radius:14px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer}
  .ph-quick button:active{transform:scale(.96)}
  .ph-pcardmini{border:1px solid var(--line);border-radius:10px;padding:8px;display:flex;gap:8px;align-items:center;background:#fafdfd}
  .ph-pcardmini img{width:38px;height:38px;object-fit:contain}
  .ph-pcardmini .nm{flex:1;font-size:10.5px;font-weight:700;line-height:1.2}
  .ph-pcardmini .nm .pp{color:var(--accent);font-weight:800;margin-top:2px}
  .ph-cmp{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
  .ph-cmp .col{border:1px solid var(--line);border-radius:9px;padding:8px;font-size:9.5px;text-align:center}
  .ph-cmp .col img{width:34px;height:34px;object-fit:contain}
  .ph-cmp .col .cn{font-weight:800;font-size:10px;margin:3px 0}
  .ph-cmp .col .cr{padding:2px 0;color:var(--muted)}
  .ph-cmp .col .cr b{color:var(--ink)}
  .ph-agent{border:1px solid var(--accent);background:#fff5f8;border-radius:11px;padding:10px}
  .ph-agent .ah{font-size:10px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:5px;margin-bottom:6px}
  .ph-agent .at{font-size:11px;line-height:1.5}
  .ph-agent .at b{color:var(--accent)}
  .ph-inbar{display:flex;gap:6px;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
  .ph-inbar .ic{width:30px;height:30px;border-radius:50%;background:var(--soft);display:grid;place-items:center;font-size:14px;color:var(--brand-d);flex-shrink:0}
  .ph-inbar .box{flex:1;border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:10.5px;color:var(--muted);background:#fff}
  .ph-voice{text-align:center;padding:14px 0}
  .ph-voice .mic{width:64px;height:64px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:28px;margin:0 auto;box-shadow:0 6px 18px rgba(0,155,164,.4);cursor:pointer;transition:.15s}
  .ph-voice .mic:active{transform:scale(.92)}
  .ph-voice .mic.rec{background:var(--accent);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(233,30,99,.45)}50%{box-shadow:0 0 0 12px rgba(233,30,99,0)}}

  /* health twin */
  .ph-avatar{position:relative;height:150px;border-radius:14px;display:grid;place-items:center;overflow:hidden;transition:.5s;background:linear-gradient(160deg,#cfd8e0,#aeb8c2)}
  .ph-avatar.lv1{background:linear-gradient(160deg,#cfd8e0,#aeb8c2)}
  .ph-avatar.lv2{background:linear-gradient(160deg,#bfe3e6,#7fc9cf)}
  .ph-avatar.lv3{background:linear-gradient(160deg,#9fe6c9,#4fd0b0)}
  .ph-avatar.lv4{background:linear-gradient(160deg,#ffe27a,#ffb74d)}
  .ph-avatar .face{font-size:58px;filter:grayscale(.5);transition:.5s;position:relative;z-index:2}
  .ph-avatar.lv2 .face{filter:grayscale(.2)}
  .ph-avatar.lv3 .face,.ph-avatar.lv4 .face{filter:none}
  .ph-avatar .shield{position:absolute;font-size:120px;opacity:0;transition:.5s;z-index:1}
  .ph-avatar.lv3 .shield{opacity:.18}.ph-avatar.lv4 .shield{opacity:.32}
  .ph-avatar .lvtag{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.85);color:var(--brand-d);font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;z-index:3}
  .ph-avatar .vit{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.85);color:var(--ink);font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;z-index:3}
  .ph-dims{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
  .ph-dim{background:var(--soft);border-radius:9px;padding:7px 8px}
  .ph-dim .dn{font-size:9.5px;font-weight:700;display:flex;align-items:center;gap:4px}
  .ph-dim .db{height:5px;border-radius:99px;background:#fff;overflow:hidden;margin-top:4px}
  .ph-dim .db i{display:block;height:100%;background:var(--brand);border-radius:99px;transition:.5s}

  // Step C — personalised plan

  return `<div class="ph-sech" style="color:var(--accent)">✓ ${P('asResult')} · ${gName}</div>

/* ============ render + events ============ */
function renderPhone(){
  const tab=state.tab, tIdx=TABS.findIndex(t=>t.k===tab);
  let body='';
  if(tab==='home')body=renderHome();
  else if(tab==='shop')body=renderShop();
  else if(tab==='ai')body=renderAI();
  else if(tab==='health')body=renderHealth();
  else body=renderMy();
  const tabbar=`<div class="ph-tabbar">${TABS.map(t=>`<button class="ph-tab${t.k===tab?' on':''}" data-tab="${t.k}"><span class="ic">${t.ic}</span><span class="lb">${L(t.lb)}</span></button>`).join('')}</div>`;
  $('#phone').innerHTML=`<div class="ph-notch"><i></i></div><div class="ph-bar"><span class="dot"></span>WeChat 微信 · ${L(TABS[tIdx].lb)}<span class="clk">9:41</span></div><div class="ph-body" id="phBody">${body}</div>${tabbar}`;
  bindEvents();
}
function bindEvents(){
  const on=(id,fn)=>{const e=$('#'+id);if(e)e.onclick=fn;};
  const all=(sel,fn)=>$$('#phone '+sel).forEach(el=>el.onclick=()=>fn(el));
  // tabbar
  all('[data-tab]',el=>{state.tab=el.dataset.tab;renderPhone();renderSide();});
  all('[data-jumptab]',el=>{state.tab=el.dataset.jumptab;renderPhone();renderSide();});
  // home
  on('quizGo',()=>{ph.asGoal=null;ph.asStep=0;ph.asAns=[];renderPhone();});
  bindAssessment('as');
  all('[data-jump]',el=>{ph.detailSku=el.dataset.jump;state.tab='shop';ph.shopView='detail';renderPhone();renderSide();});
  all('[data-goal]',el=>{const m={0:'immunity',1:'sleep',2:'gut',3:'joint',4:'pregnancy',5:'skin',6:'eye',7:'brain'};state.tab='shop';ph.shopView='list';ph.shopCat=m[+el.dataset.goal];ph.shopCatType='eff';renderPhone();renderSide();phToast('🛍️ '+L(PT.goals)[+el.dataset.goal]);});
  all('[data-like]',el=>{const id=el.dataset.like;ph.saved[id+'_l']=!ph.saved[id+'_l'];renderPhone();});
  all('[data-save]',el=>{const id=el.dataset.save;ph.saved[id+'_s']=!ph.saved[id+'_s'];phToast(ph.saved[id+'_s']?'★ '+P('saved'):P('save'));renderPhone();});
  on('reserveBtn',()=>{ph.reserved=true;phToast('📦 '+P('reserved'));renderPhone();});
  on('notifyBtn',()=>{ph.notified=true;phToast('🔔 '+P('notified'));renderPhone();});
  on('liveCard',()=>phToast('▶ '+P('liveT')));
  // shop
  on('shopCart',()=>{ph.shopView='cart';renderPhone();});
  all('[data-cat]',el=>{ph.shopCat=el.dataset.cat;ph.shopCatType=el.dataset.ctype;renderPhone();});
  all('[data-addbundle]',el=>{addBundle(el.dataset.addbundle);phToast('🎁 '+P('bundleAdded'));renderPhone();});
  all('[data-bjump]',el=>{ph.detailSku=el.dataset.bjump;ph.shopView='detail';renderPhone();});
  all('[data-sku]',el=>{ph.detailSku=el.dataset.sku;ph.shopView='detail';renderPhone();});
  on('detBack',()=>{ph.shopView='list';renderPhone();});
  on('cartBack',()=>{ph.shopView='list';renderPhone();});
  on('detAdd',()=>{addCart(ph.detailSku,1);phToast('🛒 '+P('added'));renderPhone();});
  on('detBuy',()=>{addCart(ph.detailSku,1);ph.shopView='cart';renderPhone();});
  all('[data-inc]',el=>{ph.cart[el.dataset.inc]++;renderPhone();});
  all('[data-dec]',el=>{ph.cart[el.dataset.dec]=Math.max(0,ph.cart[el.dataset.dec]-1);renderPhone();});
  on('cartCoupon',()=>{ph.coupon=true;phToast('🎟️ '+P('applied'));renderPhone();});
  on('cartPay',()=>{const e=Math.floor(cartSub()*0.1);ph.ordered=true;ph.points+=e;phToast('🎉 '+P('orderDone'));renderPhone();});
  on('orderAgain',()=>{ph.ordered=false;ph.cart={};ph.coupon=false;ph.shopView='list';ph.shopCat='all';renderPhone();});
  // AI
  all('[data-mode]',el=>{ph.aiMode=el.dataset.mode;renderPhone();});
  all('[data-q]',el=>{if(!ph.chat.includes(el.dataset.q))ph.chat.push(el.dataset.q);renderPhone();setTimeout(()=>{const b=$('#phBody');if(b)b.scrollTop=b.scrollHeight;},30);});
  all('[data-aiadd]',el=>{addCart(el.dataset.aiadd,1);phToast('🛒 '+P('added'));});
  all('[data-aijump]',el=>{ph.detailSku=el.dataset.aijump;state.tab='shop';ph.shopView='detail';renderPhone();renderSide();});
  on('aiOneTap',()=>{ph.aiOrdered=true;ph.points+=35;phToast('💳 '+P('ordering'));renderPhone();});
  on('aiAddBundle',()=>{const e=$('#aiAddBundle');if(e){addBundle(e.dataset.bk);ph.bundleOrdered=true;phToast('🎁 '+P('bundleAdded'));renderPhone();}});
  on('agentYes',()=>{ph.agentDone=true;ph.points+=18;phToast('✅ '+P('ordering'));renderPhone();});
  on('agentNo',()=>{phToast('👌 '+P('later'));});
  on('voiceMic',()=>{if(ph.voiceState===0){ph.voiceState=1;renderPhone();setTimeout(()=>{ph.voiceState=2;renderPhone();setTimeout(()=>{ph.voiceState=3;renderPhone();},700);},900);}});
  on('voicePay',()=>{ph.voiceState=4;ph.points+=9;phToast('💳 '+P('ordering'));renderPhone();});
  // health
  bindAssessment('twinAs');
  on('checkinBtn',()=>{if(!ph.checkedin){ph.checkedin=true;ph.streak++;ph.points+=5;if(ph.twinLevel<4)ph.twinLevel++;phToast('🔥 '+P('checkinMsg'));renderPhone();}});
  all('[data-rec]',el=>{const k=el.dataset.rec;ph.records[k]=!ph.records[k];if(ph.records[k])phToast('📝 '+P('recSaved'));renderPhone();});
  on('restockBtn',()=>{ph.restock=true;phToast('🔄 '+P('enabledRestock'));renderPhone();});
  on('reportBtn',()=>{ph.reportShared=true;phToast('📤 '+P('shared'));renderPhone();});
  // my
  all('[data-task]',el=>{const k=el.dataset.task;if(!ph.taskDone[k]){ph.taskDone[k]=true;ph.points+=+el.dataset.pts;phToast('✅ +'+el.dataset.pts+' '+P('ptsLabel'));renderPhone();}});
  all('[data-act]',el=>{phToast('🎪 '+P(el.dataset.act));});
  all('[data-claim]',el=>{const k=el.dataset.claim;if(!ph.claimed[k]){ph.claimed[k]=true;phToast('🎟️ '+P('claimed')+' → 微信卡包');renderPhone();}});
  on('myTask',()=>{const b=$('#phBody');if(b)b.scrollTop=260;});
  on('myWallet',()=>{const b=$('#phBody');if(b)b.scrollTop=b.scrollHeight;});
  on('arCard',()=>{ph.arScan=!ph.arScan;if(ph.arScan)phToast('🔬 '+P('arMol'));renderPhone();});
}

try{var _b=new URLSearchParams(location.search).get("brand");if(_b&&BRANDS[_b])state.brand=_b;}catch(e){}

/* back-to-studio: only when embedded */
(function(){var bs=$('#backStudio');if(!bs)return;var embedded=false;try{embedded=window.self!==window.top;}catch(e){embedded=true;}
  if(embedded){bs.style.display='flex';bs.onclick=function(){location.href='index.html'+location.search;};}})();

/* inbound brand/lang sync from parent studio */
window.addEventListener('message',function(e){var m=e.data;if(!m||m.t!=='es')return;var ch=false;
  if(m.brand&&BRANDS[m.brand]&&m.brand!==state.brand){state.brand=m.brand;ch=true;}
  if(m.lang&&["en","zh","ja","th"].indexOf(m.lang)>=0&&m.lang!==state.lang){state.lang=m.lang;ch=true;}
  if(ch){renderLangs();renderStatic();}});

/* outbound sync */
(function(){var _p="";setInterval(function(){try{if(window.parent&&window.parent!==window){var c=state.brand+"|"+state.lang;if(c!==_p){_p=c;window.parent.postMessage({t:"es",brand:state.brand,lang:state.lang},"*");}}}catch(e){}},400);})();

renderLangs();
renderStatic();
</script>
</body>
</html>
