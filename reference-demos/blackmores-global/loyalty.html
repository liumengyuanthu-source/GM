  .node{background:var(--soft);color:var(--brand);font-weight:700;border-radius:9px;padding:9px 13px}
  .arr{color:var(--muted);font-weight:700}

  .link{background:var(--soft);border-radius:10px;padding:11px;font-size:13px;font-weight:600;color:var(--brand);margin-top:6px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%);opacity:1}
  .fab{position:fixed;right:20px;bottom:20px;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:21px;box-shadow:0 10px 26px rgba(0,0,0,.2);cursor:pointer;z-index:40}
  @media(max-width:640px){.kpi{grid-template-columns:1fr}.ladder{flex-wrap:wrap}.step{min-width:70px}}
</style>

  $('#segM').classList.toggle('on',state.view==='member');$('#segB').classList.toggle('on',state.view==='brand');}

function renderMember(){const u=U(),t=tierOf(state.pts),nx=nextTier(state.pts);
  const lo=t.at,hi=nx?nx.at:t.at;const pct=nx?Math.min(100,Math.round((state.pts-lo)/(hi-lo)*100)):100;
  const unlocked=[];TIERS.forEach(tr=>{if(state.pts>=tr.at&&BENES[tr.k])BENES[tr.k].forEach(b=>unlocked.push(b));});
  const allB=[...(BENES.silver||[]),...(BENES.gold||[]),...(BENES.plat||[])];
  $('#main').innerHTML=`
  <div class="mcard" id="mcard">
    <div class="mtop"><div><div class="tier" id="tierName">${L(t.n)}</div><div class="who">${u.who}</div></div>
      <div class="tieremo" id="tierEmo">${t.e}</div></div>
    <div class="pts"><span id="ptsN">${state.pts}</span> <small>pts</small></div>
    <div class="prog"><i id="bar" style="width:${pct}%"></i></div>
    <div class="next" id="nextTxt">${nx?((hi-state.pts)+' '+u.to(L(nx.n))):u.maxed}</div>
    <div style="font-size:11px;opacity:.65;margin-top:6px;font-weight:500;letter-spacing:.01em;">${u.across}</div>
  </div>
  <div class="row"><button class="btn p" id="sim">${u.sim}</button><button class="btn o" id="refer">${u.refer}</button></div>
  <div class="ladder">${TIERS.map(tr=>`<div class="step ${state.pts>=tr.at?(tr.k===t.k?'on':'done'):''}"><span class="e">${tr.e}</span>${L(tr.n)}</div>`).join('')}</div>
  <div class="benes"><h3>${u.benefits}</h3><div class="bgrid">${allB.map(b=>{
    const has=unlocked.includes(b);return `<div class="bene ${has?'':'locked'}">${b.e} ${L(b.t)}</div>`;}).join('')}</div></div>
  <div class="sect"><h3>${u.rewardsT}</h3>${REWARDS.map((r,i)=>{
    const done=state.redeemed.includes(i);const can=state.pts>=r.cost&&!done;
    return `<div class="rcard ${done?'done':''}"><span class="re">${r.e}</span>
      <span class="rt">${L(r.t)}</span><span class="rc">${r.cost} pts</span>
      <button class="rbtn" data-rw="${i}" ${can?'':'disabled'}>${done?u.redeemed:u.redeem}</button></div>`;}).join('')}</div>
  <div class="sect"><h3>${u.historyT}</h3>${HISTORY.map(h=>`<div class="hcard"><span class="he">${h.e}</span>
    <span class="ht">${L(h.t)}</span><span class="hd">${L(h.d)}</span><span class="hp">+${h.pts} pts</span></div>`).join('')}</div>`;
  $('#sim').onclick=simulate;$('#refer').onclick=referModal;
  $$('.rbtn[data-rw]').forEach(b=>b.onclick=()=>redeem(+b.dataset.rw));
}
function redeem(i){const r=REWARDS[i];if(!r||state.redeemed.includes(i)||state.pts<r.cost)return;
  state.pts-=r.cost;state.redeemed.push(i);toast('🎁 -'+r.cost+' pts · '+L(r.t));renderMember();}
function simulate(){const before=tierOf(state.pts);const add=120+Math.floor(Math.random()*90);
  state.pts+=add;const after=tierOf(state.pts);toast(U().pointsAdded(add));
  // animate number + bar
  const nx=nextTier(state.pts);const t=after;const lo=t.at,hi=nx?nx.at:t.at;
  const pct=nx?Math.min(100,Math.round((state.pts-lo)/(hi-lo)*100)):100;
  $('#ptsN').textContent=state.pts;$('#bar').style.width=pct+'%';
  $('#nextTxt').textContent=nx?((hi-state.pts)+' '+U().to(L(nx.n))):U().maxed;
  if(after.k!==before.k){levelUp(after);} 
}
function levelUp(t){const u=U();const card=$('#mcard');card.classList.add('up');
  $('#tierName').textContent=L(t.n);$('#tierEmo').textContent=t.e;
  // sparkles
  for(let i=0;i<6;i++){const s=document.createElement('div');s.className='spark';s.textContent='✨';
    s.style.left=(20+Math.random()*60)+'%';s.style.top=(30+Math.random()*40)+'%';card.appendChild(s);
    setTimeout(()=>s.classList.add('go'),i*60);setTimeout(()=>s.remove(),1400);}
  setTimeout(()=>card.classList.remove('up'),900);
  // refresh ladder + freshly unlocked benefits
  setTimeout(()=>{renderMember();const fresh=BENES[t.k]||[];
    const labels=fresh.map(b=>L(b.t));$$('.bene').forEach(el=>{if(labels.some(x=>el.textContent.includes(x)))el.classList.add('fresh');});
    toast('🎉 '+u.up(L(t.n)));},950);
}
function referModal(){const u=U();$('#modal').innerHTML=`<button class="x" id="rx">✕</button>
  <h3>🎁 ${u.referT}</h3><p style="color:var(--muted);font-size:13.5px">${u.referB}</p>
  <div class="poster"><div class="big">${u.referBig}</div><div style="font-size:13px;opacity:.85;margin-top:4px">${BRANDS[state.brand].name} Rewards</div></div>
  <div class="link" id="lnk">${BRANDS[state.brand].name.toLowerCase().replace(/[^a-z]/g,'')}.rewards/u/ALEX200 📋</div>`;
  $('#ov').classList.add('open');$('#rx').onclick=()=>$('#ov').classList.remove('open');
  $('#lnk').onclick=()=>{$('#ov').classList.remove('open');toast('📋 '+u.copied);};}
$('#ov').onclick=e=>{if(e.target.id==='ov')$('#ov').classList.remove('open');};

function renderBrand(){const u=U();const fun=[["Prospect",100],["Member",68],["Silver",41],["Gold",22],["Black Gold",9]];
  $('#main').innerHTML=`<div class="kpi">
    <div class="kc"><b>128k</b><small>${u.kAct}</small></div>
    <div class="kc"><b>64%</b><small>${u.kRep}</small></div>
    <div class="kc"><b>${money(340)}</b><small>${u.kLtv}</small></div></div>
  <div class="panel funnel"><h3>${u.funnelT}</h3>${fun.map(f=>`<div class="fr"><div class="fl">${f[0]}</div>
    <div class="fb" style="width:${f[1]}%">${f[1]}%</div></div>`).join('')}</div>
  <div class="panel"><h3>${u.crossT}</h3>
    <div class="flow"><span class="node">🍊 Vitamin C</span><span class="arr">→</span>
      <span class="node">🦠 Probiotics</span><span class="arr">→</span>
      <span class="node">🐟 Fish Oil</span><span class="arr">→</span>
      <span class="node">🦴 Glucosamine</span></div>
    <p style="font-size:13px;color:var(--muted);margin-top:12px">${u.crossNote}</p>
    </div>`;
}

function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brand').innerHTML=b.logo+(b.sup?`<sup>${b.sup}</sup>`:'');}
function applyText(){const u=U();$('#sub').textContent=u.sub;$('#segM').textContent=u.member;$('#segB').textContent=u.brand;
  document.documentElement.lang=state.lang;}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

$('#seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;state.view=b.dataset.v;render();});
$('#fab').onclick=()=>{const k=Object.keys(BRANDS);const i=k.indexOf(state.brand);state.brand=k[(i+1)%k.length];
  applyBrand();render();toast('🎨 '+BRANDS[state.brand].name);};
function renderLangs(){const box=document.querySelector('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();applyText();render();};box.appendChild(b);});}
const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
renderLangs();

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_m=_p.get("market"),_l=_p.get("lang");if(_b&&typeof BRANDS!=="undefined"&&BRANDS[_b])state.brand=_b;if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(_m&&CURRENCY[_m])state.market=_m;}catch(e){}
window.addEventListener("message",function(e){try{var d=e.data;if(d&&d.t==="es"&&d.market&&CURRENCY[d.market]&&d.market!==state.market){state.market=d.market;render();}}catch(err){}});
applyBrand();applyText();render();
(function(){var _l="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"")+"|"+(state.market||"");if(c!==_l){_l=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null,market:state.market||null},"*");}}catch(e){}},400);})();
</script>
<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent=".langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
</body>
