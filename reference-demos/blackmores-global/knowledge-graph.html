<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph · Blackmores · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --neg:#c0563f; --warn:#b5731a; --black:#0b1320;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN','Songti SC',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--black);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto;padding:14px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px;color:#fff;letter-spacing:.02em}
  .brand sup{font-size:9px;color:#7fb2dc}
  .sub{font-size:11px;color:#9fb4c8;border-left:1px solid #2a3647;padding-left:12px;letter-spacing:.04em}
  .sp{flex:1}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.06);border:1px solid #2a3647;border-radius:9px;padding:3px}
  .langs button{border:0;background:0;font:inherit;font-size:12px;font-weight:700;color:#9fb4c8;min-width:30px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.15s}
  .langs button.on{background:#fff;color:var(--brand-d)}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 70px}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);font-weight:700}
  h1.h{font-family:var(--display);font-weight:400;font-size:clamp(22px,4.8vw,30px);margin:9px 0 6px;line-height:1.18}
  .lead{color:var(--muted);font-size:14px;max-width:60ch}

  .whatis{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:18px}
  .whatis .ic{font-size:22px;flex-shrink:0}
  .whatis .wt{font-weight:700;font-size:13.5px;margin-bottom:3px}
  .whatis .wd{font-size:12.5px;color:var(--muted);line-height:1.5}

  .stagelab{display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:26px 0 12px}
  .stagelab .n{width:21px;height:21px;border-radius:50%;background:var(--ink);color:var(--bg);display:grid;place-items:center;font-size:11px;font-family:var(--display)}

  /* sources */
  .sources{display:flex;flex-wrap:wrap;gap:10px}
  .src{flex:1 1 150px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;transition:.4s;position:relative}
  .src .sk{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;display:flex;gap:6px;align-items:center;margin-bottom:6px}
  .src .st{font-size:12.5px;color:var(--ink);line-height:1.45}
  .src.adj .st{color:var(--muted);font-style:italic}
  .src .stamp{position:absolute;top:9px;right:10px;font-size:10px;font-weight:800;color:var(--accent);opacity:0;transition:.4s}
  .extracting .src{opacity:.6;transform:scale(.985)}
  .extracting .src .stamp{opacity:1}
  .extracting .src.adj{opacity:.42}
  .extracting .src.adj .stamp{color:var(--neg)}

  /* build stepper */
  .steps{display:flex;margin:16px 0 6px}
  .step{flex:1;text-align:center;position:relative;opacity:.4;transition:.4s}
  .step.on{opacity:1}
  .step .sd{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);background:var(--card);display:grid;place-items:center;margin:0 auto 7px;font-weight:700;font-size:14px;color:var(--muted);transition:.3s;position:relative;z-index:2}
  .step.on .sd{border-color:var(--brand);background:var(--brand);color:#fff}
  .step.done .sd{border-color:var(--accent);background:var(--accent);color:#fff}
  .step .sl{font-size:11.5px;font-weight:700;color:var(--ink)}
  .step .ss{font-size:10px;color:var(--muted);margin-top:1px}
  .step::after{content:"";position:absolute;top:15px;left:62%;right:-38%;height:2px;background:var(--line);z-index:1;transition:.3s}
  .step:last-child::after{display:none}
  .step.done::after{background:var(--accent)}

  .gobtn{display:block;width:100%;max-width:340px;margin:16px auto 0;border:0;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;
    font:inherit;font-weight:700;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer;transition:.2s;letter-spacing:.01em}
  .gobtn:hover{transform:translateY(-2px)}
  .gobtn.hide{display:none}
  .gobtn[disabled]{opacity:.6;cursor:default;transform:none}

  /* graph */
  .stage2{display:none}.stage2.show{display:block;animation:fin .4s ease}
  @keyframes fin{from{opacity:0;transform:translateY(8px)}}
  .graph{position:relative;width:100%;max-width:480px;margin:6px auto 0;aspect-ratio:36/30}
  .graph svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .edge{stroke:var(--line);stroke-width:1.4;opacity:0;transition:opacity .5s,stroke .25s;vector-effect:non-scaling-stroke}
  .built .edge{opacity:1}
  .edge.hot{stroke:var(--brand);stroke-width:2.4}
  .edge.dim{opacity:.2}
  .node{position:absolute;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .45s,transform .45s,border-color .25s,background .25s;
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;box-shadow:0 3px 10px rgba(22,32,31,.05)}
  .node .k{display:block;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:1px}
  .built .node{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .node.center{background:var(--ink);color:#fff;border-color:var(--ink);font-family:var(--display);font-weight:500;font-size:13.5px;padding:11px 16px;box-shadow:0 8px 22px rgba(22,32,31,.25);z-index:3}
  .node.hot{border-color:var(--brand);background:var(--soft);color:var(--brand-d);box-shadow:0 6px 16px rgba(0,91,150,.22);z-index:2}
  .node.dim{opacity:.4}
  .node .lock{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;display:none;place-items:center;box-shadow:0 2px 6px rgba(10,157,78,.4)}
  .governed .node.gov .lock{display:grid}
  .glegend{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
  .glegend b{color:var(--accent)}

  /* use cases */
  .stage3{display:none;margin-top:8px}.stage3.show{display:block;animation:fin .4s ease}
  .ucsub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px}
  .qchips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .qchip{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
  .qchip . qi{font-size:14px}
  .qchip.on{border-color:var(--brand);color:var(--brand-d);background:var(--soft)}
  .ansbox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px;min-height:120px}
  .ansbox.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center}
  .ans{animation:fin .3s ease}
  .ans .qq{font-size:12.5px;color:var(--muted);margin-bottom:7px}
  .ans .qq b{color:var(--ink);font-weight:700}
  .ans .a{font-size:14.5px;line-height:1.5}.ans .a b{color:var(--brand-d)}
  .ans .a.block b{color:var(--neg)}
  .path{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:12px;font-size:12px}
  .path .pl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;width:100%;margin-bottom:1px}
  .path .pn{background:var(--soft);color:var(--brand-d);border:1px solid var(--brand);border-radius:7px;padding:4px 9px;font-weight:700}
  .path .ar{color:var(--brand)}
  .grounded{margin-top:11px;font-size:12px;color:var(--muted);display:flex;gap:7px;align-items:center}
  .grounded b{color:var(--ink);font-weight:600}
  .applink{display:inline-flex;align-items:center;gap:6px;margin-top:13px;border:1px solid var(--brand);color:var(--brand-d);background:var(--soft);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:700;text-decoration:none;transition:.15s}
  .applink:hover{background:var(--brand);color:#fff}

  .reset{display:block;margin:18px auto 0;border:0;background:0;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;text-decoration:underline}
  .foot{text-align:center;font-family:var(--display);font-weight:400;font-size:clamp(16px,3vw,21px);color:var(--ink);margin:26px auto 0;max-width:36ch;line-height:1.35}
  .foot b{color:var(--brand);font-weight:600}
  .srcnote{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;letter-spacing:.02em}
  .khsec{width:min(1180px,calc(100vw - 36px));margin-left:50%;transform:translateX(-50%);margin-top:44px;border-top:1px solid var(--line);padding:30px 4px 0}
  .khhead{margin-bottom:22px}
  .khtitle{font-family:var(--display);font-weight:400;font-size:clamp(20px,3.4vw,27px);line-height:1.2;margin:8px 0 6px}
  .khrow{display:flex;gap:24px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .khimg{flex:1 1 70%;min-width:0;position:relative;display:block;text-decoration:none}
  .khimg img{width:100%;display:block;border-radius:8px}
  .khno{position:absolute;top:10px;left:10px;background:var(--brand);color:#fff;font-family:var(--display);font-size:12.5px;font-weight:700;padding:3px 9px;border-radius:7px;letter-spacing:.04em;box-shadow:0 1px 4px rgba(0,0,0,.18)}
  .khtext{flex:1 1 30%;min-width:0}
  .kht{font-family:var(--display);font-size:16.5px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:9px}
  .khp{font-size:13.2px;color:var(--muted);line-height:1.6;margin-bottom:8px}
  .khp:last-child{margin-bottom:0}
  @media(max-width:760px){.khrow{flex-direction:column;align-items:flex-start;gap:14px}.khimg,.khtext{flex:1 1 auto;width:100%}}
  @media(max-width:560px){.step .ss{display:none}.node{font-size:11px;padding:6px 9px}.node.center{font-size:12px}}
</style>
</head>
<body>
<header><div class="nav">
  <div class="brand" id="brand">Blackmores<sup>®</sup></div>
  <div class="sub" id="sub">Knowledge Graph</div>
  <div class="sp"></div>
  <div class="langs" id="langs"></div>
</div></header>

<div class="wrap">
  <div class="eyebrow" id="eye">Knowledge Foundation · Knowledge Graph</div>
  <h1 class="h" id="title"></h1>
  <div class="lead" id="lead"></div>

  <div class="whatis"><span class="ic">🧩</span><div><div class="wt" id="wt"></div><div class="wd" id="wd"></div></div></div>

  <div class="stagelab"><span class="n">1</span><span id="s1lab"></span></div>
  <div class="sources" id="sources"></div>

  <div class="stagelab"><span class="n">2</span><span id="s2lab"></span></div>
  <div class="steps" id="steps"></div>
  <button class="gobtn" id="go"></button>

  <div class="stage2" id="stage2">
    <div class="stagelab"><span class="n">3</span><span id="s3lab"></span></div>
    <div class="graph" id="graph"></div>
    <div class="glegend" id="glegend"></div>
  </div>

  <div class="stage3" id="stage3">
    <div class="stagelab"><span class="n">4</span><span id="s4lab"></span></div>
    <div class="ucsub" id="ucsub"></div>
    <div class="qchips" id="qchips"></div>
    <div class="ansbox empty" id="ansbox"></div>
    <div class="foot" id="foot"></div>
  </div>

  <button class="reset" id="reset" style="display:none"></button>
  <div class="srcnote" id="srcnote"></div>
  <div class="khsec" id="khsec"></div>
</div>

<script>
const T={
  sub:{en:"Knowledge Graph",zh:"知识图谱",ja:"ナレッジグラフ",th:"Knowledge Graph"},
  eye:{en:"Knowledge Foundation · Knowledge Graph",zh:"知识底座 · 知识图谱",ja:"ナレッジ基盤 · ナレッジグラフ",th:"ฐานความรู้ · Knowledge Graph"},
  title:{en:"From scattered product, claim and channel facts to a graph every AI scene can trust.",zh:"从散乱的产品、宣称与渠道事实,到每个 AI 场景都能信赖的图谱。",ja:"散在する製品・表示・チャネル事実から、あらゆるAIシーンが信頼できるグラフへ。",th:"จากข้อมูลสินค้า การกล่าวอ้าง และช่องทางที่กระจัดกระจาย สู่กราฟที่ทุกซีน AI เชื่อถือได้"},
  lead:{en:"Blackmores' product truth spans ingredient specs, TGA permitted indications, market claim rules, PDP content, FAQs, reviews, pharmacy training and marketplace operations. Build it into a governed knowledge graph once — then recommendation, GEO, AIGC, compliance review, service and channel enablement all reason over the same trusted facts.",
    zh:"Blackmores 的产品事实分散在成分规格、TGA 许可功效、各市场宣称规则、商品详情页、FAQ、评论、药房培训和平台运营资料中。一次性把它建成受治理的知识图谱——推荐、GEO、AIGC、合规审核、客服和渠道赋能都能在同一套可信事实上推理。",
    ja:"Blackmoresの製品事実は、成分仕様・TGA許可表示・各市場の表示規制・PDPコンテンツ・FAQ・レビュー・薬局研修・マーケットプレイス運用にまたがります。一度統制されたナレッジグラフに構築すれば、推薦・GEO・AIGC・コンプラ審査・サービス・チャネル支援が同じ信頼できる事実で動きます。",
    th:"ข้อมูลผลิตภัณฑ์ Blackmores กระจายอยู่ในสเปก ข้อบ่งใช้ที่ TGA อนุญาต FAQ รีวิว และกฎหมาย สร้างเป็น knowledge graph ครั้งเดียว ทุกซีน AI ก็อ้างอิงข้อเท็จจริงชุดเดียวกัน"},
  wt:{en:"What is a knowledge graph?",zh:"什么是知识图谱?",ja:"ナレッジグラフとは?",th:"Knowledge graph คืออะไร?"},
  wd:{en:"Not a folder of files — a network of facts. Entities (product, ingredient, claim, evidence, regulation, market, channel and consumer need) are linked by relationships, so AI can trace why it recommends, approves, blocks or rewrites something.",
    zh:"它不是一堆文件,而是一张事实网络。把产品、成分、宣称、证据、法规、市场、渠道和消费者需求用关系连起来,AI 才能解释为什么推荐、批准、拦截或改写某个内容。",
    ja:"ファイルの集まりではなく、事実のネットワーク。製品・成分・表示・根拠・規制・市場・チャネル・顧客ニーズを関係で結び、AIが推薦・承認・ブロック・書き換えの理由を追跡できるようにします。",
    th:"ไม่ใช่โฟลเดอร์ไฟล์ แต่เป็นเครือข่ายข้อเท็จจริง เชื่อมเอนทิตี (สินค้า ส่วนผสม การกล่าวอ้าง กฎหมาย ผู้บริโภค) ด้วยความสัมพันธ์ AI จึงไล่ตามลิงก์เพื่อให้เหตุผลแทนการเดา"},
  s1:{en:"Scattered sources",zh:"散乱的来源",ja:"散在する情報源",th:"แหล่งข้อมูลกระจัดกระจาย"},
  s2:{en:"Build it — step by step",zh:"一步步构建",ja:"一歩ずつ構築",th:"สร้างทีละขั้น"},
  s3:{en:"The knowledge graph",zh:"知识图谱",ja:"ナレッジグラフ",th:"กราฟความรู้"},
  s4:{en:"One graph · every use case",zh:"一张图谱 · 每个场景",ja:"一つのグラフ · あらゆる活用",th:"กราฟเดียว · ทุกกรณีใช้งาน"},
  go:{en:"▶ Build the graph",zh:"▶ 开始构建",ja:"▶ グラフを構築",th:"▶ สร้างกราฟ"},
  building:{en:"Building…",zh:"构建中…",ja:"構築中…",th:"กำลังสร้าง…"},
  reset:{en:"↺ Run again",zh:"↺ 再来一次",ja:"↺ もう一度",th:"↺ เริ่มใหม่"},
  extracted:{en:"✓ facts extracted",zh:"✓ 已提取事实",ja:"✓ 事実を抽出",th:"✓ สกัดข้อเท็จจริง"},
  noparse:{en:"⚠ marketing — no parsable fact",zh:"⚠ 营销话术 — 无可解析事实",ja:"⚠ 宣伝表現 — 解析可能な事実なし",th:"⚠ การตลาด — ไม่มีข้อเท็จจริง"},
  legend:{en:"🔒 = governed node — every claim traces to evidence & regulation.",zh:"🔒 = 受治理节点 — 每条宣称都可追溯到根据与法规。",ja:"🔒 = 治理対象ノード — 各表示は根拠と規制に追跡可能。",th:"🔒 = โหนดที่กำกับดูแล — ทุกการอ้างอิงสืบย้อนถึงหลักฐานและกฎหมาย"},
  ucsub:{en:"Pick a scene — see which facts the graph reads, and which demo it powers.",zh:"选一个场景——看图谱读取了哪些事实,以及它驱动了哪个 demo。",ja:"シーンを選択——グラフが読む事実と、それが動かすデモを確認。",th:"เลือกซีน — ดูว่ากราฟอ่านข้อเท็จจริงใด และขับเคลื่อนเดโมไหน"},
  pathLab:{en:"Reading path",zh:"读取路径",ja:"読み取り経路",th:"เส้นทางการอ่าน"},
  grounded:{en:"<b>Grounded in the graph</b> — traceable, not guessed.",zh:"<b>来自图谱</b>——可追溯,不是凭猜。",ja:"<b>グラフに基づく</b>——追跡可能、当て推量なし。",th:"<b>อิงจากกราฟ</b> — สืบย้อนได้ ไม่ใช่การเดา"},
  powers:{en:"Powers",zh:"驱动",ja:"動かすデモ",th:"ขับเคลื่อน"},
  foot:{en:"One knowledge graph — powering <b>every scene</b>.",zh:"同一张知识图谱——驱动<b>每一个场景</b>。",ja:"一つのナレッジグラフが、<b>すべてのシーン</b>を動かす。",th:"กราฟความรู้เดียว ขับเคลื่อน<b>ทุกซีน</b>"},
  srcnote:{en:"Illustrative demo · Blackmores · Knowledge Foundation — Knowledge Graph",zh:"演示示意 · 百立美 · 知识底座——知识图谱",ja:"デモ示意 · ブラックモアズ · ナレッジ基盤——ナレッジグラフ",th:"เดโมประกอบ · Blackmores · ฐานความรู้ — Knowledge Graph"}
};
const STEPS=[
  {ic:"📥",l:{en:"Ingest",zh:"收集",ja:"収集",th:"รวบรวม"},s:{en:"gather sources",zh:"汇聚来源",ja:"情報源を集約",th:"รวมแหล่ง"}},
  {ic:"🔎",l:{en:"Extract",zh:"抽取",ja:"抽出",th:"สกัด"},s:{en:"parse facts",zh:"解析事实",ja:"事実を解析",th:"แยกข้อเท็จจริง"}},
  {ic:"🕸️",l:{en:"Link",zh:"连结",ja:"連結",th:"เชื่อม"},s:{en:"entities + relations",zh:"实体+关系",ja:"エンティティ+関係",th:"เอนทิตี+ความสัมพันธ์"}},
  {ic:"🔒",l:{en:"Govern",zh:"治理",ja:"治理",th:"กำกับ"},s:{en:"evidence + regulation",zh:"根据+法规",ja:"根拠+規制",th:"หลักฐาน+กฎหมาย"}}

let state={lang:"en",built:false,governed:false,q:null,brand:"blackmores"};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const L=o=>o[state.lang]||o.ja||o.en;
const nodeByK=k=>NODES.find(n=>n.k===k);
let _brand="blackmores",_mkt="AU";

function renderStatic(){
  $('#sub').textContent=L(T.sub);$('#eye').textContent=L(T.eye);$('#title').textContent=L(T.title);$('#lead').textContent=L(T.lead);
  $('#wt').textContent=L(T.wt);$('#wd').textContent=L(T.wd);
  $('#s1lab').textContent=L(T.s1);$('#s2lab').textContent=L(T.s2);$('#s3lab').textContent=L(T.s3);$('#s4lab').textContent=L(T.s4);
  $('#go').textContent=state.built?L(T.building):L(T.go);
  $('#reset').textContent=L(T.reset);$('#srcnote').textContent=L(T.srcnote);
  $('#glegend').innerHTML=L(T.legend);$('#ucsub').textContent=L(T.ucsub);$('#foot').innerHTML=L(T.foot);
  document.documentElement.lang=state.lang;
  $('#sources').innerHTML=SRC.map(s=>`<div class="src ${s.adj?'adj':''}">
    <div class="sk">${s.ic} ${L(s.k)}</div><div class="st">${L(s.t)}</div>
    <div class="stamp">${s.adj?L(T.noparse):L(T.extracted)}</div></div>`).join('');
  $('#steps').innerHTML=STEPS.map((s,i)=>`<div class="step" data-s="${i}"><div class="sd">${i+1}</div><div class="sl">${s.ic} ${L(s.l)}</div><div class="ss">${L(s.s)}</div></div>`).join('');
  buildGraphDom();
  renderAsk();
}
function buildGraphDom(){
  const C=nodeByK('center');
  const edges=NODES.filter(n=>n.k!=='center').map(n=>`<line class="edge" data-k="${n.k}" x1="${C.x*3.6}" y1="${C.y*3}" x2="${n.x*3.6}" y2="${n.y*3}"/>`).join('');
  const nodes=NODES.map((n,i)=>`<div class="node ${n.k==='center'?'center':''} ${n.gov?'gov':''}" data-k="${n.k}" style="left:${n.x}%;top:${n.y}%;transition-delay:${n.k==='center'?0:0.05+i*0.05}s">
    ${n.kk?`<span class="k">${L(n.kk)}</span>`:''}${L(n.lab)}<span class="lock">🔒</span></div>`).join('');
  const g=$('#graph');g.innerHTML=`<svg viewBox="0 0 360 300" preserveAspectRatio="none">${edges}</svg>${nodes}`;
  g.classList.toggle('built',state.built);g.classList.toggle('governed',state.governed);
}
function renderAsk(){
  $('#qchips').innerHTML=QS.map((x,i)=>`<button class="qchip ${state.q===i?'on':''}" data-q="${i}"><span class="qi">${x.ic}</span>${L(x.scn)}</button>`).join('');
  $$('#qchips .qchip').forEach(b=>b.onclick=()=>selectQ(+b.dataset.q));
  const box=$('#ansbox');
  if(state.q===null){box.className='ansbox empty';box.textContent=L(T.ucsub);highlight(null);return;}
  const x=QS[state.q];box.className='ansbox';
  const pn=x.path.map(k=>L(nodeByK(k).lab)).map(t=>`<span class="pn">${t}</span>`).join('<span class="ar">→</span>');
  const d=DEMO[x.demo];
  box.innerHTML=`<div class="ans"><div class="qq"><b>${L(x.scn)}</b> · ${L(x.q)}</div>
    <div class="a ${x.block?'block':''}">${L(x.a)}</div>
    <div class="path"><span class="pl">${L(T.pathLab)}</span>${pn}</div>
    <div class="grounded">${L(T.grounded)}</div>
    <a class="applink" href="${d.f}?brand=${_brand}&market=${_mkt}&lang=${state.lang}">${L(T.powers)}: ${L(d.t)} →</a></div>`;
  highlight(x.hot);
}
function highlight(hot){
  $$('#graph .node').forEach(n=>{const k=n.dataset.k;n.classList.remove('hot','dim');
    if(!hot||k==='center')return; if(hot.includes(k))n.classList.add('hot');else n.classList.add('dim');});
  $$('#graph .edge').forEach(e=>{const k=e.dataset.k;e.classList.remove('hot','dim');
    if(!hot)return; if(hot.includes(k))e.classList.add('hot');else e.classList.add('dim');});
}
function selectQ(i){state.q=i;renderAsk();}

function setStep(i,cls){const el=document.querySelector(`.step[data-s="${i}"]`);if(el){el.classList.remove('on','done');if(cls)el.classList.add(cls);}}
function build(){
  if(state.built)return;
  const go=$('#go');go.disabled=true;go.textContent=L(T.building);
  // step 1 ingest
  setStep(0,'on');
  setTimeout(()=>{ // step 2 extract
    setStep(0,'done');setStep(1,'on');$('#sources').classList.add('extracting');
  },650);
  setTimeout(()=>{ // step 3 link → reveal graph
    setStep(1,'done');setStep(2,'on');
    state.built=true;$('#stage2').classList.add('show');$('#graph').classList.add('built');$('#reset').style.display='block';
  },1450);
  setTimeout(()=>{ // step 4 govern → locks
    setStep(2,'done');setStep(3,'on');
    state.governed=true;$('#graph').classList.add('governed');
  },2250);
  setTimeout(()=>{ // done → use cases
    setStep(3,'done');go.classList.add('hide');
    $('#stage3').classList.add('show');
  },2900);
}
$('#go').onclick=build;
$('#reset').onclick=()=>{state.built=false;state.governed=false;state.q=null;
  $('#go').classList.remove('hide');$('#go').disabled=false;$('#go').textContent=L(T.go);
  $('#sources').classList.remove('extracting');
  $('#stage2').classList.remove('show');$('#stage3').classList.remove('show');$('#reset').style.display='none';
  STEPS.forEach((_,i)=>setStep(i,null));
  buildGraphDom();renderAsk();window.scrollTo({top:0,behavior:'smooth'});};

const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';
  b.onclick=()=>{state.lang=k;renderLangs();const wasBuilt=state.built,wasGov=state.governed,wasQ=state.q;renderStatic();
    if(wasBuilt){$('#stage2').classList.add('show');$('#graph').classList.add('built');$('#reset').style.display='block';$('#go').classList.add('hide');
      if(wasGov)$('#graph').classList.add('governed');$('#stage3').classList.add('show');
      STEPS.forEach((_,i)=>setStep(i,'done'));}
    state.q=wasQ;renderAsk();};box.appendChild(b);});}

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_l=_p.get("lang"),_m=_p.get("market");
  if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(_b)_brand=_b;if(_m)_mkt=_m;}catch(e){}
renderLangs();renderStatic();

  {img:"kh-assets/kh-07.jpg",t:{en:"Process knowledge: claim and content approval flows",zh:"流程知识：宣称与内容审批流",ja:"プロセス知識：表示・コンテンツ承認フロー",th:"Process knowledge"},
   p:{en:["Some knowledge is not a paragraph; it is a workflow: content brief, claim check, legal review, market approval, platform upload and post-launch monitoring.","Turning approval flows into graph structures lets AI explain where a campaign is blocked, who owns the next action and what evidence is missing."],

      ja:["知識の中には文章ではなくワークフローがあります：コンテンツbrief、表示チェック、法務レビュー、市場承認、プラットフォーム掲載、公開後監視。","承認フローをグラフ化すると、AIはキャンペーンがどこで止まり、次の担当者が誰で、何の根拠が不足しているかを説明できます。"],
      th:["Knowledge บางอย่างไม่ใช่ paragraph แต่เป็น workflow: content brief, claim check, legal review, market approval, platform upload และ post-launch monitoring","เมื่อเปลี่ยน approval flow เป็น graph AI จะอธิบายได้ว่า campaign ติดตรงไหน ใครเป็น owner และขาด evidence อะไร"]}},

function renderKH(){
  const box=document.getElementById('khsec'); if(!box) return;
  const lang=(typeof state!=='undefined'&&state.lang)||'en';
  const pick=o=>o[lang]||o.en||o.ja;
  const head='<div class="khhead"><div class="eyebrow">'+pick(KH_INTRO.eye)+'</div><h2 class="khtitle">'+pick(KH_INTRO.title)+'</h2><div class="lead">'+pick(KH_INTRO.lead)+'</div></div>';
  const rows=KH.map((s,i)=>{
    const ps=(s.p[lang]||s.p.en).map(p=>'<p class="khp">'+p+'</p>').join('');
    const no=('0'+(i+1)).slice(-2);
    return '<div class="khrow"><a class="khimg" href="'+s.img+'" target="_blank" rel="noopener"><img loading="lazy" src="'+s.img+'" alt=""><span class="khno">'+no+'</span></a><div class="khtext"><div class="kht">'+pick(s.t)+'</div>'+ps+'</div></div>';
  }).join('');
  box.innerHTML=head+rows;
}
(function(){const original=renderStatic;renderStatic=function(){original();renderKH();};})();
renderKH();
