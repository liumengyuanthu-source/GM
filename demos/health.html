<meta charset="UTF-8">

<title>Blackmores · Health Twin · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --bio:#E91E63; --bio-br:#00CB5D; --bio-d:#14521D;
    --ink:#16201f; --muted:#6a7472; --bg:#eef3f8; --card:#fff; --line:#e6ecf2; --gold:#e8a33d;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:10px;max-width:460px;margin:0 auto;padding:11px 16px}
  .brand{font-family:var(--display);font-weight:700;font-size:18px}.brand sup{font-size:9px;color:var(--bio)}
  .subt{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:10px}.sp{flex:1}
  .linebadge{display:inline-flex;align-items:center;gap:4px;background:#06c755;color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px}
  .chip{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;position:relative}
  .menu{position:absolute;top:38px;right:0;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px;min-width:104px;box-shadow:0 12px 30px rgba(0,0,0,.12);display:none;z-index:50}
  .menu.open{display:block}.menu button{display:block;width:100%;border:0;background:0;font:inherit;font-size:13px;padding:7px 9px;border-radius:7px;cursor:pointer;text-align:left;color:var(--ink)}.menu button:hover{background:var(--soft)}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .frame{max-width:460px;margin:0 auto;padding:18px 16px 50px;min-height:80vh}

  /* progress dots */
  .dots{display:flex;gap:6px;justify-content:center;margin:6px 0 18px}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}.dots i.on{background:var(--brand)}.dots i.done{background:var(--bio)}

  /* onboarding */
  .ob{animation:fin .35s ease}@keyframes fin{from{opacity:0;transform:translateY(10px)}}
  .ob .step{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--bio);text-transform:uppercase}
  .ob h2{font-family:var(--display);font-weight:400;font-size:21px;margin:8px 0 5px;line-height:1.3}
  .ob .hint{font-size:12.5px;color:var(--muted);margin-bottom:18px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:15px 16px;font-size:15px;font-weight:600;text-align:left;display:flex;align-items:center;gap:12px;transition:.15s}
  .opt:hover{border-color:var(--brand);background:var(--soft)}
  .opt .oe{font-size:22px}
  .scoreform{text-align:center;margin:8px 0 14px}
  .scoreform .sn{font-family:var(--display);font-size:30px;font-weight:500;color:var(--brand)}
  .scoreform .sl{font-size:11px;color:var(--muted)}

  /* Health Twin mascot */
  .mascot{display:grid;place-items:center;margin:6px auto}
  .growbar{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;margin:10px auto 2px;max-width:240px}
  .growbar i{display:block;height:100%;background:linear-gradient(90deg,var(--bio),var(--bio-br));transition:width .5s}
  .growlab{font-size:11px;color:var(--muted);text-align:center}

  /* result */
  .scorebig{text-align:center;padding:18px 0 6px}
  .scorebig .ring{width:128px;height:128px;margin:0 auto;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--bio) calc(var(--p)*1%),var(--soft) 0);position:relative}
  .scorebig .ring::after{content:'';position:absolute;inset:11px;border-radius:50%;background:var(--card)}
  .scorebig .ring .v{position:relative;z-index:1;font-family:var(--display);font-size:34px;font-weight:500;color:var(--brand-d)}
  .scorebig .ring .v small{font-size:13px;color:var(--muted)}
  .scorebig .band{font-size:13px;font-weight:700;margin-top:9px}
  .advice{background:var(--soft);border-radius:14px;padding:14px;font-size:13px;line-height:1.6;margin:14px 0}
  .advice b{color:var(--brand-d)}
  .reccard{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:14px}
  .reccard img{width:46px;height:46px}
  .reccard .rn{font-weight:700;font-size:14px}.reccard .rw{font-size:11.5px;color:var(--muted);margin-top:2px}

  /* home */
  .home{animation:fin .35s ease}
  .hero{background:radial-gradient(120% 100% at 50% 0%,#0f6fb4,#009BA4 55%,#007A82);border-radius:20px;padding:16px 14px 14px;color:#fff;text-align:center;position:relative;overflow:hidden}
  .hero .sky{position:absolute;inset:0;background:radial-gradient(50% 38% at 80% 12%,rgba(255,255,255,.35),transparent 60%)}
  .hero>*{position:relative}
  .hero .tt{font-size:11px;font-weight:700;opacity:.9;letter-spacing:.04em}
  .hero .nm{font-family:var(--display);font-size:16px;margin-top:2px}
  .hero .st{font-size:11.5px;opacity:.92;margin-top:3px}.hero .st b{font-weight:800}
  .hero .scorepill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;margin-top:8px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px;cursor:pointer;transition:.15s}
  .tile:active{transform:scale(.98)}
  .tile.scan{background:linear-gradient(135deg,#eafaf0,#fff);border-color:#bfe9cf}
  .tile .ti{font-size:24px}.tile .th{font-weight:700;font-size:13.5px;margin-top:6px}.tile .ts{font-size:11px;color:var(--muted);margin-top:2px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-top:12px}
  .ch{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px}.ch .streak{margin-left:auto;font-size:11px;font-weight:800;color:var(--gold)}
  .days{display:flex;gap:4px;margin:11px 0}
  .days i{flex:1;height:26px;border-radius:6px;background:var(--soft);display:grid;place-items:center;font-size:9.5px;color:var(--brand);font-weight:700}
  .days i.done{background:var(--bio);color:#fff}.days i.today{outline:2px solid var(--brand);outline-offset:-2px}
  .ckbtn{width:100%;border:0;border-radius:12px;padding:13px;font-size:14px;font-weight:800;color:#fff;background:var(--brand);margin-top:4px}
  .ckbtn.done{background:var(--bio)}
  .sec{font-size:13px;font-weight:700;margin:16px 2px 8px}
  .fold{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-top:9px;overflow:hidden}
  .fold .fh{display:flex;align-items:center;gap:10px;padding:13px;cursor:pointer;font-weight:700;font-size:13.5px}
  .fold .fi{width:34px;height:34px;border-radius:10px;background:var(--soft);display:grid;place-items:center;font-size:17px}
  .fold .fa{margin-left:auto;color:var(--muted);transition:.2s}.fold.open .fa{transform:rotate(180deg)}
  .fold .fb{display:none;padding:0 13px 13px}.fold.open .fb{display:block}
  .trend{display:flex;align-items:flex-end;gap:5px;height:46px;margin-top:4px}
  .trend i{flex:1;background:var(--soft);border-radius:4px 4px 0 0}.trend i.up{background:linear-gradient(180deg,var(--bio-br),var(--bio))}
  .prow{display:flex;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line)}.prow:last-child{border-bottom:0}.prow .pk{color:var(--muted);width:120px;flex-shrink:0}.prow .pv{font-weight:600}
  .nutri{display:flex;gap:10px;align-items:center}.nutri .ni{width:40px;height:40px;border-radius:50%;background:#06c755;color:#fff;display:grid;place-items:center;font-size:18px}
  .nutri .nb{flex:1}.nutri .nt{font-weight:700;font-size:13px}.nutri .ns{font-size:11px;color:var(--muted)}

  /* AR scan overlay */
  .scan-mask{position:fixed;inset:0;z-index:60;background:rgba(8,16,28,.92);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;color:#fff}
  .scan-mask.open{display:flex}
  .viewf{width:230px;height:230px;border-radius:24px;position:relative;display:grid;place-items:center;margin-bottom:18px}
  .viewf .corner{position:absolute;width:30px;height:30px;border:3px solid var(--bio-br)}
  .viewf .c1{top:0;left:0;border-right:0;border-bottom:0;border-radius:12px 0 0 0}
  .viewf .c2{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 12px 0 0}
  .viewf .c3{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 12px}
  .viewf .c4{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 12px 0}
  .viewf .line{position:absolute;left:14px;right:14px;height:2px;background:var(--bio-br);box-shadow:0 0 12px var(--bio-br);top:14px;animation:scanline 1.4s ease-in-out infinite}
  @keyframes scanline{0%,100%{top:18px}50%{top:208px}}
  .viewf .obj{font-size:74px}
  .scan-tt{font-size:15px;font-weight:700}.scan-ts{font-size:12.5px;opacity:.8;margin-top:6px}
  .scan-done{animation:fin .4s}
  .scan-close{margin-top:20px;border:1px solid rgba(255,255,255,.3);background:0;color:#fff;font:inherit;font-weight:700;font-size:14px;padding:11px 22px;border-radius:12px}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:rgba(22,32,31,.95);color:#fff;font-size:13px;font-weight:600;padding:11px 17px;border-radius:11px;z-index:80;opacity:0;transition:.25s;max-width:88%}

  .proof{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:18px}
  .proof .ph{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .proof .pi{display:flex;gap:9px;font-size:12px;padding:6px 0;line-height:1.5}.proof .pe{flex-shrink:0}
  .points-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;margin-top:8px;margin-left:6px}
  .actrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .act{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 5px;text-align:center;cursor:pointer;transition:.15s}
  .act:active{transform:scale(.96)}.act .ai{font-size:21px}.act .al{font-size:10.5px;font-weight:700;margin-top:5px;line-height:1.2}
  .know-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-top:4px}
  .know-card{flex:0 0 150px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;transition:.15s}
  .know-card:active{transform:scale(.98)}.know-card .ki{font-size:24px}.know-card .kt{font-weight:700;font-size:13px;margin:7px 0 8px;line-height:1.35;min-height:35px}
  .know-card .kr{font-size:11px;font-weight:700;color:var(--brand)}
  .comm{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-top:9px}
  .comm .cjoin{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .mate{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}.mate:last-child{border-bottom:0}
  .mate .ma{width:34px;height:34px;border-radius:50%;background:var(--soft);display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .mate.you .ma{background:var(--brand);color:#fff}
  .mate .mn{font-weight:700;font-size:13px}.mate .md{font-size:11px;color:var(--muted)}
  .mate .cheerb{margin-left:auto;border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:700;color:var(--brand);cursor:pointer;flex-shrink:0}
  .mate .cheerb:hover{background:var(--soft)}
  .sheet-mask{position:fixed;inset:0;z-index:70;background:rgba(8,16,28,.45);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
  .sheet-mask.open{opacity:1;pointer-events:auto}
  .sheet{background:var(--card);width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:18px 18px 26px;transform:translateY(100%);transition:.28s;max-height:80vh;overflow:auto}
  .sheet-mask.open .sheet{transform:none}
  .sheet h3{font-family:var(--display);font-weight:500;font-size:19px;margin:6px 0 10px}
  .sheet .sb{font-size:13.5px;line-height:1.7;color:var(--ink)}
  .sheet .sx{float:right;border:0;background:var(--soft);width:30px;height:30px;border-radius:9px;font-size:15px;cursor:pointer}
  .sheet .sok{width:100%;border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:14px;padding:12px;border-radius:12px;margin-top:16px}
  .qopt{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;margin-top:9px;cursor:pointer;text-align:left;width:100%}
  .qopt:hover{border-color:var(--brand);background:var(--soft)}
</style>
</head>

  $$('.opt').forEach(b=>b.onclick=()=>{state.goal=b.dataset.g;state.stage="qs";state.q=0;state.ans=[];state.flags={};renderOnboard();});
}
/* Step B — targeted questions for the chosen goal */
function renderGoalQuestions(){
  const def=goalDef();if(!def){state.stage="goal";return renderGoalPick();}
  const qs=def.qs;
  if(state.q>=qs.length)return reveal();
  const item=qs[state.q],step=state.q+1;
  const dots=qs.map((_,i)=>`<i class="${i<state.q?'done':i===state.q?'on':''}"></i>`).join('');
  const sf=state.q>0?`<div class="scoreform"><div class="sn" id="sfNum">${runningScore()}</div><div class="sl">${L(T.vitality)}</div></div>`:'';
  $('#app').innerHTML=`<div class="ob">
    <div class="dots"><i class="done"></i><i class="on"></i><i></i></div>
    <div class="step">${L(T.qStepB)} · ${def.ic} ${L(def.t)} · ${L(T.qn)} ${step}/${qs.length}</div>
    <h2>${L(item.q)}</h2>
    ${sf}
    <div class="opts">${item.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="oe">${o.e}</span>${L(o.t)}</button>`).join('')}</div>
  </div>`;
  $$('.opt').forEach(b=>b.onclick=()=>{const o=item.opts[+b.dataset.i];state.ans[state.q]={v:o.v};if(o.key)state.flags[o.key]=1;state.q++;renderOnboard();});
}
function runningScore(){const sum=state.ans.reduce((a,x)=>a+(x?x.v:0),0);const n=Math.max(1,(goalDef()?goalDef().qs.length:5));return Math.round(40+Math.min(sum,n*2)/(n*2)*55);}
/* Step C — build the personalised plan */
function buildPlan(){
  const def=goalDef();
  const items=[...def.core];
  Object.keys(def.extra||{}).forEach(flag=>{if(state.flags[flag])def.extra[flag].forEach(p=>{if(!items.includes(p))items.push(p);});});
  return {goal:def.id,products:items,bundle:def.bundle,content:def.content,dose:def.dose};
}
function reveal(){
  const def=goalDef();
  const sum=state.ans.reduce((a,x)=>a+(x?x.v:0),0),n=def.qs.length;
  state.score=Math.round(40+Math.min(sum,n*2)/(n*2)*55);
  state.plan=buildPlan();
  state.screen="result";renderApp();
}

/* ---- RESULT — Step C personalised plan ---- */
function renderResult(){
  const def=goalDef(),plan=state.plan||buildPlan();
  const sc=state.score,band=sc<55?T.bandLow:sc<75?T.bandMid:T.bandHigh;
  const adv=sc<55?{ja:"この目標には伸びしろがあります。<b>1日1回のチェックイン</b>から、専属ナチュロパスのように無理なくいっしょに整えていきましょう。",en:"There's good room to support this goal. Like your naturopath-friend, I'll keep it gentle — start with <b>one check-in a day</b>.",zh:"这个目标有不小提升空间。像你的自然疗法好友一样，我们从<b>每天签到一次</b>慢慢来。"}
    :sc<75?{ja:"いい土台ができています。<b>14日チャレンジ</b>でこのプランを習慣にすれば、さらに安定します。",en:"You've got a solid base. The <b>14-day challenge</b> will help this plan stick.",zh:"基础不错。用 <b>14天挑战</b> 把这套方案养成习惯会更稳。"}
    :{ja:"とても good な状態！<b>ヘルスツインを育てながら</b>この調子をキープしましょう。",en:"Great shape! Keep it up while <b>growing your Health Twin</b>.",zh:"状态很好！<b>边养健康分身</b>边保持。"};
  const core=plan.products.map(id=>{const p=PRODUCTS[id];return `<div class="reccard"><img src="${p.img}" alt=""><div><div class="rn">${L(p.nm)}</div><div class="rw">${L(p.w)}</div></div></div>`;}).join('');
  const bd=BUNDLES[plan.bundle];
  const bimgs=bd.items.map(id=>`<img src="${PRODUCTS[id].img}" alt="" style="width:38px;height:38px;margin-right:-8px;border:1px solid var(--line);border-radius:8px;background:var(--card)">`).join('');
  const bundle=`<div class="reccard" style="background:var(--soft);border-color:#bfe9cf">
    <div style="display:flex;align-items:center;padding-left:8px">${bimgs}</div>
    <div style="margin-left:8px"><div class="rn">${L(bd.nm)} <span style="font-size:10px;color:var(--bio);font-weight:800">· ${L(T.bundleSave)}</span></div><div class="rw">${L(bd.w)}</div></div></div>`;
  const dose=plan.dose.map(d=>`<div class="prow"><div class="pv" style="width:100%">✔ ${L(d)}</div></div>`).join('');
  const content=plan.content.map(i=>{const k=KNOW[i];return `<div class="know-card" data-art="${i}" style="flex:0 0 auto;min-width:160px"><div class="ki">${k.ic}</div><div class="kt">${L(k.t)}</div><div class="kr">${L(EXT.read)} ›</div></div>`;}).join('');
  $('#app').innerHTML=`<div class="ob">
    <div class="step" style="text-align:center">${L(T.planStep)}</div>
    <h2 style="text-align:center;font-size:18px">${L(T.planFor)}${def.ic} ${L(def.t)}</h2>
    <div class="scorebig"><div class="ring" style="--p:${sc}"><span class="v">${sc}<small>/100</small></span></div>
      <div class="band" style="color:${sc<55?'var(--gold)':'var(--bio)'}">${L(band)}</div></div>
    <div class="advice">🧠 ${L(adv)}</div>
    <div class="step" style="margin-bottom:8px">${L(T.coreLabel)}</div>
    ${core}
    <div class="step" style="margin-bottom:8px">${L(T.bundleLabel)}</div>
    ${bundle}
    <div class="step" style="margin-bottom:8px">${L(T.doseLabel)}</div>
    <div class="card" style="margin-top:0;padding:6px 14px">${dose}</div>
    <div class="step" style="margin:16px 0 8px">${L(T.contentLabel)}</div>
    <div class="know-scroll">${content}</div>
    <div class="mascot" style="margin-top:14px">${be80(0,110)}</div>
    <div class="growlab">${L(T.twinFeed)}</div>
    <button class="ckbtn" id="startCh" style="margin-top:16px">${L(T.startChallenge)}</button>
  </div>`;
  $$('[data-art]').forEach(c=>c.onclick=()=>openArticle(+c.dataset.art));
  $('#startCh').onclick=()=>{state.screen="home";renderApp();};
}

/* ---- HOME ---- */
function renderHome(){
  const stage=growStage();
  let days='';for(let i=1;i<=14;i++){const done=i<state.day;const today=i===state.day;days+=`<i class="${done?'done':''}${today?' today':''}">${done?'✓':i}</i>`;}
  const know=KNOW.map((k,i)=>`<div class="know-card" data-art="${i}"><div class="ki">${k.ic}</div><div class="kt">${L(k.t)}</div><div class="kr">${state.read[i]?'✓ ':''}${L(EXT.read)} ›</div></div>`).join('');
  const ranked=[{you:1,n:L(EXT.you),e:"😊",d:state.day-1+state.fed},...MATES.map(m=>({n:m.n,e:m.e,d:m.d}))].sort((a,b)=>b.d-a.d);
  const mates=ranked.map((m,idx)=>{const mi=MATES.findIndex(x=>x.n===m.n);return `<div class="mate${m.you?' you':''}"><div class="ma">${m.e}</div><div><div class="mn">${idx+1}. ${m.n}</div><div class="md">${L(T.streak)} ${m.d}${L(T.day)}</div></div>${m.you?'':`<button class="cheerb" data-cheer="${mi}">👏 ${MATES[mi].cheers}</button>`}</div>`;}).join('');
  $('#app').innerHTML=`<div class="home">
    <div class="hero"><div class="sky"></div>
      <div class="tt">${L(T.heroTt)}</div>
      <div class="mascot">${be80(stage,128)}</div>
      <div class="growbar"><i style="width:${Math.round(state.fed/14*100)}%"></i></div>
      <div class="growlab" style="color:rgba(255,255,255,.9)">${growLabel()} · ${state.fed}/14</div>
      <div><span class="scorepill">💪 ${L(T.vitality)} <b>${state.score}</b></span><span class="points-pill">⭐ <b>${state.points}</b> ${L(EXT.points)}</span></div>
    </div>
    <div class="actrow">
      <div class="act" id="aScan"><div class="ai">📷</div><div class="al">${L(T.scanT)}</div></div>
      <div class="act" id="aLog"><div class="ai">📝</div><div class="al">${L(T.logT)}</div></div>
      <div class="act" id="aQuiz"><div class="ai">❓</div><div class="al">${L(EXT.quiz)}</div></div>
      <div class="act" id="aRe"><div class="ai">🩺</div><div class="al">${L(EXT.reCheck)}</div></div>
    </div>
    <div class="card">
      <div class="ch">📅 ${L(T.challengeT)} <span class="streak">🔥 ${state.day-1}/14</span></div>
      <div class="days">${days}</div>
      <button class="ckbtn ${state.checkedToday?'done':''}" id="ckBtn">${state.checkedToday?L(T.ckDone):L(T.ckTodayQ)}</button>
    </div>
    <div class="sec">${L(EXT.knowT)}</div>
    <div class="know-scroll">${know}</div>
    <div class="sec">${L(EXT.commT)}</div>
    <div class="comm"><div class="cjoin">👥 ${L(EXT.commJoin)}</div>${mates}</div>
  </div>`;
  $('#aScan').onclick=openScan;$('#aLog').onclick=doCheck;$('#aQuiz').onclick=openQuiz;$('#aRe').onclick=reCheck;$('#ckBtn').onclick=doCheck;
  $$('[data-art]').forEach(c=>c.onclick=()=>openArticle(+c.dataset.art));
  $$('[data-cheer]').forEach(b=>b.onclick=()=>{MATES[+b.dataset.cheer].cheers++;renderHome();toast('👏 '+L(EXT.cheered));});
}
function openSheet(html){$('#sheet').innerHTML=html;$('#sheetMask').classList.add('open');}
function closeSheet(){$('#sheetMask').classList.remove('open');}
function openArticle(i){const k=KNOW[i],fresh=!state.read[i];
  openSheet(`<button class="sx" id="shX">✕</button><div style="font-size:30px">${k.ic}</div><h3>${L(k.t)}</h3><div class="sb">${L(k.b)}</div><button class="sok" id="shOk">${fresh?L(EXT.readReward):L(EXT.close)}</button>`);
  $('#shX').onclick=closeSheet;
  $('#shOk').onclick=()=>{if(fresh){state.read[i]=1;state.points+=3;toast('📚 '+L(EXT.readReward));}closeSheet();renderHome();};}
function openQuiz(){
  openSheet(`<button class="sx" id="shX">✕</button><h3>❓ ${L(EXT.quiz)}</h3><div class="sb" style="font-weight:700">${L(EXT.quizQ)}</div><div id="qopts">${EXT.quizOpts.map((o,i)=>`<button class="qopt" data-qo="${i}">${L(o.t)}</button>`).join('')}</div>`);
  $('#shX').onclick=closeSheet;
  $$('#qopts .qopt').forEach(b=>b.onclick=()=>{const o=EXT.quizOpts[+b.dataset.qo];if(o.ok){state.points+=5;toast('🎉 '+L(EXT.quizOk));}else toast(L(EXT.quizNg));closeSheet();renderHome();});}
function reCheck(){state.stage='goal';state.goal=null;state.q=0;state.ans=[];state.flags={};state.plan=null;state.screen='onboard';renderApp();}
function doCheck(){if(state.checkedToday){toast(L({ja:"今日はもう記録ずみ 🙂",en:"Already logged today 🙂",zh:"今天已记录 🙂"}));return;}
  state.checkedToday=true;state.points+=5;state.score=Math.min(100,state.score+1);state.streak+=1;renderHome();
  toast('📝 +5pt · '+L({ja:"記録しました",en:"Logged",zh:"已记录"}));}

/* ---- AR SCAN ---- */
function openScan(){const m=$('#scanMask');m.classList.add('open');
  m.innerHTML=`<div class="viewf"><span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span><span class="line"></span><span class="obj">💊</span></div>
    <div class="scan-tt">${L(T.scanning)}</div><div class="scan-ts">${L(T.scanIns)}</div>`;
  setTimeout(()=>{
    if(state.fed<14)state.fed+=1;if(state.day<14)state.day+=1;state.points+=10;state.score=Math.min(100,state.score+1);
    const st=growStage();
    m.innerHTML=`<div class="scan-done"><div class="mascot">${be80(st,150)}</div>
      <div class="scan-tt" style="margin-top:8px">${L(T.scanOk)}</div>
      <div class="scan-ts">${L(T.scanReward)}</div>
      <div class="scan-ts" style="color:var(--bio-br);margin-top:8px">${growLabel()}</div>
      <button class="scan-close" id="scanClose">${L(T.scanClose)}</button></div>`;
    $('#scanClose').onclick=()=>{m.classList.remove('open');renderHome();};
  },1500);
}

/* ---- dispatch / lang ---- */
function renderApp(){if(state.screen==='onboard')renderOnboard();else if(state.screen==='result')renderResult();else renderHome();}
function applyText(){$('#subt').textContent=L(T.subt);document.documentElement.lang=state.lang;renderApp();}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1900);}
const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();applyText();};box.appendChild(b);});}
renderLangs();
$('#sheetMask').onclick=e=>{if(e.target===$('#sheetMask'))closeSheet();};
try{var _l=new URLSearchParams(location.search).get("lang");if(_l&&["ja","en","zh","th"].indexOf(_l)>=0)state.lang=_l;}catch(e){}
applyText();renderLangs();
(function(){var _p="";setInterval(function(){try{if(window.parent&&window.parent!==window){if(state.lang!==_p){_p=state.lang;window.parent.postMessage({t:"es",lang:state.lang},"*");}}}catch(e){}},400);})();
</script>
<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent=".langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
</body>
</html>
