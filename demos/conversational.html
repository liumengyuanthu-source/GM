<html lang="en">
<head>
<meta charset="UTF-8">

<title>Conversational Commerce · Blackmores · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7f7; --card:#fff; --line:#e6ecec;
    --display:Georgia,'Times New Roman','Songti SC','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:680px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px}.brand sup{font-size:9px;color:var(--brand)}
  .sub{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}.sp{flex:1}
  .chip{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;position:relative}
  .menu{position:absolute;top:40px;right:0;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:6px;min-width:120px;box-shadow:0 12px 30px rgba(0,0,0,.12);display:none;z-index:50}
  .menu.open{display:block}.menu button{display:block;width:100%;border:0;background:0;font:inherit;font-size:13px;padding:8px 9px;border-radius:7px;cursor:pointer;text-align:left;color:var(--ink)}.menu button:hover{background:var(--soft)}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .channel{max-width:680px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12.5px}
  .cdot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;background:var(--soft)}
  .channel b{color:var(--ink);font-size:13.5px}

  .chat{max-width:680px;margin:0 auto;padding:8px 18px 220px}
  .msg{display:flex;gap:9px;margin:12px 0;animation:fin .35s ease}
  @keyframes fin{from{opacity:0;transform:translateY(8px)}}
  .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:14px;flex-shrink:0}
  .cust .av{background:#dfe5e4}.staff .av{background:var(--brand);color:#fff}
  .bub{border-radius:4px 15px 15px 15px;padding:11px 14px;font-size:14px;max-width:78%}
  .cust .bub{background:var(--card);border:1px solid var(--line)}
  .staff{flex-direction:row-reverse}.staff .bub{background:var(--brand);color:#fff;border-radius:15px 4px 15px 15px}
  .typing .bub{display:flex;gap:4px}.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bl 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;max-width:78%;display:flex;gap:11px;align-items:center}
  .pcard .em{font-size:30px}.pcard .em img{width:48px;height:48px;display:block}.pcard h4{font-family:var(--display);font-size:15px}.pcard .ds{font-size:11.5px;color:var(--muted)}
  .pcard .pr{font-weight:800;color:var(--brand);font-size:15px;margin-top:2px}
  .pcard .buy{border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:11px;padding:6px 10px;border-radius:8px;margin-top:4px}
  .sys{text-align:center;font-size:12.5px;color:var(--brand);background:var(--soft);border-radius:10px;padding:9px;margin:14px auto;max-width:70%;font-weight:600}

  /* AI assist dock */
  .dock{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 22%);padding:14px 18px 18px}
  .assist{max-width:680px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 26px rgba(0,0,0,.08)}
  .ahead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--brand);margin-bottom:10px}
  .ahead .badge{background:var(--soft);border-radius:6px;padding:2px 7px;font-size:10.5px}
  .warn{background:#fdf2e2;color:#b5731a}.warn .badge{background:#f6e2c2}
  .sug{border:1px solid var(--line);background:var(--bg);border-radius:11px;padding:11px 13px;font-size:13.5px;cursor:pointer;margin-bottom:8px;transition:.15s;line-height:1.45}
  .sug:hover{border-color:var(--brand);background:var(--soft)}
  .actbtn{border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;width:100%}

  .report{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:10px;animation:fin .4s}
  .report h3{font-family:var(--display);font-size:18px;margin-bottom:4px}
  .rrow{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .rrow .k{color:var(--muted);width:96px;flex-shrink:0;font-weight:600}
  .rrow.cw{color:#b5731a}
  .toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:11px 17px;border-radius:11px;font-size:13.5px;font-weight:600;z-index:80;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%);opacity:1}
  .fab{position:fixed;right:18px;top:64px;width:44px;height:44px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:18px;box-shadow:0 8px 20px rgba(0,0,0,.18);cursor:pointer;z-index:40}
  .scenbar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
  .scenbar .lbl{width:100%;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.02em}
  .scenchip{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--ink);padding:6px 10px;border-radius:9px;cursor:pointer;transition:.15s}
  .scenchip:hover{border-color:var(--brand);background:var(--soft)}
  .scenchip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
</style>

let state={lang:"en",brand:"blackmores",scenario:"immunity",i:0};
function loadScenario(k){state.scenario=k;SCENE=SCENARIOS[k].scene;PROD=PRODS[SCENARIOS[k].key];}
const SCENPICK={ja:"シナリオを選択",en:"Pick a scenario",zh:"选择场景",th:"เลือกสถานการณ์"};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const money=p=>"A$"+p.toLocaleString();
const BUYTXT={ja:"購入",en:"Buy",zh:"购买",th:"ซื้อ"};

function scrollEnd(){window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});}
function addCust(t){$('#chat').insertAdjacentHTML('beforeend',`<div class="msg cust"><div class="av">🙂</div><div class="bub">${t}</div></div>`);scrollEnd();}
function addStaff(t){$('#chat').insertAdjacentHTML('beforeend',`<div class="msg staff"><div class="av">🧑‍💼</div><div class="bub">${t}</div></div>`);scrollEnd();}
function addSys(t){$('#chat').insertAdjacentHTML('beforeend',`<div class="sys">${t}</div>`);scrollEnd();}
function addCard(p){const pr=p||PROD;const emHTML=/\.svg|\.png|\//.test(pr.em)?`<img src="${pr.em}" alt="${pr.name}">`:pr.em;$('#chat').insertAdjacentHTML('beforeend',`<div class="msg staff"><div class="av">🧑‍💼</div>
  <div class="pcard"><div class="em">${emHTML}</div><div><h4>${pr.name}</h4><div class="ds">${T(pr.ds)}</div>
   <div class="pr">${money(pr.price)}</div><button class="buy">${T(BUYTXT)} →</button></div></div></div>`);scrollEnd();}
function typingThen(cb){$('#chat').insertAdjacentHTML('beforeend',`<div class="msg cust typing" id="tp"><div class="av">🙂</div><div class="bub"><span></span><span></span><span></span></div></div>`);scrollEnd();
  setTimeout(()=>{const t=$('#tp');if(t)t.remove();cb();},1000);}

function step(){const b=SCENE[state.i];if(!b){$('#dockin').innerHTML='';return;}
  if(b.t==='cust'){$('#dockin').innerHTML='';typingThen(()=>{addCust(T(b.m));state.i++;step();});}
  else if(b.t==='sys'){addSys(T(b.m));state.i++;step();}
  else if(b.t==='ai'){renderAssist(b);}
  else if(b.t==='action'){renderAction(b);}
  else if(b.t==='report'){renderReportBtn();}
}
function renderAssist(b){const cls=b.warn?'ahead warn':'ahead';
  $('#dockin').innerHTML=`<div class="assist"><div class="${cls}">✦ <span>${T(b.hint)}</span><span class="badge">AI</span></div>
    ${b.sug.map((s,i)=>`<div class="sug" data-s="${i}">${T(s)}</div>`).join('')}</div>`;
  $$('.sug').forEach(el=>el.onclick=()=>{addStaff(T(b.sug[el.dataset.s]));state.i++;step();});}
function renderAction(b){$('#dockin').innerHTML=`<div class="assist"><div class="ahead">✦ <span>${T(b.hint)}</span><span class="badge">AI</span></div>
    <button class="actbtn" id="act">${T(b.label)}</button></div>`;
  $('#act').onclick=()=>{if(b.kind==='card')addCard();else if(b.kind==='card2')addCard(PRODS[b.which]);else addStaff(T(b.label));state.i++;step();};}
function renderReportBtn(){const r=RUI[state.lang];
  $('#dockin').innerHTML=`<div class="assist"><button class="actbtn" id="rep">${r.rbtn}</button></div>`;
  $('#rep').onclick=()=>{$('#dockin').innerHTML='';showReport();toast('📄 '+r.done);};}
function showReport(){const r=RUI[state.lang];
  const rd=(SCENARIOS[state.scenario].report[state.lang]||SCENARIOS[state.scenario].report.ja);
  $('#chat').insertAdjacentHTML('beforeend',`<div class="report"><h3>📄 ${r.rtitle}</h3>
    <div class="rrow"><div class="k">${r.need}</div><div>${rd.need}</div></div>
    <div class="rrow"><div class="k">${r.moments}</div><div>${rd.moments}</div></div>
    <div class="rrow"><div class="k">${r.sent}</div><div>${rd.sent}</div></div>
    <div class="rrow cw"><div class="k">⚠ ${r.comp}</div><div>${rd.comp}</div></div>
    <div class="rrow" style="border:0"><div class="k">${r.nba}</div><div>${rd.nbaV}</div></div></div>`);scrollEnd();}

function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brand').innerHTML=b.logo+(b.sup?`<sup>${b.sup}</sup>`:'');}
function renderScenPicker(){const ja=SCENPICK[state.lang]||SCENPICK.ja;
  const chips=Object.keys(SCENARIOS).map(k=>{const p=SCENARIOS[k].picker;const on=k===state.scenario?' on':'';
    return `<button class="scenchip${on}" data-k="${k}">${p.em} ${T(p)}</button>`;}).join('');
  $('#chat').insertAdjacentHTML('beforeend',`<div class="scenbar"><div class="lbl">${ja}</div>${chips}</div>`);
  $$('.scenchip').forEach(el=>el.onclick=()=>{if(el.dataset.k===state.scenario)return;loadScenario(el.dataset.k);restart();});}
function restart(){state.i=0;loadScenario(state.scenario);$('#chat').innerHTML='';const _dis={ja:"AIは人間スタッフを補助します——決して代わりません。",en:"AI assists your human staff — never replaces them.",zh:"AI 辅助人工客服——绝不取代。",th:"AI ช่วยเหลือพนักงานมนุษย์ — ไม่เคยแทนที่"};$('#chat').insertAdjacentHTML('beforeend',`<div class="sys" style="font-size:11px;letter-spacing:.01em;opacity:.8;">${_dis[state.lang]||_dis.ja}</div>`);renderScenPicker();const c=CH[state.scenario]||CH.immunity;$('#cdot').textContent=c.em;$('#chName').textContent=(c[state.lang]||c.en);const cn=CUSTN[state.scenario]||CUSTN.immunity;$('#custName').textContent=(cn[state.lang]||cn.en);
  $('#sub').textContent=UI[state.lang].sub;
  document.documentElement.lang=state.lang;step();}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

$('#fab').onclick=()=>{const k=Object.keys(BRANDS);const i=k.indexOf(state.brand);state.brand=k[(i+1)%k.length];applyBrand();toast('🎨 '+BRANDS[state.brand].name);};
const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();restart();};box.appendChild(b);});}
renderLangs();

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_m=_p.get("market"),_l=_p.get("lang"),_s=_p.get("scenario");if(_b&&typeof BRANDS!=="undefined"&&BRANDS[_b])state.brand=_b;if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(_m&&typeof MARKETS!=="undefined"&&MARKETS[_m])state.market=_m;if(_s&&typeof SCENARIOS!=="undefined"&&SCENARIOS[_s])state.scenario=_s;}catch(e){}
applyBrand();restart();renderLangs();
(function(){var _l="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"")+"|"+(state.market||"");if(c!==_l){_l=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null,market:state.market||null},"*");}}catch(e){}},400);})();
</script>
