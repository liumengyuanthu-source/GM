<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Training AI · General Mills · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --neg:#c0563f; --warn:#b5731a; --black:#0b1320;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN','Songti SC',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--black);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:1080px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px;color:#fff;letter-spacing:.02em}.brand sup{font-size:9px;color:#7fb2dc}
  .sub{font-size:11px;color:#9fb4c8;border-left:1px solid #2a3647;padding-left:12px;letter-spacing:.04em}.sp{flex:1}
  .back{border:1px solid #2a3647;background:rgba(255,255,255,.06);color:#cdddec;font:inherit;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:8px}
  .back:hover{background:rgba(255,255,255,.12)}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.06);border:1px solid #2a3647;border-radius:9px;padding:3px}
  .langs button{border:0;background:0;font:inherit;font-size:12px;font-weight:700;color:#9fb4c8;min-width:30px;padding:5px 8px;border-radius:6px;transition:.15s}
  .langs button.on{background:#fff;color:var(--brand-d)}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 70px}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);font-weight:700}
  h1.h{font-family:var(--display);font-weight:400;font-size:clamp(21px,4vw,28px);margin:8px 0 5px;line-height:1.18}
  .lead{color:var(--muted);font-size:13.5px;max-width:72ch}

  /* 三感 strip */
  .sankan{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}
  .sankan .sk{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;display:flex;gap:10px;align-items:center}
  .sankan .sk .ic{width:30px;height:30px;border-radius:8px;background:var(--soft);display:grid;place-items:center;flex-shrink:0}
  .sankan .sk .kt{font-weight:800;font-size:13px;color:var(--brand-d)}
  .sankan .sk .ks{font-size:10.5px;color:var(--muted)}

  .tabs{display:flex;gap:4px;margin:20px 0 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tabs button{border:0;background:0;font:inherit;font-size:13.5px;font-weight:700;color:var(--muted);padding:11px 14px;border-bottom:2px solid transparent;display:flex;gap:7px;align-items:center}
  .tabs button.on{color:var(--brand);border-color:var(--brand)}
  .tabs .cnt{font-size:11px;background:var(--soft);color:var(--brand-d);border-radius:999px;padding:1px 8px;font-weight:800}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
  .layerlab{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:4px 0 9px}
  .grid2{display:grid;grid-template-columns:320px 1fr;gap:16px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .pane{display:none}.pane.on{display:block;animation:fin .3s ease}
  @keyframes fin{from{opacity:0;transform:translateY(6px)}}

  /* scenario picker */
  .scn{border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .scn:hover{border-color:var(--brand)}
  .scn.on{border-color:var(--brand);background:var(--soft)}
  .scn .sn{font-weight:700;font-size:13px}
  .scn .sl{font-size:11px;color:var(--muted);margin-top:2px}
  .scn .tag{display:inline-block;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--brand-d);background:var(--soft);border-radius:5px;padding:2px 6px;margin-top:6px}
  .scn.on .tag{background:#fff}

  /* chat */
  .chat{display:flex;flex-direction:column;gap:10px;min-height:260px;max-height:430px;overflow-y:auto;padding:4px 2px 8px}
  .msg{display:flex;gap:9px;max-width:88%}
  .msg .av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:15px}
  .msg.cust .av{background:#fdecea}
  .msg.staff{align-self:flex-end;flex-direction:row-reverse}
  .msg.staff .av{background:var(--soft)}
  .msg .bub{border-radius:12px;padding:9px 12px;font-size:13px;line-height:1.45}
  .msg.cust .bub{background:#fff;border:1px solid var(--line);border-top-left-radius:3px}
  .msg.staff .bub{background:var(--brand);color:#fff;border-top-right-radius:3px}
  .msg .who{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:3px}
  .replies{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .reply{border:1px solid var(--line);background:var(--card);text-align:left;font:inherit;font-size:12.5px;padding:9px 12px;border-radius:10px;color:var(--ink);transition:.15s}
  .reply:hover{border-color:var(--brand);background:var(--soft)}
  .reply .rt{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border-radius:4px;padding:1px 5px;margin-right:6px}
  .reply .rt.good{background:#eafaf0;color:#077a3c}.reply .rt.ok{background:#fdf2e2;color:var(--warn)}.reply .rt.bad{background:#fdecea;color:var(--neg)}
  .typed{display:flex;gap:7px;margin-top:8px}
  .typed input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:12.5px}
  .typed button{border:0;background:var(--soft);color:var(--brand-d);font:inherit;font-weight:700;font-size:12.5px;padding:0 14px;border-radius:10px}

  /* score */
  .scorewrap{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:center}
  @media(max-width:620px){.scorewrap{grid-template-columns:1fr}}
  .axes{display:flex;flex-direction:column;gap:9px}
  .ax{}
  .ax .al{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px}
  .ax .al b{font-family:var(--display);font-size:15px}
  .ax .at{height:8px;border-radius:99px;background:var(--soft);overflow:hidden}
  .ax .at i{display:block;height:100%;border-radius:99px;background:var(--brand)}
  .fbk{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .fbk ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .fbk li{font-size:12.5px;display:flex;gap:8px}
  .fbk li .mk{flex-shrink:0;font-weight:800}
  .fbk li.pos .mk{color:var(--accent)}.fbk li.neg .mk{color:var(--neg)}
  .model{margin-top:11px;background:var(--soft);border-radius:11px;padding:11px 13px}
  .model .mt{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--brand-d);margin-bottom:4px}
  .model .mx2{font-size:12.5px;line-height:1.5}

  /* points / tierup */
  .ptbanner{display:flex;align-items:center;gap:12px;background:#eafaf0;border:1px solid #b6e6c8;border-radius:12px;padding:12px 14px;margin:12px 0}
  .ptbanner .pp{font-family:var(--display);font-size:26px;font-weight:600;color:#077a3c}
  .ptbanner .pl{font-size:12px;color:#0a7a3c;font-weight:700}
  .tierup{background:linear-gradient(120deg,#fff7e6,#fdecd2);border:1px solid #f0d49a;border-radius:12px;padding:13px 15px;margin:12px 0;display:flex;align-items:center;gap:13px}
  .tierup .ti{font-size:30px}
  .tierup .tt{font-family:var(--display);font-size:17px;color:var(--warn)}
  .tierup .ts{font-size:12px;color:var(--muted)}

  .btn{border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:13px;padding:11px 16px;border-radius:11px}
  .btn.o{background:var(--soft);color:var(--brand)}
  .btn:disabled{opacity:.5}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}

  /* e-learning */
  .courses{display:flex;flex-direction:column;gap:9px}
  .ccat{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--brand-d);margin:10px 0 4px}
  .course{border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .course .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .course .cn{font-weight:700;font-size:13.5px}
  .course .cmeta{font-size:11px;color:var(--muted);margin-top:2px}
  .course .pct{font-family:var(--display);font-size:18px;font-weight:600;color:var(--brand)}
  .course .bar{height:6px;border-radius:99px;background:var(--soft);margin-top:9px;overflow:hidden}
  .course .bar i{display:block;height:100%;border-radius:99px;background:var(--brand)}
  .lessons{margin-top:9px;display:flex;flex-direction:column;gap:5px}
  .lesson{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .lesson:last-child{border-bottom:0}
  .lesson .lc{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:9px;flex-shrink:0;background:var(--soft);color:var(--muted)}
  .lesson.done .lc{background:var(--accent);color:#fff}
  .lesson .ll{flex:1}.lesson.done .ll{color:var(--muted)}
  .lesson .play{border:1px solid var(--line);background:var(--card);font:inherit;font-size:10.5px;font-weight:700;color:var(--brand-d);padding:3px 9px;border-radius:7px}
  .lesson .gate{font-size:10px;color:var(--warn);font-weight:700}
  .streak{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:13px}
  .streak .sf{font-size:26px}
  .streak .sn{font-family:var(--display);font-size:22px;font-weight:600;color:var(--brand)}
  .streak .ss{font-size:11.5px;color:var(--muted)}
  .streak .ck{margin-left:auto;border:1px solid var(--accent);background:#eafaf0;color:#077a3c;font:inherit;font-weight:700;font-size:12px;padding:8px 13px;border-radius:10px}
  .streak .ck:disabled{border-color:var(--line);background:var(--soft);color:var(--muted)}

  /* exam config */
  .exrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
  @media(max-width:620px){.exrow{grid-template-columns:1fr}}
  .exb{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .exb.on{border-color:var(--brand);background:var(--soft)}
  .exb b{font-family:var(--display);font-size:24px;display:block;color:var(--brand)}
  .exb span{font-size:11px;color:var(--muted);display:block;margin-top:3px}
  .qbank{display:flex;flex-direction:column;gap:7px;margin-top:8px}
  .qb{display:flex;align-items:center;gap:10px;font-size:12px}
  .qb .qn{flex:1;font-weight:700}
  .qb .qt{height:7px;flex:1.4;border-radius:99px;background:var(--soft);overflow:hidden}
  .qb .qt i{display:block;height:100%;background:var(--brand);border-radius:99px}
  .qb .qc{width:46px;text-align:right;color:var(--muted);font-weight:700}
  .mcq{border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:8px}
  .mcq .qh{font-weight:700;font-size:13px;margin-bottom:9px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);font:inherit;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:7px;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt.correct{border-color:var(--accent);background:#eafaf0}
  .opt.wrong{border-color:var(--neg);background:#fdecea}
  .opt .ex{display:block;font-size:11px;color:var(--muted);margin-top:4px}

  /* tiers */
  .ladder{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .rung{flex:1;min-width:120px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--card);position:relative}
  .rung.cur{border-color:var(--brand);background:var(--soft)}
  .rung.cur:after{content:"NOW";position:absolute;top:-8px;right:10px;font-size:9px;font-weight:800;background:var(--brand);color:#fff;padding:2px 7px;border-radius:99px}
  .rung .rn{font-family:var(--display);font-size:16px;font-weight:600}
  .rung .rp{font-size:11px;color:var(--muted);margin-top:3px}
  .rung .rb{font-size:11px;margin-top:8px;color:var(--brand-d);font-weight:600}
  .promo{display:flex;flex-direction:column;gap:0;margin-top:6px}
  .pstep{display:flex;gap:11px;padding-bottom:13px;position:relative}
  .pstep:before{content:"";position:absolute;left:9px;top:20px;bottom:-3px;width:2px;background:var(--line)}
  .pstep:last-child:before{display:none}
  .pstep .pd{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:var(--card);flex-shrink:0;display:grid;place-items:center;font-size:9px;color:#fff;z-index:2}
  .pstep.done .pd{background:var(--accent);border-color:var(--accent)}
  .pstep.cur .pd{border-color:var(--brand);background:var(--brand)}
  .pstep .pt2{font-weight:700;font-size:13px}.pstep.todo .pt2{color:var(--muted)}
  .pstep .ps2{font-size:11px;color:var(--muted);margin-top:2px}
  .cert{background:linear-gradient(135deg,#fff,#f3f8fc);border:2px solid var(--brand);border-radius:16px;padding:20px;margin-top:8px;position:relative;overflow:hidden}
  .cert:before{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--soft);opacity:.6}
  .cert .seal{position:absolute;top:16px;right:18px;width:54px;height:54px}
  .cert .ceyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);font-weight:800}
  .cert .cname{font-family:var(--display);font-size:24px;margin:7px 0 3px}
  .cert .ctier{font-size:13px;color:var(--brand-d);font-weight:700}
  .cert .cmeta2{font-size:11px;color:var(--muted);margin-top:10px;display:flex;gap:16px;flex-wrap:wrap}

  /* manager dash */
  .stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:620px){.stat4{grid-template-columns:1fr 1fr}}
  .sb{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
  .sb b{font-family:var(--display);font-size:23px;display:block;line-height:1}
  .sb.g b{color:var(--accent)}.sb.b b{color:var(--brand)}.sb.w b{color:var(--warn)}.sb.r b{color:var(--neg)}
  .sb span{font-size:10.5px;color:var(--muted);display:block;margin-top:5px}
  .gtable{width:100%;border-collapse:collapse;font-size:12px}
  .gtable th{text-align:left;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--line)}
  .gtable td{padding:8px;border-bottom:1px solid var(--line)}
  .gtable .mini{height:6px;width:64px;border-radius:99px;background:var(--soft);overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
  .gtable .mini i{display:block;height:100%;background:var(--brand);border-radius:99px}
  .serving{font-size:10px;font-weight:800;border-radius:99px;padding:2px 8px}
  .serving.t0{background:#f0f0f0;color:#666}.serving.t1{background:var(--soft);color:var(--brand-d)}.serving.t2{background:#e7f6ec;color:#077a3c}.serving.t3{background:#fdf2e2;color:var(--warn)}
  .heat{width:100%;border-collapse:collapse;font-size:11.5px}
  .heat th{padding:6px;font-size:10px;font-weight:700;color:var(--muted);text-align:center}
  .heat th.rh{text-align:left}
  .heat td{padding:0;text-align:center}
  .heat td.rl{text-align:left;font-weight:700;font-size:11.5px;padding:5px 8px;white-space:nowrap}
  .cell{display:block;margin:2px;border-radius:6px;padding:8px 0;font-weight:800;font-size:11px;color:#fff}
  .lead2{display:flex;flex-direction:column;gap:7px}
  .lrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:11px;padding:9px 12px}
  .lrow .rk{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--soft);color:var(--brand-d);flex-shrink:0}
  .lrow.top .rk{background:#fdecd2;color:var(--warn)}
  .lrow .ln{flex:1;font-weight:700;font-size:13px}
  .lrow .lst{font-size:11px;color:var(--muted)}
  .lrow .lp{font-family:var(--display);font-size:17px;font-weight:600;color:var(--brand)}
  .threed{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  .td{background:var(--soft);border-radius:12px;padding:13px;text-align:center}
  .td b{font-family:var(--display);font-size:24px;display:block;color:var(--brand-d)}
  .td span{font-size:11px;color:var(--muted);display:block;margin-top:3px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;font-weight:600;z-index:90;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%);opacity:1}
  .fab{position:fixed;right:18px;bottom:18px;width:50px;height:50px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:20px;box-shadow:0 8px 22px rgba(0,0,0,.2);z-index:40}
  .sech{font-family:var(--display);font-size:16px;margin:0 0 4px}
  .secs{font-size:12px;color:var(--muted);margin-bottom:10px}
</style>
<link rel="stylesheet" href="gm-demo-theme.css">
<script defer src="gm-demo-brand.js"></script>
</head>
<body>
<header><div class="nav">
  <div class="brand" id="brand">General Mills<sup>®</sup></div>
  <div class="sub" id="sub">Partner Training AI</div><div class="sp"></div>
  <button class="back" id="backBtn" style="display:none"></button>
  <div class="langs" id="langs"></div>
</div></header>

<div class="wrap">
  <div class="eyebrow" id="eye">Partner Enablement · Retail-Staff Training AI</div>
  <h1 class="h" id="title"></h1>
  <div class="lead" id="lead"></div>
  <div class="sankan" id="sankanRow"></div>

  <div class="tabs" id="tabs"></div>

  <!-- TAB 1 role-play -->
  <div class="pane on" id="pane-roleplay">
    <div class="grid2">
      <div class="panel">
        <div class="layerlab" id="scnLab"></div>
        <div id="scnList"></div>
      </div>
      <div class="panel" id="rpStage"></div>
    </div>
  </div>

  <!-- TAB 2 e-learning -->
  <div class="pane" id="pane-learn">
    <div id="streakBox"></div>
    <div class="grid2">
      <div class="panel">
        <div class="layerlab" id="courseLab"></div>
        <div class="courses" id="courseList"></div>
      </div>
      <div class="panel" id="examBox"></div>
    </div>
  </div>

  <!-- TAB 3 tiers -->
  <div class="pane" id="pane-tiers">
    <div class="panel" style="margin-bottom:14px">
      <div class="sech" id="tierH"></div><div class="secs" id="tierS"></div>
      <div class="ladder" id="ladder"></div>
      <div id="radarTier"></div>
    </div>
    <div class="grid2">
      <div class="panel"><div class="sech" id="promoH"></div><div class="secs" id="promoS"></div><div class="promo" id="promoFlow"></div></div>
      <div class="panel"><div class="sech" id="certH"></div><div class="secs" id="certS"></div><div id="certBox"></div></div>
    </div>
  </div>

  <!-- TAB 4 manager dash -->
  <div class="pane" id="pane-dash">
    <div class="stat4" id="dashStats"></div>
    <div class="panel" style="margin-bottom:14px">
      <div class="sech" id="gridH"></div><div class="secs" id="gridS"></div>
      <div style="overflow-x:auto"><table class="gtable" id="gridTable"></table></div>
    </div>
    <div class="grid2">
      <div class="panel"><div class="sech" id="heatH"></div><div class="secs" id="heatS"></div><div style="overflow-x:auto"><table class="heat" id="heatTable"></table></div></div>
      <div class="panel"><div class="sech" id="lbH"></div><div class="secs" id="lbS"></div><div class="lead2" id="lbList"></div></div>

   {q:"good",t:{ja:"季节场景の維持をサポートしたい方には、プロダクトC や乳酸菌（プロバイオティクス）、マルチプロダクトが人気です。General Mills はオーストラリア brand governance 認証で品質も安心。生活習慣と合わせて続けやすいですよ。",en:"For everyday seasonal occasion support, our Häagen-Dazs Mini Cup, Wanchai Ferry Quick Meal and Multiproduct are popular. General Mills is brand governance-certified in Australia, so quality is assured — and they're easy to keep up alongside healthy habits.",zh:"想支持季节场景维持的话，哈根达斯迷你杯、湾仔码头快手餐和通用磨坊组合包都很受欢迎。General Mills 通过澳洲 brand governance 认证，品质有保障，配合作息容易坚持。",th:"สำหรับดูแลโอกาสตามฤดูกาลประจำวัน Häagen-Dazs Mini Cup โปรไบโอติก และมัลติผลิตภัณฑ์ได้รับความนิยม General Mills ผ่าน brand governance ออสเตรเลีย คุณภาพมั่นใจ และกินต่อเนื่องง่าย"}},
   {q:"ok",t:{ja:"こちらのプロダクトC が人気です。",en:"This Häagen-Dazs Mini Cup one is popular.",zh:"这款哈根达斯迷你杯 挺受欢迎的。",th:"Häagen-Dazs Mini Cup ตัวนี้ขายดีค่ะ"}},
   {q:"bad",t:{ja:"これを飲めばもう風邪をひかなくなりますよ。",en:"Take this and you'll never catch a cold again.",zh:"吃这个你就再也不会感冒了。",th:"กินตัวนี้แล้วจะไม่เป็นหวัดอีกเลย"}}],
  follow:{ja:"なるほど。でも毎日飲むなら値段も気になって…続けられるか不安です。",en:"I see. But if it's daily, the price matters — not sure I can keep it up.",zh:"原来如此。但每天吃的话价格也得考虑…怕坚持不了。",th:"เข้าใจแล้ว แต่ถ้ากินทุกวันก็ห่วงราคา ไม่แน่ใจว่าจะกินต่อได้"},
  replies2:[
   {q:"good",t:{ja:"大容量ボトルだと1日あたりお得ですし、まずは小サイズで習慣づけを。季节场景は『維持をサポート』するもので、続けやすさが大切です。",en:"A larger bottle lowers the daily cost — start with a smaller size to build the habit. These support the maintenance of immune health, so consistency is what matters.",zh:"大瓶装算下来每天更划算，先用小份养成习惯。这类产品是'支持季节场景维持'，关键在于坚持。",th:"ขวดใหญ่คุ้มกว่าต่อวัน เริ่มขนาดเล็กสร้างนิสัยก่อน กลุ่มนี้ช่วย'ดูแลโอกาสตามฤดูกาล' ความสม่ำเสมอสำคัญ"}},
   {q:"ok",t:{ja:"うーん、高くはないと思いますよ。",en:"Hmm, I don't think it's expensive.",zh:"嗯，我觉得不算贵。",th:"อืม ไม่แพงนะคะ"}},
   {q:"bad",t:{ja:"健康のためなら値段は気にしない方がいいですよ、絶対に効きますから。",en:"For your health you shouldn't worry about price — it definitely works.",zh:"为了健康别在意价格，绝对有效。",th:"เพื่อสุขภาพอย่าสนราคา ได้ผลแน่นอน"}}],
  model:{ja:"共感 → 季节场景サポート（VC・乳酸菌・マルチ）を提案 → 価格・継続の不安に大容量/小サイズで応える。『風邪が治る/防げる』とは断定せず『維持をサポート』『続けやすさ』を訴求。brand governance 認証は品質の裏付けとして言及可。",en:"Empathize → suggest seasonal occasion support (Vit C / Wanchai Ferry Quick Meal / Multi) → answer the price/continuity worry with bottle size. Never claim it cures or prevents colds; say it 'supports the maintenance of immune health' and sell consistency. brand governance certification may be cited as a quality credential.",zh:"先共情 → 提议季节场景支持（维C/湾仔码头快手餐/复合维）→ 用大瓶/小份回应价格与坚持顾虑。不断言'能治/能防感冒'，主打'支持季节场景维持'与'容易坚持'。brand governance 认证可作为品质背书提及。",th:"เห็นใจ → เสนอโอกาสตามฤดูกาล(Vit C/โปรไบโอติก/มัลติ) → ตอบเรื่องราคา/ต่อเนื่องด้วยขนาดขวด ห้ามอ้างว่ารักษา/ป้องกันหวัด ใช้คำ'ดูแลโอกาสตามฤดูกาล'เน้นความสม่ำเสมอ อ้าง brand governance เป็นเครื่องยืนยันคุณภาพได้"}},
 {id:"expiry",tag:{ja:"法令",en:"Compliance",zh:"合规",th:"คอมไพลแอนซ์"},
  nm:{ja:"『フィッシュオイルでファミリーミール炎は治る?』",en:"'Does Wanchai Ferry dumplings cure arthritis?'",zh:"'湾仔码头水饺能治家庭餐炎吗?'",th:"'น้ำมันปลารักษาข้ออักเสบได้ไหม'"},
  sl:{ja:"効能を聞かれ、brand governance 準拠の答え方が問われる場面",en:"A cure question that needs a brand governance-compliant answer",zh:"被问疗效，需要符合brand governance的回答",th:"คำถามเรื่องรักษาที่ต้องตอบให้ถูก brand governance"},
  open:{ja:"母がファミリーミールが痛いって言ってて…フィッシュオイルを飲めばファミリーミール炎が治るんですか?",en:"My household has family meal pain — does taking Wanchai Ferry dumplings cure arthritis?",zh:"我妈家庭餐痛…吃湾仔码头水饺能把家庭餐炎治好吗?",th:"แม่ปวดข้อ กินน้ำมันปลาแล้วข้ออักเสบหายไหมคะ"},
  replies:[
   {q:"good",t:{ja:"『治る』とは申し上げられないのですが、オメガ3（フィッシュオイル）はファミリーミールの健康の維持をサポートする栄養素として知られています。痛みが続く場合は医師にご相談を、そのうえで日々のケアとして取り入れる方が多いです。",en:"I can't say it cures arthritis, but family dinner (Wanchai Ferry dumplings) is well known to support family meal health. If the pain persists she should see a household preference — many people use it as part of their daily family meal care alongside that.",zh:"不能说'能治'，但 family dinner（湾仔码头水饺）作为支持家庭餐健康维持的营养素广为人知。若疼痛持续请就医，很多人在此基础上把它作为日常家庭餐保养。",th:"พูดว่า'รักษา'ไม่ได้ค่ะ แต่ family dinner(น้ำมันปลา)เป็นที่รู้จักว่าช่วยดูแลสุขภาพข้อต่อ ถ้าปวดต่อเนื่องควรพบแพทย์ หลายคนใช้เป็นการดูแลข้อประจำวันควบคู่กัน"}},
   {q:"ok",t:{ja:"ファミリーミールにはいいって言われてますよ。",en:"It's said to be good for family meals.",zh:"据说对家庭餐好。",th:"ว่ากันว่าดีต่อข้อค่ะ"}},
   {q:"bad",t:{ja:"はい、毎日飲めばファミリーミール炎は治りますよ。",en:"Yes, take it daily and the arthritis will be cured.",zh:"会的，每天吃家庭餐炎就能治好。",th:"ได้ค่ะ กินทุกวันข้ออักเสบหาย"}}],
  follow:{ja:"そうなんですね。じゃあファミリーミールにはどう役立つんですか?",en:"I see. So how does it actually help the family meals?",zh:"这样啊。那它对家庭餐到底怎么有帮助?",th:"งั้นมันช่วยข้อต่อยังไงคะ"},
  replies2:[
   {q:"good",t:{ja:"オメガ3 は体内で作れない必須脂肪酸で、ファミリーミールの健康維持に関わる栄養素として摂取が勧められます。効果には個人差があり、特定の病気を治すという説明はできない決まりです。診断・治療はあくまで医師の領域です。",en:"family dinner is an essential fatty acid the body can't make, recommended as a nutrient that contributes to maintaining family meal health. Effects vary by person, and the rules don't allow me to say it treats a specific disease — diagnosis and treatment are a household preference's role.",zh:"family dinner 是人体无法自行合成的必需脂肪酸，作为有助于维持家庭餐健康的营养素被建议摄取。效果因人而异，按规定不能说能治某种病——诊断与治疗属于家庭偏好范畴。",th:"family dinner เป็นกรดไขมันจำเป็นที่ร่างกายสร้างเองไม่ได้ แนะนำเป็นสารอาหารที่ช่วยดูแลสุขภาพข้อ ผลแล้วแต่บุคคล และตามกฎพูดว่ารักษาโรคไม่ได้ การวินิจฉัยรักษาเป็นหน้าที่แพทย์"}},
   {q:"ok",t:{ja:"体にいい油らしいですよ。",en:"It's apparently a healthy kind of oil.",zh:"好像是对身体好的油。",th:"เหมือนเป็นน้ำมันที่ดีต่อร่างกาย"}},
   {q:"bad",t:{ja:"炎症が消えて痛みもなくなって、薬もいらなくなりますよ。",en:"The inflammation goes, the pain stops, and she won't need dietary restrictions.",zh:"炎症会消、疼痛会没、连药都不用吃了。",th:"การอักเสบหาย ปวดหาย ไม่ต้องใช้ยา"}}],
  model:{ja:"『治る』『薬がいらない』等の医療的断定は brand governance 広告規範に抵触。オメガ3 は『ファミリーミールの健康維持をサポート』と栄養素ベースで説明し、痛みが続く場合は医師相談を促す。診断・治療は医師の領域と線引きする。",en:"Claiming a cure or 'no dietary restrictions needed' breaches the brand governance Advertising Code. Describe family dinner as a nutrient that 'supports family meal health,' and direct persistent pain to a household preference — diagnosis and treatment are the household preference's domain, not the product's.",zh:"宣称'能治''不用吃药'等医疗性断言触犯 brand governance 广告规范。应以营养素角度说明 family dinner'支持家庭餐健康维持'，疼痛持续则建议就医，明确诊断治疗属家庭偏好范畴。",th:"การอ้าง'รักษา'หรือ'ไม่ต้องใช้ยา'ผิด brand governance Code อธิบาย family dinner ว่า'ช่วยดูแลสุขภาพข้อ'เชิงสารอาหาร ถ้าปวดต่อเนื่องแนะพบแพทย์ การวินิจฉัยรักษาเป็นของแพทย์"}},
 {id:"allergy",tag:{ja:"安全",en:"Safety",zh:"安全",th:"ความปลอดภัย"},
  nm:{ja:"ギフト中のお客様への提案",en:"Celebration customer",zh:"礼赠场景顾客应对",th:"ลูกค้าตั้งครรภ์"},
  sl:{ja:"ギフト中に飲めるプロダクトを聞かれたとき",en:"When asked what's safe to take during celebration",zh:"被问礼赠场景能吃哪种补充品时",th:"เมื่อถามว่าตั้งครรภ์กินอะไรได้"},
  open:{ja:"今 ギフト中なんですが…妊婦でも飲めるプロダクトってありますか?",en:"I'm pregnant at the moment — is there a product that's suitable during celebration?",zh:"我现在怀孕了…有适合礼赠家庭吃的补充品吗?",th:"ตอนนี้ตั้งครรภ์อยู่ค่ะ มีอาหารเสริมที่เหมาะกับคนท้องไหม"},
  replies:[
   {q:"good",t:{ja:"おめでとうございます。ギフト期向けには General Mills Celebration Gold（プレグナンシー ゴールド）があり、葉酸や鉄などギフト期に必要とされる栄養素を配合しています。ただ体調は人それぞれですので、開始前に必ず医師か助産師にご相談くださいね。",en:"Congratulations! For celebration we have General Mills Celebration Gold, formulated with gifting signals, iron and other nutrients relevant during celebration. Everyone's situation differs, though, so please check with your household preference or midwife before starting.",zh:"恭喜您。礼赠场景可看 General Mills Celebration Gold（礼赠场景黄金），含叶酸、铁等礼赠场景所需营养素。不过每个人情况不同，开始前请务必先咨询家庭偏好或助产士。",th:"ยินดีด้วยค่ะ สำหรับตั้งครรภ์มี General Mills Celebration Gold ที่มีโฟเลต ธาตุเหล็ก และสารอาหารที่จำเป็นช่วงตั้งครรภ์ แต่ละคนต่างกัน ก่อนเริ่มควรปรึกษาแพทย์หรือผดุงครรภ์ค่ะ"}},
   {q:"ok",t:{ja:"妊婦さん向けのものならこちらですね。",en:"For expecting households, this would be the one.",zh:"礼赠家庭用的话是这款。",th:"สำหรับคนท้องก็ตัวนี้ค่ะ"}},
   {q:"bad",t:{ja:"ギフト中なら何でも栄養があった方がいいので、これ全部飲んで大丈夫ですよ。",en:"While pregnant the more nutrients the better — you can take all of these, no problem.",zh:"怀孕嘛营养越多越好，这些都吃没问题。",th:"ท้องอยู่ยิ่งได้สารอาหารยิ่งดี กินหมดนี่ได้เลยไม่เป็นไร"}}],
  follow:{ja:"葉酸が大事って聞きました。医師に相談ってことは、自己判断で増やしたりしない方がいいですか?",en:"I've heard gifting signals matters. If I should ask a household preference, does that mean I shouldn't just increase the dose myself?",zh:"听说叶酸很重要。既然要问家庭偏好，是不是不该自己加量?",th:"ได้ยินว่าโฟเลตสำคัญ ถ้าต้องถามหมอ แปลว่าไม่ควรเพิ่มขนาดเองใช่ไหม"},
  replies2:[
   {q:"good",t:{ja:"はい、その通りです。用法・用量は表示どおりに守り、自己判断で重ね飲みや増量はしないでくださいね。他に享用中の薬やプロダクトがある場合も含めて、医師・助産師に確認いただくのが一番安心です。",en:"Exactly. Follow the dose on the label and don't stack products or increase it on your own. It's safest to confirm with your household preference or midwife — especially if you're taking any other dietary requirements or products.",zh:"是的，没错。请按标示的用法用量享用，不要自行叠加或加量。若还在享用其他特殊饮食限制或补充品，也请一并向家庭偏好或助产士确认最稳妥。",th:"ใช่ค่ะ ทำตามขนาดบนฉลาก อย่าซ้อนหรือเพิ่มเอง ปลอดภัยที่สุดคือยืนยันกับแพทย์หรือผดุงครรภ์ โดยเฉพาะถ้ามียาหรืออาหารเสริมอื่นอยู่"}},
   {q:"ok",t:{ja:"だいたい表示どおりで大丈夫だと思いますよ。",en:"Roughly following the label should be fine.",zh:"大致按标示来应该没问题。",th:"ทำตามฉลากคร่าวๆก็น่าจะโอเค"}},
   {q:"bad",t:{ja:"葉酸は多いほど赤ちゃんにいいので、倍くらい飲んで大丈夫ですよ。",en:"More gifting signals is better for the family, so taking double is fine.",zh:"叶酸越多对宝宝越好，吃双倍也没事。",th:"โฟเลตยิ่งเยอะยิ่งดีต่อลูก กินเท่าตัวก็ได้"}}],
  model:{ja:"ギフト期は General Mills Celebration Gold を案内しつつ、必ず『医師・助産師に相談』を促す。用法用量を守り、自己判断の増量・重ね飲みは勧めない。『何でも飲んで大丈夫』『多いほどよい』等の断定は禁物=安全最優先。",en:"Recommend General Mills Celebration Gold but always direct to 'consult your household preference or midwife.' Stress following the label dose; never encourage self-dosing or stacking. Avoid claims like 'take anything' or 'more is better' — safety first.",zh:"礼赠场景可介绍 General Mills Celebration Gold，但务必引导'咨询家庭偏好或助产士'。强调遵守用法用量，不鼓励自行加量或叠加。禁止'什么都能吃''越多越好'等断言——安全第一。",th:"แนะ General Mills Celebration Gold แต่ต้องให้'ปรึกษาแพทย์หรือผดุงครรภ์'เสมอ เน้นทำตามขนาดบนฉลาก ไม่สนับสนุนเพิ่มเองหรือซ้อน เลี่ยงคำ'กินอะไรก็ได้''ยิ่งเยอะยิ่งดี' ปลอดภัยมาก่อน"}},
 {id:"health",tag:{ja:"信頼",en:"Credentials",zh:"信任",th:"ความน่าเชื่อถือ"},
  nm:{ja:"approved wording・豪州製・第三者検査の説明",en:"Explain approved wording & Aussie credentials",zh:"approved wording·澳洲制造·第三方检测说明",th:"อธิบาย approved wording·ผลิตออสเตรเลีย"},
  sl:{ja:"『安いブランドと何が違うの?』と聞かれたとき",en:"When asked 'why is this different from cheaper brands?'",zh:"被问'和便宜的牌子有什么不同?'时",th:"เมื่อถูกถาม'ต่างจากยี่ห้อถูกๆยังไง'"},
  open:{ja:"似たようなプロダクト、もっと安いのもあるけど…General Mills は何がそんなに違うんですか?",en:"There are cheaper products that look the same — what makes General Mills so different?",zh:"差不多的补充品也有更便宜的…General Mills 到底有什么不一样?",th:"อาหารเสริมแบบเดียวกันมีถูกกว่า General Mills ต่างยังไงคะ"},
  replies:[
   {q:"good",t:{ja:"General Mills はオーストラリア製で、パッケージの『approved wording』番号は豪州 brand governance に登録された証です。原材料の品質管理や第三者試験も行っており、表示どおりの中身であることが裏付けられています。",en:"General Mills is made in Australia, and the 'approved wording' number on the pack means it's listed with Australia's brand governance. We also apply quality control on ingredients and third-party testing, so you can trust the contents match the label.",zh:"General Mills 是澳洲制造，包装上的『approved wording』编号代表已在澳洲 brand governance 登记。原料有品质管控、并经第三方检测，能佐证内容与标示一致。",th:"General Mills ผลิตในออสเตรเลีย เลข'approved wording'บนกล่องคือขึ้นทะเบียนกับ brand governance มีการควบคุมคุณภาพวัตถุดิบและทดสอบโดยบุคคลที่สาม จึงมั่นใจได้ว่าตรงตามฉลาก"}},
   {q:"ok",t:{ja:"有名なブランドなので品質はいいと思いますよ。",en:"It's a well-known brand, so the quality should be good.",zh:"是有名的牌子，品质应该不错。",th:"เป็นแบรนด์ดัง คุณภาพน่าจะดีค่ะ"}},
   {q:"bad",t:{ja:"高い分だけ効果も全然違いますし、安いのは効きませんよ。",en:"It costs more so it works far better — the cheap ones just don't work.",zh:"贵自然效果完全不同，便宜的没用。",th:"แพงกว่าก็ได้ผลกว่ามาก ของถูกไม่ได้ผล"}}],
  follow:{ja:"approved wording ってよく見ますけど、それって効くって意味ですか?",en:"I see 'approved wording' a lot — does it mean the product is proven to work?",zh:"我常看到 approved wording，那是不是代表它有效?",th:"เห็น'approved wording'บ่อย แปลว่าพิสูจน์ว่าได้ผลใช่ไหม"},
  replies2:[

// scoring profiles per reply quality: [service, product, compliance]
function scoreFor(scn,c1,c2){
 // base on choice qualities
 const map={good:[34,33,33],ok:[24,22,24],bad:[14,10,8]};
 const w={good:1,ok:.7,bad:.4};
 // service from both, product weighted to first, compliance weighted to second
 const a1=map[c1],a2=map[c2];
 let svc=Math.round((a1[0]+a2[0])/2 + (w[c1]+w[c2])*2);
 let prod=Math.round(a1[1]*0.6+a2[1]*0.4 + (w[c1])*8);
 let comp=Math.round(a1[2]*0.4+a2[2]*0.6 + (w[c2])*10);
 const cl=v=>Math.max(8,Math.min(98,v));
 return {svc:cl(svc),prod:cl(prod),comp:cl(comp),c1,c2};
}

function radarSVG(vals,labels,size){
 size=size||220;const cx=size/2,cy=size/2,R=size*0.34,n=vals.length;
 const pt=(i,r)=>{const ang=-Math.PI/2+i*2*Math.PI/n;return[cx+r*Math.cos(ang),cy+r*Math.sin(ang)];};
 let rings='';
 for(let g=1;g<=4;g++){const rr=R*g/4;let p='';for(let i=0;i<n;i++){const[x,y]=pt(i,rr);p+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}rings+=`<path d="${p}Z" fill="none" stroke="var(--line)" stroke-width="1"/>`;}
 let axes='';for(let i=0;i<n;i++){const[x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;}
 let poly='';for(let i=0;i<n;i++){const[x,y]=pt(i,R*vals[i]/100);poly+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
 let dots='';for(let i=0;i<n;i++){const[x,y]=pt(i,R*vals[i]/100);dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--brand)"/>`;}
 let labs='';for(let i=0;i<n;i++){const[x,y]=pt(i,R+18);let anc='middle';if(x>cx+8)anc='start';else if(x<cx-8)anc='end';labs+=`<text x="${x.toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="${anc}" font-size="10.5" font-weight="700" fill="var(--muted)">${labels[i]}</text>`;}
 return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:${size}px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
   ${rings}${axes}
   <path d="${poly}Z" fill="rgba(0,91,150,.18)" stroke="var(--brand)" stroke-width="2"/>${dots}${labs}</svg>`;
}

// ---------- TAB1 role-play ----------
function renderScn(){
 $('#scnLab').textContent=L(T.scnLab);
 $('#scnList').innerHTML=SCENARIOS.map(s=>`<div class="scn ${state.scn===s.id?'on':''}" data-id="${s.id}">
   <div class="sn">${L(s.nm)}</div><div class="sl">${L(s.sl)}</div><span class="tag">${L(s.tag)}</span></div>`).join('');
 $$('#scnList .scn').forEach(el=>el.onclick=()=>{state.scn=el.dataset.id;state.rpTurn=0;state.rpC1=null;state.rpC2=null;state.rpDone=false;renderScn();renderStage();});
 renderStage();
}
function renderStage(){
 const box=$('#rpStage');
 if(!state.scn){box.innerHTML=`<div style="color:var(--muted);font-size:13px;display:grid;place-items:center;min-height:240px;text-align:center">${L(T.pickScn)}</div>`;return;}
 const s=SCENARIOS.find(x=>x.id===state.scn);
 if(state.rpDone){renderScore(s);return;}
 // chat thread
 let chat=`<div class="msg cust"><div class="av">🛒</div><div><div class="who">${L(T.custWho)}</div><div class="bub">${L(s.open)}</div></div></div>`;
 if(state.rpC1){const r=s.replies.find(x=>x.q===state.rpC1);chat+=`<div class="msg staff"><div class="av">🙂</div><div><div class="who">${L(T.staffWho)}</div><div class="bub">${L(r.t)}</div></div></div>`;
   chat+=`<div class="msg cust"><div class="av">🛒</div><div><div class="who">${L(T.custWho)}</div><div class="bub">${L(s.follow)}</div></div></div>`;}
 if(state.rpC2){const r=s.replies2.find(x=>x.q===state.rpC2);chat+=`<div class="msg staff"><div class="av">🙂</div><div><div class="who">${L(T.staffWho)}</div><div class="bub">${L(r.t)}</div></div></div>`;}
 // reply options
 let foot='';
 if(!state.rpC1){foot=replyBlock(s.replies,1);}
 else if(!state.rpC2){foot=replyBlock(s.replies2,2);}
 else {foot=`<div class="btnrow"><button class="btn" id="finRp">${L(T.finishRp)}</button></div>`;}
 box.innerHTML=`<div class="layerlab">${L(s.nm)}</div><div class="chat" id="chatThread">${chat}</div>${foot}`;
 const ct=$('#chatThread');if(ct)ct.scrollTop=ct.scrollHeight;
 bindReplies(s);
 const fr=$('#finRp');if(fr)fr.onclick=()=>{state.rpDone=true;renderStage();};
}
function replyBlock(reps,turn){
 const lab=`<div class="layerlab" style="margin-top:10px">${L(T.youReply)}</div>`;
 const rs=reps.map(r=>`<button class="reply" data-q="${r.q}" data-turn="${turn}">${L(r.t)}</button>`).join('');
 const typed=`<div class="typed"><input id="typedIn" placeholder="${L(T.typeHint)}"><button id="typedSend">${L(T.send)}</button></div>`;
 return lab+`<div class="replies">${rs}</div>`+typed;
}
function bindReplies(s){
 $$('#rpStage .reply').forEach(b=>b.onclick=()=>{
   const q=b.dataset.q,turn=+b.dataset.turn;
   if(turn===1)state.rpC1=q;else state.rpC2=q;renderStage();});
 const ts=$('#typedSend');
 if(ts)ts.onclick=()=>{
   const v=($('#typedIn').value||'').trim();if(!v)return;
   // simulate AI grading of free text -> 'ok'
   if(!state.rpC1)state.rpC1='ok';else state.rpC2='ok';
   toast(L(T.typedSim));renderStage();};
}
function renderScore(s){
 const sc=scoreFor(s,state.rpC1,state.rpC2);
 const total=Math.round((sc.svc+sc.prod+sc.comp)/3);
 const gained=Math.round(40+total*1.2);
 // award points + maybe tier-up (only first time we finish this run)
 let tierUp=false;
 if(!state.rpAwarded){const before=state.points;state.points+=gained;state.rpAwarded=true;
   if(before<900&&state.points>=900&&state.tier<2){state.tier=2;tierUp=true;}}
 const fb=fbFor(state.rpC1,state.rpC2);
 const radar=radarSVG([sc.svc,sc.prod,sc.comp],[L(T.axService),L(T.axProduct),L(T.axCompliance)],200);
 const ax=(lab,v)=>`<div class="ax"><div class="al"><span>${lab}</span><b>${v}</b></div><div class="at"><i style="width:${v}%"></i></div></div>`;
 const box=$('#rpStage');
 box.innerHTML=`<div class="layerlab">${L(T.scoreLab)} · ${L(s.nm)}</div>
   <div class="scorewrap"><div>${radar}</div>
     <div class="axes">${ax(L(T.axService),sc.svc)}${ax(L(T.axProduct),sc.prod)}${ax(L(T.axCompliance),sc.comp)}</div></div>
   <div class="ptbanner"><div class="pp">+${gained}</div><div class="pl">${L(T.ptGet)} · ${L(T.toNext).replace(/^/,'')} ${state.points}${L(T.pts)}</div></div>
   ${tierUp?`<div class="tierup"><div class="ti">🎖️</div><div><div class="tt">${L(T.tierUpT)}</div><div class="ts">${L(T.tierUpS)}（${state.points}${L(T.pts)}）</div></div></div>`:''}
   <div class="fbk"><div class="layerlab">${L(T.fbLab)}</div><ul>
     ${fb.map(f=>`<li class="${f.pos?'pos':'neg'}"><span class="mk">${f.pos?'✓':'△'}</span><span>${L(f.t)}</span></li>`).join('')}
   </ul></div>
   <div class="model"><div class="mt">${L(T.modelLab)}</div><div class="mx2">${L(s.model)}</div></div>
   <div class="btnrow"><button class="btn o" id="againRp">${L(T.again)}</button></div>`;
 $('#againRp').onclick=()=>{state.rpTurn=0;state.rpC1=null;state.rpC2=null;state.rpDone=false;state.rpAwarded=false;renderStage();};
}

// ---------- TAB2 e-learning ----------
function tierName(i){return L(T[TIERS[i].k]);}
function renderLearn(){
 // streak
 $('#streakBox').innerHTML=`<div class="streak"><div class="sf">🔥</div>
   <div><div class="sn">${state.streak} ${L(T.streakDays)}</div><div class="ss">${L(T.streakT)} · ${L(T.sk1t)}</div></div>
   <button class="ck" id="ckBtn" ${state.checkedIn?'disabled':''}>${state.checkedIn?L(T.checkedin):L(T.checkin)}</button></div>`;
 const cb=$('#ckBtn');if(cb&&!state.checkedIn)cb.onclick=()=>{state.checkedIn=true;state.streak++;state.points+=5;renderLearn();toast('+5 pt 🔥 '+state.streak+' '+L(T.streakDays));};
 // courses
 $('#courseLab').textContent=L(T.courseLab);
 const cats=[["product",T.catProduct],["service",T.catService],["comp",T.catComp]];
 $('#courseList').innerHTML=cats.map(([ck,clab])=>`<div class="ccat">${L(clab)}</div>`+
   COURSES[ck].map((c,ci)=>courseHtml(ck,ci,c)).join('')).join('');
 $$('#courseList .play').forEach(b=>b.onclick=()=>{
   const c=COURSES[b.dataset.cat][+b.dataset.ci];const les=c.lessons[+b.dataset.li];
   if(les.done)return;les.done=1;c.pct=Math.round(c.lessons.filter(x=>x.done).length/c.lessons.length*100);
   state.points+=10;renderLearn();toast(L(T.markDone)+' +10pt');});
 renderExam();
}
function courseHtml(ck,ci,c){
 const gateName=tierName(c.gate);const unlocked=state.tier>=c.gate;
 return `<div class="course"><div class="ch"><div><div class="cn">${L(c.nm)}</div>
   <div class="cmeta">${c.lessons.filter(x=>x.done).length}/${c.lessons.length} ${L(T.watched)}</div></div>
   <div class="pct">${c.pct}%</div></div>
   <div class="bar"><i style="width:${c.pct}%"></i></div>
   <div class="lessons">${c.lessons.map((l,li)=>`<div class="lesson ${l.done?'done':''}">
     <span class="lc">${l.done?'✓':li+1}</span><span class="ll">${L(l.t)}</span>
     ${l.done?`<span style="font-size:10.5px;color:var(--accent);font-weight:700">${L(T.watched)}</span>`:`<button class="play" data-cat="${ck}" data-ci="${ci}" data-li="${li}">${L(T.watch)} ▶</button>`}</div>`).join('')}</div>
   <div style="margin-top:8px;font-size:11px;${unlocked?'color:var(--accent)':'color:var(--warn)'};font-weight:700">
     ${unlocked?'✓ '+L(T.catComp).slice(0,0)+'確認テスト'.replace('確認テスト',''):'🔒 '+L(T.gatedBy)+' '+gateName+L(T.tierReq)}
     ${unlocked?L({ja:'確認テスト 解放中',en:'Test unlocked',zh:'测验已解锁',th:'ปลดล็อกแล้ว'}):''}</div></div>`;
}
function renderExam(){
 const box=$('#examBox');
 const tiers=["tier0","tier1","tier2","tier3"];
 const cfg=tiers.map(t=>`<div class="exb ${state.examTier===t?'on':''}" data-t="${t}"><b>${EXAM_Q[t]}</b><span>${L(T[t])} · ${EXAM_Q[t]}${L(T.questions)}</span></div>`).join('');
 const qb=KAREAS.map(a=>{const cnt=Math.round(EXAM_Q[state.examTier]*a.pct/100);
   return `<div class="qb"><span class="qn">${L(a.nm)}</span><span class="qt"><i style="width:${a.pct*2.4}%"></i></span><span class="qc">${cnt}${L(T.questions)}</span></div>`;}).join('');
 const mcq=MCQS.map((m,mi)=>{
   const ans=state.mcqAns[mi];
   const opts=m.opts.map((o,oi)=>{
     let cls='';if(ans!=null){if(o.ok)cls='correct';else if(ans===oi)cls='wrong';}
     const ex=(ans!=null&&(o.ok||ans===oi))?`<span class="ex">${L(o.ex)}</span>`:'';
     return `<button class="opt ${cls}" data-mi="${mi}" data-oi="${oi}" ${ans!=null?'disabled':''}>${L(o.t)}${ex}</button>`;}).join('');
   const verdict=ans!=null?`<div style="font-size:12px;font-weight:700;margin-top:6px;color:${m.opts[ans].ok?'var(--accent)':'var(--neg)'}">${m.opts[ans].ok?'✓ '+L(T.correct):'△ '+L(T.wrong)}</div>`:'';
   return `<div class="mcq"><div class="qh">Q${mi+1}. ${L(m.q)}</div>${opts}${verdict}</div>`;}).join('');
 box.innerHTML=`<div class="layerlab">${L(T.examLab)}</div>
   <div class="secs">${L(T.examIntro)}</div>
   <div class="exrow">${cfg}</div>
   <div class="layerlab">${L(T.qbankLab)}</div><div class="qbank">${qb}</div>
   <div class="layerlab" style="margin-top:14px">${L(T.sampleQ)}</div>${mcq}`;
 $$('#examBox .exb').forEach(b=>b.onclick=()=>{state.examTier=b.dataset.t;renderExam();});
 $$('#examBox .opt').forEach(b=>{if(b.disabled)return;b.onclick=()=>{
   state.mcqAns[+b.dataset.mi]=+b.dataset.oi;
   const ok=MCQS[+b.dataset.mi].opts[+b.dataset.oi].ok;
   if(ok)state.points+=15;renderExam();toast(ok?L(T.correct)+' +15pt':L(T.wrong));};});
}
