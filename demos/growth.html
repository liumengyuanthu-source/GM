<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Growth Studio · General Mills · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7f7; --card:#fff; --line:#e6ecec;
    --display:Georgia,'Times New Roman','Songti SC','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:980px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px}.brand sup{font-size:9px;color:var(--brand)}
  .sub{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}.sp{flex:1}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:980px;margin:0 auto;padding:22px 18px 110px}

  .stepper{display:flex;align-items:center;gap:0;margin-bottom:22px;flex-wrap:wrap}
  .stp{display:flex;align-items:center;gap:8px;cursor:pointer;opacity:.5;transition:.2s}
  .stp.on,.stp.done{opacity:1}
  .stp .sn{width:29px;height:29px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:12.5px;color:var(--muted);background:var(--card);flex:none;transition:.2s}
  .stp.on .sn{border-color:var(--brand);color:var(--brand);background:var(--soft)}
  .stp.done .sn{border-color:var(--brand);background:var(--brand);color:#fff}
  .stp .sl{font-size:12.5px;font-weight:600}
  .stp.on .sl{color:var(--ink)}
  .stp-line{flex:1;height:2px;background:var(--line);margin:0 8px;min-width:10px}
  .stp-line.done{background:var(--brand)}

  h2.step-t{font-family:var(--display);font-size:23px;font-weight:600;margin-bottom:4px}
  .step-s{font-size:13.5px;color:var(--muted);margin-bottom:18px}

  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
  .opt{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:16px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;overflow:hidden}
  .opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);transform:scaleY(0);transform-origin:center;transition:transform .2s}
  .opt:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.07);border-color:var(--brand)}
  .opt.sel{border-color:var(--brand);background:linear-gradient(180deg,var(--soft),var(--card))}
  .opt.sel::before{transform:scaleY(1)}
  .opt .oi{width:42px;height:42px;border-radius:12px;background:var(--soft);display:grid;place-items:center;font-size:22px;margin-bottom:10px}
  .opt.sel .oi{background:var(--brand)}
  .opt .ot{font-family:var(--display);font-size:16px;font-weight:600;line-height:1.2}
  .opt .od{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}
  .opt .ock{position:absolute;top:13px;right:13px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:11px;color:#fff}
  .opt.sel .ock{background:var(--brand);border-color:var(--brand)}
  .opt .rec{position:absolute;top:13px;right:13px;font-size:9.5px;font-weight:700;letter-spacing:.04em;color:var(--brand);background:var(--soft);border-radius:5px;padding:3px 6px}
  .opt .reach{display:inline-block;margin-top:9px;font-size:11px;font-weight:700;color:var(--brand-d);background:var(--soft);border-radius:6px;padding:3px 8px}
  /* photo theme cards */
  .opt.photo{padding:0;border-radius:16px}
  .opt.photo .othumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(135deg,var(--brand),var(--brand-d))}
  .opt.photo .oimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s ease}
  .opt.photo:hover .oimg{transform:scale(1.06)}
  .opt.photo .othumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 38%,rgba(20,8,8,.5) 100%)}
  .opt.photo .obadge{position:absolute;left:12px;bottom:11px;z-index:2;width:30px;height:30px;color:#fff;display:grid;place-items:center;filter:drop-shadow(0 1px 4px rgba(0,0,0,.6))}
  .opt.photo .obadge svg{width:27px;height:27px}
  .opt.photo .obody{padding:12px 15px 15px}
  .opt.photo .obody .ot{font-size:16px}
  .opt.photo.noimg .oimg{display:none}
  .opt.photo.noimg .othumb{display:grid;place-items:center}
  .opt.photo.noimg .othumb::before{content:attr(data-em);font-size:46px;z-index:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.25))}
  .opt.photo.noimg .obadge{display:none}
  .opt.photo .ock{z-index:3;background:rgba(255,255,255,.9);color:var(--brand-d);border-color:rgba(255,255,255,.8)}
  .opt.photo.sel{background:var(--card);box-shadow:0 10px 24px rgba(0,0,0,.12)}
  .opt.photo.sel .ock{background:var(--brand);color:#fff;border-color:var(--brand)}

  .goalbox{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
  .goalbox label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .field{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font:inherit;font-size:14.5px;margin-top:8px;resize:vertical;min-height:46px}
  .kpi{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:12px;font-weight:600;color:var(--accent);background:#eaf1f7;border-radius:8px;padding:6px 11px}

  .chan-block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
  .cb-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .cb-ic{width:34px;height:34px;border-radius:9px;background:var(--soft);display:grid;place-items:center;font-size:17px}
  .cb-name{font-weight:700;font-size:15px}
  .tchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
  .tc{border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .tc:hover{border-color:var(--brand);color:var(--brand)}
  .tc.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .regen{margin-left:auto;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 12px;font:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .regen:hover{border-color:var(--brand);color:var(--brand)}

  .poster{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border-radius:13px;padding:22px;position:relative;overflow:hidden}
  .poster::after{content:"";position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);right:-30px;bottom:-40px}
  .poster .em{font-size:32px}.poster .ph{font-family:var(--display);font-size:22px;font-weight:700;margin:8px 0 4px;line-height:1.12}
  .poster .psub{font-size:12.5px;opacity:.92}.poster .pcta{display:inline-block;background:#fff;color:var(--brand);font-weight:700;font-size:12px;padding:7px 13px;border-radius:8px;margin-top:13px}
  .ptabs{display:flex;gap:6px;margin:11px 0 9px;flex-wrap:wrap}
  .pt{border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
  .pt.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .copybox{font-size:13px;line-height:1.6;background:var(--soft);border-radius:10px;padding:12px;white-space:pre-line}
  .copybox .hash{color:var(--brand-d);font-size:12px;display:block;margin-top:7px}
  .ce{outline:none;cursor:text;transition:background .14s,box-shadow .14s}
  .ce:hover{background:rgba(0,0,0,.05);border-radius:4px;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
  .ce:focus{background:#fffceb;border-radius:4px;box-shadow:0 0 0 2px rgba(0,155,164,.28)}
  .em-hero .ce:hover,.poster .ce:hover,.slide .ce:hover,.reel .ce:hover{background:rgba(255,255,255,.16);box-shadow:0 0 0 3px rgba(255,255,255,.1)}
  .edit-hint{font-size:11.5px;color:var(--muted);margin:-8px 0 16px;display:flex;align-items:center;gap:6px}

  /* rich email */
  .em-doc{border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13px;background:#fff}
  .em-top{background:var(--bg);border-bottom:1px solid var(--line);padding:10px 13px}
  .em-from{font-weight:700;font-size:12.5px}.em-subj{font-size:13px;margin-top:2px;font-weight:600}.em-pre{color:var(--muted);font-size:11.5px;margin-top:2px}
  .em-hero{position:relative;overflow:hidden;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand-d));padding:20px}
  .em-hero::after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.08);right:-40px;bottom:-50px}
  .em-hero .em{font-size:30px}.em-hero h3{font-family:var(--display);font-size:21px;margin:7px 0 3px;line-height:1.15}.em-hero p{font-size:12.5px;opacity:.93}
  .em-body{padding:15px}
  .em-body p{margin-bottom:9px;line-height:1.62;color:#33403e;font-size:12.7px}
  .em-h{font-family:var(--display);font-size:15px;font-weight:600;margin:4px 0 8px}
  .em-bul{list-style:none;margin:2px 0 11px}
  .em-bul li{position:relative;padding:6px 0 6px 23px;border-bottom:1px dashed var(--line);font-size:12.5px;color:#33403e}
  .em-bul li::before{content:'✓';position:absolute;left:0;color:var(--brand);font-weight:800}
  .em-offer{background:var(--soft);border:1px dashed var(--brand);border-radius:10px;padding:12px 13px;margin:11px 0;display:flex;align-items:center;gap:12px}
  .em-offer .ot{flex:1;font-weight:700;color:var(--brand-d);font-size:13px}
  .em-offer .oc{background:var(--ink);color:#fff;border-radius:6px;padding:5px 9px;font-weight:700;letter-spacing:.08em;font-size:11.5px}
  .em-cta{display:inline-block;background:var(--brand);color:#fff;font-weight:700;font-size:12.5px;padding:10px 18px;border-radius:9px}
  .em-foot{background:var(--bg);border-top:1px solid var(--line);padding:10px 13px;font-size:10.5px;color:var(--muted);line-height:1.5}
  .em-news .em-sec{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
  .em-spot{text-align:center;padding:18px}
  .em-spot .big{font-family:var(--display);font-size:34px;font-weight:800;color:var(--brand);line-height:1}
  .em-spot .code{display:inline-block;background:var(--ink);color:#fff;border-radius:7px;padding:5px 12px;font-weight:700;letter-spacing:.12em;font-size:13px;margin:10px 0}

  .pv-wa{background:#e7ddd2;border-radius:12px;padding:12px}
  .pv-wa .wabar{font-size:11px;font-weight:700;color:#075e54;margin-bottom:8px}
  .pv-wa .wamsg{background:#fff;border-radius:3px 11px 11px 11px;padding:11px;max-width:90%;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .pv-wa .waimg{height:74px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand-d));display:grid;place-items:center;font-size:30px;color:#fff;margin-bottom:8px}
  .pv-wa .watext{font-size:13px;line-height:1.55}.pv-wa .watext b{display:block;margin-bottom:3px}
  .pv-wa .wal{margin:7px 0 0;padding-left:16px;font-size:12.5px}.pv-wa .wal li{margin:2px 0}
  .pv-wa .wabtn{margin-top:9px;border-top:1px solid var(--line);padding-top:8px;text-align:center;color:#0a6cff;font-weight:700;font-size:13px}
  .pv-wa .waopt{font-size:10.5px;color:var(--muted);margin-top:6px}
  .qr-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .qr-chip{background:#fff;border:1px solid #bfe0d9;color:#075e54;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600}
  .pv-inapp{border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;background:linear-gradient(135deg,var(--soft),var(--card))}
  .pv-inapp .ib{width:48px;height:48px;border-radius:12px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:23px;flex:none}
  .pv-inapp .it b{display:block;font-size:14px}.pv-inapp .it span{font-size:12px;color:var(--muted)}
  .pv-inapp .ix{margin-left:auto;background:var(--brand);color:#fff;font-size:12px;font-weight:700;padding:8px 13px;border-radius:8px;flex:none}

  .pv-sms{max-width:320px}
  .pv-sms .sb{background:#e9e9eb;color:#111;border-radius:15px 15px 15px 4px;padding:11px 14px;font-size:13px;line-height:1.5;white-space:pre-line}
  .pv-sms .sb a{color:#0a6cff;text-decoration:none}
  .pv-sms .sc{font-size:11px;color:var(--muted);margin-top:6px}

  .carou{display:flex;gap:8px}
  .slide{flex:1;min-width:0;border-radius:12px;padding:13px;color:#fff;background:linear-gradient(150deg,var(--brand),var(--brand-d));min-height:128px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .slide:nth-child(2){background:linear-gradient(150deg,var(--brand-d),#5e0000)}
  .slide:nth-child(3){background:linear-gradient(150deg,var(--accent),#06243c)}
  .slide .sn{font-size:10px;opacity:.8;font-weight:700}
  .slide .se{font-size:22px}
  .slide b{font-family:var(--display);font-size:13.5px;line-height:1.18;display:block;margin-top:6px}
  .slide span{font-size:11px;opacity:.9}
  .reel{width:152px;aspect-ratio:9/16;border-radius:15px;background:linear-gradient(165deg,var(--brand),var(--brand-d));color:#fff;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;margin:0 auto;position:relative;overflow:hidden}
  .reel .em{position:absolute;top:14px;left:14px;font-size:26px}
  .reel b{font-family:var(--display);font-size:16px;line-height:1.15}
  .reel span{font-size:11px;opacity:.92;margin:5px 0 9px}
  .reel .rcta{background:#fff;color:var(--brand);font-weight:700;font-size:11.5px;padding:7px;border-radius:8px;text-align:center}
  .reel .rdots{position:absolute;top:16px;right:14px;display:flex;gap:3px}.reel .rdots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}.reel .rdots i.on{background:#fff}

  .pv-offline{display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
  .pv-offline .poster{flex:1;min-width:200px}
  .standee{width:120px;border-radius:13px 13px 6px 6px;background:linear-gradient(180deg,var(--brand),var(--brand-d));color:#fff;padding:14px 12px;text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center}
  .standee .em{font-size:26px}.standee b{font-family:var(--display);font-size:14px;line-height:1.15}
  /* campaign photos inside channel previews */
  .poster>*,.reel>*,.standee>*,.slide>*,.em-hero>*{position:relative;z-index:2}
  .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border-radius:inherit}
  .scrim{position:absolute;inset:0;z-index:1;border-radius:inherit}
  .poster .scrim,.slide .scrim{background:linear-gradient(150deg,rgba(110,0,0,.5),rgba(35,0,0,.82))}
  .reel .scrim,.standee .scrim{background:linear-gradient(180deg,rgba(30,0,0,.12) 28%,rgba(25,0,0,.86))}
  .em-hero .scrim{background:linear-gradient(135deg,rgba(110,0,0,.46),rgba(35,0,0,.8))}
  .em-hero{min-height:132px;display:flex;flex-direction:column;justify-content:flex-end}
  .pv-wa .waimg{padding:0;overflow:hidden;height:auto;aspect-ratio:1.9/1}
  .pv-wa .waimg img{width:100%;height:100%;object-fit:cover;object-position:center 38%;display:block}
  .pv-inapp .ib{overflow:hidden}
  .pv-inapp .ib img{width:100%;height:100%;object-fit:cover;display:block}
  /* channel line icons */
  .opt .oi{color:var(--brand)}
  .opt.sel .oi{color:#fff}
  .opt .oi svg{width:23px;height:23px}
  .cb-ic{color:var(--brand)}
  .cb-ic svg{width:19px;height:19px}
  .qrcard{border:1px solid var(--line);border-radius:13px;padding:13px;text-align:center;min-width:150px;background:#fff}
  .qr{width:104px;height:104px;margin:0 auto 8px;display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);gap:1px}
  .qr i{background:var(--ink);border-radius:1px}.qr i.b0{background:transparent}
  .qrcard small{font-size:11px;color:var(--muted)}
  .qrcard .cid{font-size:10.5px;font-weight:700;color:var(--brand-d);margin-top:4px;letter-spacing:.02em}
  .coupon2{border:2px dashed var(--brand);border-radius:13px;padding:14px;text-align:center;min-width:170px;background:var(--soft)}
  .coupon2 .big{font-family:var(--display);font-size:26px;font-weight:800;color:var(--brand)}
  .coupon2 .code{background:var(--ink);color:#fff;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;letter-spacing:.1em;display:inline-block;margin:7px 0 4px}

  /* audience */
  .aud-wrap{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
  .aud-groups{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .agrp{margin-bottom:15px}.agrp:last-child{margin-bottom:0}
  .agrp .gl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .achips{display:flex;flex-wrap:wrap;gap:7px}
  .ac{border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .ac:hover{border-color:var(--brand)}
  .ac.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .aud-est{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;position:sticky;top:78px;text-align:center}
  .aud-est .el{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .aud-est .en{font-family:var(--display);font-size:38px;font-weight:700;color:var(--brand);margin:6px 0;transition:.2s}
  .aud-est .ed{font-size:12px;color:var(--muted)}
  .aud-est .bar{height:8px;border-radius:5px;background:var(--bg);margin:13px 0 4px;overflow:hidden}
  .aud-est .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-d));transition:width .3s}
  .presets{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .preset{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .preset:hover{border-color:var(--brand);color:var(--brand)}

  /* review (geo + compliance) */
  .rev{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .panel h4{font-size:13.5px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .score{display:flex;align-items:center;gap:13px;margin-bottom:13px}
  .ring{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;flex:none}
  .ring i{width:46px;height:46px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-weight:800;font-size:15px;color:var(--brand)}
  .score .st b{font-size:13.5px}.score .st div{font-size:11.5px;color:var(--muted)}
  .chk{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
  .chk:last-child{border:0}
  .chk .ci{width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:11px;flex:none;color:#fff;margin-top:1px}
  .chk .ci.ok{background:#2e9e5b}.chk .ci.warn{background:#e0922f}
  .chk .ct{flex:1;line-height:1.4}.chk .ct small{display:block;color:var(--muted);font-size:11px;margin-top:1px}

function gc(cid){
  const v=state.variant[cid]||0;const t=COPY[state.theme]||COPY.festive;
  const m=MODEL(),ride=RIDE();
  const f=s=>(s||'').replace(/\{M\}/g,m).replace(/\{ride\}/g,ride);
  const pick=(arr,k)=>f(L(arr[k%arr.length]));
  const bl=t.bullets.map(b=>f(L(b)));const sh=v%bl.length;
  const rb=bl.slice(sh).concat(bl.slice(0,sh));
  return {head:pick(t.head,v),sub:pick(t.sub,v),bullets:rb,offer:f(L(t.offer)),code:t.code,cta:pick(t.cta,v),meta:t};
}

let _reached=0;function maxReached(){return Math.max(_reached,state.step);}
function curTheme(){return THEMES.find(t=>t.id===state.theme);}

function renderStepper(){
  const u=U();const box=$('#stepper');box.innerHTML='';
  u.steps.forEach((lab,i)=>{
    const s=document.createElement('div');
    s.className='stp'+(i===state.step?' on':'')+(i<state.step?' done':'');
    s.innerHTML='<div class="sn">'+(i<state.step?'✓':(i+1))+'</div><div class="sl">'+lab+'</div>';
    s.onclick=()=>{if(i<=maxReached())goStep(i);};
    box.appendChild(s);
    if(i<u.steps.length-1){const ln=document.createElement('div');ln.className='stp-line'+(i<state.step?' done':'');box.appendChild(ln);}
  });
}
function render(){
  renderStepper();
  const u=U();const st=$('#stage');const key=FLOW[state.step];
  if(key==='theme')st.innerHTML=stepTheme();
  else if(key==='channels')st.innerHTML=stepChannels();
  else if(key==='content')st.innerHTML=stepContent();
  else if(key==='review')st.innerHTML=stepReview();
  else if(key==='audience')st.innerHTML=stepAudience();
  else if(key==='launch')st.innerHTML=state.launched?stepResults():stepSchedule();
  bind();
  $('#back').style.visibility=state.step===0?'hidden':'visible';
  $('#back').textContent=u.back;
  const last=key==='launch';
  $('#next').textContent=state.launched?u.relaunch:(last?u.launch:u.next);
  $('#next').disabled=(key==='channels'&&state.chans.length===0);
  $('#ftxt').textContent=u.ftStep+' '+(state.step+1)+' '+u.ftOf+' '+FLOW.length+' · '+L(curTheme().name);
}

    {id:"exchange",f:.35,t:{en:"Upgrade-intent",ja:"アップグレード意向",th:"ตั้งใจอัปเกรด"}}]}
];
const AUD_BASE={'2w':2400000,'4w':850000};
const PRESETS=[
  {id:"young2",t:{en:"Young Tier-2 prospects",ja:"若年Tier-2見込み",th:"ผู้สนใจ Tier-2 วัยรุ่น"},aud:["t2","prospect","a2"]},
  {id:"cold",t:{en:"Cold leads, all cities",ja:"全都市の休眠",th:"ลีดเก่าทุกเมือง"},aud:["cold"]},
  {id:"upg",t:{en:"Upgrade-ready owners",ja:"乗換準備オーナー",th:"เจ้าของพร้อมอัปเกรด"},aud:["owner","exchange","a3"]}
];
function audSize(){let size=AUD_BASE[ENT()];
  AUD_GROUPS.forEach(g=>{const sel=g.chips.filter(ch=>state.aud.includes(ch.id));
    if(g.mult){sel.forEach(ch=>size*=ch.f);}else{const sh=sel.length?sel.reduce((a,ch)=>a+ch.f,0):1;size*=Math.min(sh,1);}});
  return Math.round(size);}
function fmt(n){return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?Math.round(n/1e3)+'K':''+n;}
function stepAudience(){
  const u=U();const base=AUD_BASE[ENT()];const size=audSize();const pct=Math.max(3,Math.round(size/base*100));
  let groups=AUD_GROUPS.map(g=>'<div class="agrp"><div class="gl">'+L(g.label)+'</div><div class="achips">'
    +g.chips.map(ch=>'<span class="ac'+(state.aud.includes(ch.id)?' on':'')+'" data-ac="'+ch.id+'">'+L(ch.t)+'</span>').join('')+'</div></div>').join('');
  let presets=PRESETS.map(p=>'<span class="preset" data-preset="'+p.id+'">'+L(p.t)+'</span>').join('');
  return '<h2 class="step-t">'+u.t_audience+'</h2><div class="step-s">'+u.s_audience+'</div>'
    +'<div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:7px">'+u.presetL+'</div>'
    +'<div class="presets">'+presets+'</div>'
    +'<div class="aud-wrap"><div class="aud-groups">'+groups+'</div>'
    +'<div class="aud-est"><div class="el">'+u.audReach+'</div><div class="en" id="audN">'+fmt(size)+'</div>'
    +'<div class="ed">'+pct+'% '+u.audOf+' ('+fmt(base)+')</div><div class="bar"><i id="audBar" style="width:'+pct+'%"></i></div></div></div>';
}

/* ---------------- schedule + results ---------------- */
function campaignId(){const pre=ENT()==='2w'?'BLKCORE':'BLKPREM';return pre+'-GRW-'+state.theme.slice(0,3).toUpperCase()+'-2606';}
function qrHtml(){let seed=0;for(const ch of (state.theme+ENT()))seed+=ch.charCodeAt(0);
  let cells='';for(let i=0;i<121;i++){const r=Math.floor(i/11),c=i%11;
    const corner=(r<3&&c<3)||(r<3&&c>7)||(r>7&&c<3);
    let on=corner?((r===0||r===2||c===0||c===2||(r===1&&c===1))||(r<3&&c>7&&(r===0||r===2||c===8||c===10||(r===1&&c===9)))||(r>7&&c<3&&(r===10||r===8||c===0||c===2||(r===9&&c===1)))):(((i*7+seed)%3)===0);
    cells+='<i class="'+(on?'':'b0')+'"></i>';}
  return '<div class="qr">'+cells+'</div>';}
function stepSchedule(){
  const u=U();const cid=campaignId();
  const sum=state.chans.map(c=>{const ch=CHAN(c);const tn=L(ch.tmpl[state.tmpl[c]||0]);
    return '<div class="cs-row"><span style="font-size:16px">'+ch.em+'</span><span class="cs-n">'+L(ch.name)+'</span><span class="cs-c">'+tn+(ch.reach!=='—'?' · ≈'+ch.reach:'')+'</span></div>';}).join('');
  return '<h2 class="step-t">'+u.t_launch+'</h2><div class="step-s">'+u.s_launch+'</div>'
    +'<div class="sched"><div class="panel"><h4>🗓 '+u.when+'</h4>'
    +'<div class="seg"><button class="'+(state.when==='now'?'on':'')+'" data-when="now">'+u.now+'</button><button class="'+(state.when==='later'?'on':'')+'" data-when="later">'+u.later+'</button></div>'
    +'<div class="row"><span>'+u.cid+'</span><b style="letter-spacing:.03em">'+cid+'</b></div>'
    +'<div class="row"><span>'+u.attrib+'</span><div class="toggle'+(state.attrib?' on':'')+'" id="attribTog"><i></i></div></div>'
    +'<div style="font-size:11.5px;color:var(--muted);margin-top:9px">'+u.attribD+'</div>'
    +'<div style="margin-top:14px;text-align:center">'+qrHtml()+'<div style="font-size:11px;color:var(--muted);margin-top:6px">'+u.qrL+'</div></div></div>'
    +'<div class="panel"><h4>📦 '+u.summary+'</h4><div class="chan-sum">'+sum+'</div>'
    +'<div style="font-size:12px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:11px">'+u.launchHint+'</div></div></div>';
}
function stepResults(){
  const u=U();
  const reach=state.chans.reduce((a,c)=>{const r=CHAN(c).reach;return a+(r==='—'?80000:(parseFloat(r)*(r.includes('M')?1e6:1e3)));},0);
  const aud=Math.max(audSize(),1);const eff=Math.round(Math.min(reach,aud*1.3))||reach;
  const deliv=Math.round(eff*0.92),eng=Math.round(deliv*0.14),lead=Math.round(eng*0.22);
  const max=eff;const fb=(lab,n)=>'<div class="fstage"><div class="fl">'+lab+'</div><div class="fbar"><i style="width:'+Math.max(6,Math.round(n/max*100))+'%"></i></div><div class="fn">'+fmt(n)+'</div></div>';
  return '<h2 class="step-t">✅ '+u.resT+'</h2><div class="step-s">'+u.resS+'</div>'
    +'<div class="funnel">'+fb(u.fReach,eff)+fb(u.fDeliv,deliv)+fb(u.fEng,eng)+fb(u.fLead,lead)
    +'<div class="fnote">🔗 '+u.flow+'</div></div>';
}

/* ---------------- bindings ---------------- */
function bind(){
  $$('[data-theme]').forEach(o=>o.onclick=()=>{state.theme=o.dataset.theme;const th=curTheme();state.chans=th.chans.slice(0,2);state.tmpl={};state.variant={};state.fixed={};render();});
  $$('[data-chan]').forEach(o=>o.onclick=()=>{const id=o.dataset.chan;const i=state.chans.indexOf(id);if(i>=0)state.chans.splice(i,1);else state.chans.push(id);render();});
  $$('[data-ct]').forEach(c=>c.onclick=()=>{state.tmpl[c.dataset.ct]=+c.dataset.ti;renderPv(c.dataset.ct);
    $$('[data-ct="'+c.dataset.ct+'"]').forEach(x=>x.classList.toggle('on',x===c));});
  $$('[data-regen]').forEach(b=>b.onclick=()=>{const id=b.dataset.regen;state.variant[id]=(state.variant[id]||0)+1;const pv=$('#pv-'+id);
    if(pv){pv.style.opacity=.3;setTimeout(()=>{renderPv(id);pv.style.opacity=1;},260);}toast('✨ '+L({en:'Fresh variant',ja:'別案を生成',th:'เวอร์ชันใหม่'}));});
  bindSocial();
  state.chans.forEach(cid=>{const pv=$('#pv-'+cid);if(pv)makeEditable(pv);});
  $$('[data-fix]').forEach(b=>b.onclick=()=>{const id=b.dataset.fix;b.disabled=true;b.textContent=U().applying;
    setTimeout(()=>{state.fixed[id]=1;render();toast('✅ '+L({en:'Flag fixed',ja:'修正しました',th:'แก้แล้ว'}));},480);});
  const gsw=$('#geoSw');if(gsw)gsw.onclick=()=>{state.geo=!state.geo;render();};
  $$('[data-ac]').forEach(c=>c.onclick=()=>{const id=c.dataset.ac;const i=state.aud.indexOf(id);if(i>=0)state.aud.splice(i,1);else state.aud.push(id);refreshAud();c.classList.toggle('on');});
  $$('[data-preset]').forEach(p=>p.onclick=()=>{const pr=PRESETS.find(x=>x.id===p.dataset.preset);state.aud=pr.aud.slice();render();});
  $$('[data-when]').forEach(b=>b.onclick=()=>{state.when=b.dataset.when;$$('[data-when]').forEach(x=>x.classList.toggle('on',x===b));});
  const at=$('#attribTog');if(at)at.onclick=()=>{state.attrib=!state.attrib;at.classList.toggle('on',state.attrib);};
}
function bindSocial(){$$('#ptabs .pt').forEach(t=>t.onclick=()=>{socialPlat=+t.dataset.p;renderPv('social');});}
function refreshAud(){const base=AUD_BASE[ENT()];const size=audSize();const pct=Math.max(3,Math.round(size/base*100));const n=$('#audN'),b=$('#audBar');if(n)n.textContent=fmt(size);if(b)b.style.width=pct+'%';}

/* ---------------- nav ---------------- */
function goStep(i){state.step=i;_reached=Math.max(_reached,i);render();window.scrollTo({top:0,behavior:'smooth'});}
function nextStep(){
  if(state.launched){state.launched=false;state.step=0;_reached=0;render();window.scrollTo({top:0,behavior:'smooth'});return;}
  if(FLOW[state.step]==='channels'&&state.chans.length===0){toast('⚠️ '+U().pickone);return;}
  if(FLOW[state.step]==='launch'){state.launched=true;render();toast('🚀 '+L({en:'Campaign launched',ja:'配信しました',th:'ส่งแคมเปญแล้ว'}));window.scrollTo({top:0,behavior:'smooth'});return;}
  goStep(state.step+1);
}
$('#back').onclick=()=>{if(state.step>0)goStep(state.step-1);};
$('#next').onclick=nextStep;

/* ---------------- shell ---------------- */
function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brand').innerHTML=b.logo+(b.sup?'<sup>'+b.sup+'</sup>':'');}
function applyText(){$('#sub').textContent=U().sub;document.documentElement.lang=state.lang;render();}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
const LANGS=[['en','EN'],['zh','中文'],['ja','日本語'],['th','ไทย']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();applyText();};box.appendChild(b);});}
$('#fab').onclick=()=>{const k=Object.keys(BRANDS);const i=k.indexOf(state.brand);state.brand=k[(i+1)%k.length];applyBrand();render();toast('🔁 '+BRANDS[state.brand].name);};

try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_m=_p.get("market"),_l=_p.get("lang");
  if(_b&&BRANDS[_b])state.brand=_b;if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(_m)state.market=_m;}catch(e){}
renderLangs();applyBrand();applyText();
window.addEventListener('message',function(e){try{if(e.data&&e.data.t==='es'&&e.data.lang&&["en","zh","ja","th"].indexOf(e.data.lang)>=0){state.lang=e.data.lang;applyText();}}catch(err){}});
(function(){var _l="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"")+"|"+(state.market||"");if(c!==_l){_l=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null,market:state.market||null},"*");}}catch(e){}},400);})();
</script>

<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent=".langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
