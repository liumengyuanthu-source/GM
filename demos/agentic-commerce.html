<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Commerce · Blackmores · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --line-green:#06c755;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --display:Georgia,'Times New Roman','Songti SC','Hiragino Mincho ProN',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:640px;margin:0 auto;padding:13px 18px}
  .brand{font-family:var(--display);font-weight:700;font-size:19px}.brand sup{font-size:9px;color:var(--brand)}
  .subt{font-size:11px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}.sp{flex:1}
  .linebadge{display:inline-flex;align-items:center;gap:5px;background:var(--line-green);color:#fff;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;letter-spacing:.02em}
  .chip{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;position:relative}
  .menu{position:absolute;top:40px;right:0;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:6px;min-width:120px;box-shadow:0 12px 30px rgba(0,0,0,.12);display:none;z-index:50}
  .menu.open{display:block}.menu button{display:block;width:100%;border:0;background:0;font:inherit;font-size:13px;padding:8px 9px;border-radius:7px;cursor:pointer;text-align:left;color:var(--ink)}.menu button:hover{background:var(--soft)}
  .langs{display:flex;gap:3px}
  .langs button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:600;color:var(--muted);min-width:32px;height:30px;border-radius:8px;cursor:pointer;transition:.2s;padding:0 6px}
  .langs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:640px;margin:0 auto;padding:22px 18px 80px}

  /* proactive agent card */
  .nudge{background:linear-gradient(135deg,#0a52a0,#073b73);color:#fff;border-radius:16px;padding:14px 15px;margin-bottom:18px;position:relative;overflow:hidden;animation:fin .4s}
  .nudge .nh{font-size:11px;font-weight:700;letter-spacing:.03em;opacity:.9;display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .nudge .nb{font-size:14px;font-weight:600;line-height:1.35}
  .nudge .src{font-size:11px;opacity:.78;margin-top:5px}
  .nudge .nbtns{display:flex;gap:8px;margin-top:12px}
  .nudge .nbtns button{border:0;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;cursor:pointer}
  .nudge .yes{background:#fff;color:var(--brand-d);flex:1}
  .nudge .later{background:rgba(255,255,255,.18);color:#fff}

  .tagline{text-align:center;font-family:var(--display);font-size:clamp(20px,5vw,28px);font-weight:500;line-height:1.15;letter-spacing:-.01em}
  .tagline em{font-style:italic;color:var(--brand)}
  .micwrap{display:flex;flex-direction:column;align-items:center;margin:22px 0 6px}
  .mic{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;
    border:0;font-size:34px;cursor:pointer;display:grid;place-items:center;box-shadow:0 12px 30px rgba(10,82,160,.3);transition:.2s;position:relative}
  .mic:hover{transform:scale(1.04)}
  .mic.live::after,.mic.live::before{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--brand);animation:rip 1.4s infinite}
  .mic.live::before{animation-delay:.6s}
  @keyframes rip{from{transform:scale(1);opacity:.6}to{transform:scale(1.7);opacity:0}}
  .michint{font-size:12.5px;color:var(--muted);margin-top:12px;text-align:center}

  .inbar{display:flex;gap:8px;margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 6px 6px 15px}
  .inbar input{flex:1;border:0;outline:0;font:inherit;font-size:14px;background:0}
  .inbar button{border:0;background:var(--brand);color:#fff;width:40px;height:40px;border-radius:10px;font-size:17px;cursor:pointer}
  .cmds{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .cmd{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:12px 15px;font-size:14px;cursor:pointer;display:flex;gap:10px;align-items:center;transition:.15s}
  .cmd:hover{border-color:var(--brand);background:var(--soft)}.cmd .q{font-size:17px;color:var(--brand)}

  .said{display:flex;justify-content:flex-end;margin:14px 0}
  .said .b{background:var(--brand);color:#fff;border-radius:15px 4px 15px 15px;padding:11px 15px;font-size:14px;max-width:84%}
  .agent{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:4px}
  .agent .ttl{font-size:12px;font-weight:700;color:var(--brand);display:flex;gap:7px;align-items:center;margin-bottom:12px}
  .step{padding:7px 0;color:var(--muted);opacity:.4;transition:.3s}
  .step.on{opacity:1;color:var(--ink)}
  .step .ln{display:flex;gap:11px;align-items:center;font-size:13.5px}
  .step .ic{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .step.on .ic{border-color:var(--brand);background:var(--brand);color:#fff}
  .step.work .ic{border-color:var(--brand);border-top-color:transparent;animation:sp .7s linear infinite;background:0;color:transparent}
  @keyframes sp{to{transform:rotate(360deg)}}
  .step .det{font-size:11.5px;color:var(--muted);margin:2px 0 0 33px;display:none}
  .step.on .det{display:block}

  .clar{margin-top:12px;animation:fin .3s}.clar .qq{font-size:13.5px;margin-bottom:9px}
  .qr{display:flex;gap:8px;flex-wrap:wrap}
  .qrb{border:1px solid var(--brand);background:var(--soft);color:var(--brand);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .qrb:hover{background:var(--brand);color:#fff}

  .result{margin-top:13px;display:none}.result.show{display:block;animation:fin .4s}@keyframes fin{from{opacity:0;transform:translateY(8px)}}
  .summary{background:var(--soft);border-radius:12px;padding:12px 14px;font-size:13.5px;margin-bottom:10px}.summary b{color:var(--brand)}
  .bundlebanner{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border-radius:14px;padding:13px 15px;margin-bottom:10px}
  .bundlebanner .bb-ic{font-size:24px;flex-shrink:0}
  .bundlebanner .bb-tag{font-size:10.5px;font-weight:800;letter-spacing:.04em;background:rgba(255,255,255,.22);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:4px}
  .bundlebanner .bb-nm{font-size:15px;font-weight:800;font-family:var(--display)}
  .bundlebanner .bb-comp{font-size:11.5px;opacity:.9;margin-top:2px;line-height:1.35}
  .bundlebanner .bb-save{margin-left:auto;text-align:right;flex-shrink:0}
  .bundlebanner .bb-save .bb-pct{font-size:16px;font-weight:800;font-family:var(--display);line-height:1}
  .bundlebanner .bb-save .bb-lbl{font-size:10px;opacity:.85;margin-top:2px}
  .item{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .item .em{font-size:25px;width:30px;text-align:center}.item .nm{font-weight:700;font-size:14px}.item .wy{font-size:11.5px;color:var(--muted)}
  .item .fresh{font-size:10.5px;color:var(--accent);font-weight:700;margin-top:1px}
  .item .ctrls{display:flex;align-items:center;gap:8px;margin-left:auto}
  .qbtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font:inherit;font-size:15px;cursor:pointer;line-height:1}
  .qn{width:18px;text-align:center;font-weight:700}
  .ip{width:64px;text-align:right;font-weight:800;color:var(--brand)}
  .rm{border:0;background:0;color:var(--muted);font-size:15px;cursor:pointer}

  .blk-t{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin:15px 0 8px}
  .slots{display:flex;gap:8px}
  .slot{flex:1;border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center;cursor:pointer;font-size:12px;transition:.15s}
  .slot .sd{font-weight:700}.slot .st{font-size:10.5px;color:var(--muted);margin-top:2px}
  .slot.on{border-color:var(--brand);background:var(--soft);color:var(--brand-d)}
  .slot.on .st{color:var(--brand)}
  .coldnote{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);margin-top:8px}

  .pricerow{display:flex;justify-content:space-between;font-size:13px;margin:8px 0;color:var(--muted)}
  .pricerow.tot{color:var(--ink);font-weight:800;font-size:16px;font-family:var(--display);margin-top:10px}
  .pricerow .disc{color:var(--line-green);font-weight:700}
  .pricerow .pts{color:var(--accent);font-weight:700}
  .guardnote{background:#fdf2e2;color:#b5731a;border-radius:11px;padding:11px 13px;font-size:12.5px;margin:10px 0}

  .auto{margin:14px 0 6px}
  .autoseg{display:flex;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:5px}
  .autoseg button{flex:1;border:0;background:0;font:inherit;font-size:12.5px;font-weight:700;color:var(--muted);padding:9px 6px;border-radius:9px;cursor:pointer;line-height:1.25}
  .autoseg button.on{background:var(--card);color:var(--brand-d);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .autonote{font-size:11.5px;color:var(--brand);background:var(--soft);border-radius:10px;padding:9px 12px;margin-top:8px;display:flex;gap:7px;align-items:flex-start}

  .confirm{width:100%;border:0;background:var(--line-green);color:#fff;font:inherit;font-weight:800;font-size:15px;padding:14px;border-radius:12px;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
  .confirm:disabled{opacity:.7}
  .conf{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:6px;text-align:center;animation:fin .4s}
  .conf .big{font-size:40px}.conf h3{font-family:var(--display);font-size:20px;margin:6px 0}
  .conf .line{font-size:13px;color:var(--muted);margin:3px 0}.conf .loop{background:var(--soft);border-radius:11px;padding:11px;font-size:12.5px;margin-top:12px;color:var(--ink);text-align:left;display:flex;gap:8px;align-items:flex-start}

  /* post-order agent timeline */
  .post{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:12px;animation:fin .4s}
  .post .ttl{font-size:12px;font-weight:700;color:var(--brand);display:flex;gap:7px;align-items:center;margin-bottom:10px}
  .pstep{display:flex;gap:11px;align-items:flex-start;padding:7px 0;opacity:.35;transition:.4s}
  .pstep.on{opacity:1}
  .pstep .pic{width:22px;height:22px;border-radius:50%;background:var(--soft);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .pstep.alert .pic{background:#fdf2e2}
  .pstep .pt{font-size:13px;font-weight:600}.pstep .ps{font-size:11.5px;color:var(--muted);margin-top:1px}
  .reschedule{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:700;color:var(--brand);cursor:pointer;margin-top:10px}
  .rs-panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 13px 13px;margin-top:8px}
  .rs-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .rs-row:last-of-type{border-bottom:0}
  .rs-row span{font-size:12.5px;color:var(--muted)}
  .rs-row input[type=date],.rs-row select{font:inherit;font-size:14px;font-weight:600;padding:8px 11px;border:1px solid var(--brand);border-radius:10px;color:var(--brand-d);background:var(--soft);cursor:pointer}
  /* date-time picker modal */
  .dtp-mask{position:fixed;inset:0;z-index:90;background:rgba(11,19,32,.45);display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:.2s}
  .dtp-mask.open{opacity:1;pointer-events:auto}
  .dtp{background:var(--card);border-radius:18px;width:100%;max-width:540px;box-shadow:0 24px 60px rgba(0,0,0,.28);transform:translateY(10px);transition:.25s;overflow:hidden}
  .dtp-mask.open .dtp{transform:none}
  .dtp-h{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .dtp-h .t{font-weight:700;font-size:15px}.dtp-h .x{margin-left:auto;border:0;background:var(--soft);width:30px;height:30px;border-radius:9px;font-size:15px;color:var(--ink);cursor:pointer}
  .dtp-body{display:flex}
  @media(max-width:560px){.dtp-body{flex-direction:column}}
  .dtp-cal{flex:1.25;padding:14px 16px;border-right:1px solid var(--line)}
  @media(max-width:560px){.dtp-cal{border-right:0;border-bottom:1px solid var(--line)}}
  .dtp-slots{flex:1;padding:14px 16px;max-height:296px;overflow:auto}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal-nav button{border:0;background:var(--soft);width:28px;height:28px;border-radius:8px;cursor:pointer;color:var(--brand-d);font-size:16px;line-height:1}
  .cal-nav .my{font-weight:700;font-size:13.5px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-grid .wd{font-size:10.5px;color:var(--muted);text-align:center;padding:3px 0;font-weight:700}
  .cal-d{aspect-ratio:1;display:grid;place-items:center;font-size:13px;border-radius:9px;cursor:pointer;color:var(--ink)}
  .cal-d:hover{background:var(--soft)}.cal-d.off{pointer-events:none}.cal-d.dis{color:var(--line);pointer-events:none}
  .cal-d.sel{background:var(--brand);color:#fff;font-weight:700}
  .dtp-slabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px}
  .slotc{display:flex;flex-direction:column;gap:7px}
  .slotc button{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:9px 11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);text-align:left}
  .slotc button:hover{border-color:var(--brand)}.slotc button.on{border-color:var(--brand);background:var(--soft);color:var(--brand-d);font-weight:700}
  .dtp-f{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .dtp-f .sum{font-size:12.5px;color:var(--brand-d);font-weight:600;flex:1}
  .dtp-f .ok{border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:14px;padding:10px 18px;border-radius:11px;cursor:pointer}
  .dtp-f .ok:disabled{opacity:.45;cursor:default}

  .reset{display:block;margin:16px auto 0;border:0;background:0;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;text-decoration:underline}
  .guard{background:#fdf2e2;color:#b5731a;border-radius:12px;padding:13px 15px;font-size:13.5px;margin-top:6px}
  .fab{position:fixed;right:18px;bottom:18px;width:50px;height:50px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:20px;box-shadow:0 8px 22px rgba(0,0,0,.2);cursor:pointer;z-index:40}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%);opacity:1}

  /* consultative / discovery */
  .ask{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:4px}
  .ask .ttl{font-size:12px;font-weight:700;color:var(--brand);display:flex;gap:7px;align-items:center;margin-bottom:6px}
  .cqq{font-size:13.5px;font-weight:600;margin:6px 0 9px}
  .cmp{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
  .cmp th,.cmp td{padding:8px 8px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
  .cmp td:first-child,.cmp th:first-child{text-align:left;color:var(--muted);font-weight:600;width:84px}
  .cmp thead th{padding-bottom:6px}
  .cmp .prodhead{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:700;line-height:1.2}
  .cmp .prodhead img{width:34px;height:34px}
  .cmp td.rec{background:var(--soft)}
  .cmp .best{color:var(--accent);font-weight:800}
  .cmp .reccol{border-top:2px solid var(--brand)}
  .acttabs{display:flex;gap:8px;margin:14px 0 10px}
  .acttab{flex:1;border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .acttab.on{border-color:var(--brand);background:var(--soft);color:var(--brand-d)}
  .store{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px}
  .store .pin{width:30px;height:30px;border-radius:8px;background:var(--soft);display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .store .snm{font-weight:700;font-size:13px}.store .smeta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .store .sact{margin-left:auto;text-align:right;flex-shrink:0}
  .store .sprice{font-weight:800;color:var(--brand);font-size:14px}
  .store .sresv{border:1px solid var(--brand);background:0;color:var(--brand);border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;margin-top:4px}
  .store .sresv:hover{background:var(--soft)}
  .coupon{display:flex;gap:11px;align-items:center;background:#eafaf0;border:1px dashed var(--accent);border-radius:12px;padding:11px 13px;margin:10px 0;font-size:12.5px}
  .coupon .cv{font-weight:800;color:var(--accent);font-size:16px;line-height:1}

  /* cross-sell / budget / gift */
  .scorecard{display:flex;align-items:center;gap:14px;background:var(--soft);border-radius:14px;padding:13px 14px;margin:6px 0 12px}
  .scorecard .sc-n{font-size:30px;font-weight:800;color:var(--brand);font-family:var(--display);line-height:1;flex-shrink:0}
  .scorecard .sc-n span{font-size:13px;color:var(--muted)}
  .budgetbar{height:10px;border-radius:6px;background:var(--line);overflow:hidden;margin:12px 0 6px}
  .budgetbar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--accent))}
  .giftsum{background:var(--soft);border-radius:12px;padding:6px 14px;font-size:13px;margin:10px 0}
  .giftsum .gr{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line)}
  .giftsum .gr:last-child{border-bottom:0}.giftsum .gr span{color:var(--muted)}.giftsum .gr b{text-align:right}
  .reminder{border:1px dashed var(--brand);border-radius:13px;padding:13px;margin-top:12px;background:var(--card)}
  .reminder .rh{font-size:12px;font-weight:700;color:var(--brand);margin-bottom:6px}
  .qb-row{display:flex;margin:8px 0}
  .qb{background:var(--soft);color:var(--brand-d);border-radius:4px 14px 14px 14px;padding:10px 13px;font-size:13.5px;line-height:1.45;max-width:86%}
  .datepick{display:flex;gap:8px;align-items:center;margin-top:2px}
  .datepick input[type=date]{font:inherit;font-size:14px;font-weight:600;padding:10px 12px;border:1px solid var(--brand);border-radius:11px;color:var(--brand-d);background:var(--soft);cursor:pointer}

  /* ===== Partner (B2B) mode ===== */
  .modebar{max-width:640px;margin:0 auto;padding:12px 18px 0}
  .modeseg{display:flex;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:5px}
  .modeseg button{flex:1;border:0;background:0;font:inherit;font-size:13px;font-weight:700;color:var(--muted);padding:9px 6px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .modeseg button.on{background:var(--card);color:var(--brand-d);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .pcontext{display:flex;align-items:center;gap:11px;background:var(--soft);border-radius:12px;padding:10px 13px;margin-bottom:14px;font-size:12.5px}

let state={lang:"en",brand:"blackmores",market:"ANZ",running:false,basket:[],auto:"ask",sc:null,allergy:false,slot:0,audience:"consumer",pqty:{},prej:{},pauto:"ask",pcontract:"std",pcoupons:{},planBase:[],planSaid:"",planSummary:""};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const U=()=>UI[state.lang]||UI.en,T=o=>o[state.lang]||o.en;
/* ===== Market-driven currency — base AUD, single formatter =====
   Source data prices are legacy ¥-scaled integers; AUD base = value ÷ 4.8.
   toAUD() normalises any raw data figure to AUD base; money() formats AUD for the active market. */
const CURRENCY={ANZ:{sym:'A$',rate:1},CN:{sym:'¥',rate:4.8},SEA:{sym:'฿',rate:23},JP:{sym:'¥',rate:100}};
const toAUD=v=>v/100;
function money(aud){const c=CURRENCY[state.market]||CURRENCY.ANZ;return c.sym+Math.round(aud*c.rate).toLocaleString();}
/* yen() retained as the single price formatter — takes a raw data figure, returns market-formatted price */
const yen=p=>money(toAUD(p));

function home(showNudge){const u=U();state.allergy=false;state.auto="ask";state.slot=0;
  $('#main').innerHTML=`
  ${showNudge!==false?`<div class="nudge" id="nudge">
    <div class="nh">✦ ${u.nudgeH}</div>
    <div class="nb">${u.nudgeB}</div>
    <div class="src">${u.nudgeSrc}</div>
    <div class="nbtns"><button class="yes" id="nudgeYes">${u.nudgeYes}</button><button class="later" id="nudgeLater">${u.nudgeLater}</button></div>
  </div>`:''}
  <div class="tagline">${u.tag}</div>
  <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px;margin-bottom:4px">${u.tagSub}</div>
  <div class="micwrap"><button class="mic" id="mic">🎙️</button><div class="michint">${u.mic}</div></div>
  <div class="inbar"><input id="inp" placeholder="${u.ph}" autocomplete="off"><button id="go">↑</button></div>
  <div class="cmds">
    <div class="cmd" data-cross="1"><span class="q">“</span>${T(CROSS.cmd)}</div>
    <div class="cmd" data-consult="1"><span class="q">“</span>${T(CONSULT.cmd)}</div>
    <div class="cmd" data-s="0"><span class="q">“</span>${T(SCN[0].cmd)}</div>
    <div class="cmd" data-gift="1"><span class="q">“</span>${T(GIFT.cmd)}</div>
    <div class="cmd" data-budget="1"><span class="q">“</span>${T(BUDGET.cmd)}</div>
    <div class="cmd" data-nearby="1"><span class="q">“</span>${T(NEARBY.cmd)}</div>
    <div class="cmd" data-guard="1"><span class="q">“</span>${u.guardCmd}</div></div>`;
  const ny=$('#nudgeYes');if(ny)ny.onclick=()=>runScenario(0,null,true);
  const nl=$('#nudgeLater');if(nl)nl.onclick=()=>{const n=$('#nudge');if(n)n.remove();};
  $('#mic').onclick=()=>{const m=$('#mic');m.classList.add('live');
    transcribe(T(SCN[0].cmd),()=>{m.classList.remove('live');runScenario(0);});};
  $('#go').onclick=()=>route($('#inp').value);
  $('#inp').addEventListener('keydown',e=>{if(e.key==='Enter')route($('#inp').value);});
  $$('.cmd').forEach(c=>c.onclick=()=>{
    if(c.dataset.guard)return guard(u.guardCmd);
    if(c.dataset.cross)return runCross();
    if(c.dataset.consult)return runConsult();
    if(c.dataset.gift)return runGift();
    if(c.dataset.budget)return runBudget();
    if(c.dataset.nearby)return runNearby();
    runScenario(+c.dataset.s);});}

function transcribe(text,cb){const inp=$('#inp');if(!inp){cb();return;}inp.value='';let i=0;
  (function t(){if(i<=text.length){inp.value=text.slice(0,i);i++;setTimeout(t,24);}else setTimeout(cb,300);})();}

function route(v){v=(v||'').trim();if(!v)return;const low=v.toLowerCase();
  if(/pregnan|妊娠|授乳|孕|哺乳|allerg|アレルギ|过敏|過敏/.test(low))return guard(U().guardCmd);
  if(/近く|どこで|店舗|nearby|store|附近|哪里买|哪裡買/.test(low))return runNearby();
  if(/ギフト|両親|実家|送りたい|親に|gift|父母|寄给|定期で送/.test(low))return runGift();
  if(/予算|円で|円以内|以内|budget|预算/.test(low))return runBudget();
  if(/スコア|健康スコア|cross|交叉|加购|加購/.test(low))return runCross();
  if(/おすすめ|変え|変わ|調子|相談|recommend|switch|换成|推荐|推薦/.test(low))return runConsult();
  let i=0;
  if(/fish|oil|魚油|鱼油|サブスク|定期|subscription/.test(low))i=1;
  else if(/family|家族|家里|子ども|kids/.test(low))i=2;
  runScenario(i,v);}

function guard(said){const u=U();$('#main').innerHTML=`<div class="said"><div class="b">${said}</div></div>
  <div class="guard">⚠ ${u.guard}</div><button class="reset" id="rs">${u.reset}</button>`;$('#rs').onclick=()=>home();}

function runScenario(i,saidText,proactive){if(state.running)return;state.running=true;const u=U(),s=SCN[i];state.sc=i;state.allergy=false;
  $('#main').innerHTML=`<div class="said"><div class="b">${saidText||(proactive?u.nudgeYes:T(s.cmd))}</div></div>
    <div class="agent"><div class="ttl">✦ ${u.working}</div><div id="steps">
      ${STEPS.map((st,k)=>`<div class="step" data-k="${k}"><div class="ln"><div class="ic">${k+1}</div>${T(st)}</div><div class="det" id="det${k}"></div></div>`).join('')}
    </div><div id="clar"></div><div class="result" id="result"></div></div>
    <button class="reset" id="rs" style="display:none">${u.reset}</button>`;
  $('#rs').onclick=()=>home();
  const els=$$('.step');let k=0;
  function done(j){els[j].classList.remove('work');els[j].classList.add('on');els[j].querySelector('.ic').textContent='✓';}
  function run(){
    if(k>0)done(k-1);
    if(k===2)$('#det1').textContent=T(s.recall);
    if(k===3)$('#det2').textContent=T(s.stock);
    if(k===4)$('#det3').textContent=T(s.plan);
    if(s.clar&&k===2&&!state.clarDone){askClarify(i);return;}
    if(k>=els.length){$('#det4').textContent=T(s.promo).replace('{c}',yen(s.coupon||120));finish(i);return;}
    els[k].classList.add('on','work');k++;setTimeout(run,720);
  }
  state.clarDone=false;run();
  state._resume=function(){state.clarDone=true;run();};
}

function askClarify(i){const u=U(),s=SCN[i];let q,opts;
  if(s.clar==='house'){q=u.clarHouseQ;opts=[[u.ch1,'1'],[u.ch2,'2'],[u.ch3,'4']];}
  else{q=u.clarAllergyQ;opts=[[u.ca1,'0'],[u.ca2,'1']];}
  $('#clar').innerHTML=`<div class="clar"><div class="qq">🤖 ${q}</div>
    <div class="qr">${opts.map(o=>`<button class="qrb" data-v="${o[1]}">${o[0]}</button>`).join('')}</div></div>`;
  $$('.qrb').forEach(b=>b.onclick=()=>{
    if(s.clar==='pregnancy')state.allergy=b.dataset.v==='1';
    if(s.clar==='house'){const h=+b.dataset.v;state._house=h;}
    $('#clar').innerHTML=`<div class="said" style="margin:8px 0"><div class="b">${b.textContent}</div></div>`;
    state._resume();});}

function finish(i){const s=SCN[i];state.basket=s.items.map(it=>({img:it.img,nm:it.nm,q:it.q,p:it.p,wy:it.wy,fresh:it.fresh}));
  // household scaling for water scenario
  if(s.clar==='house'&&state._house){const f=state._house>=4?2:state._house>=2?1:1;state.basket.forEach(it=>it.q=Math.max(1,Math.round(it.q*(state._house>=4?1.5:1))));}
  state.running=false;renderResult();}

function renderResult(){const u=U(),s=SCN[state.sc];
  const sub=state.basket.reduce((a,it)=>a+it.p*it.q,0);
  const coupon=s.coupon||0;
  const subDisc=s.subPct?Math.round(sub*s.subPct/100):0;
  const disc=coupon+subDisc;const tot=sub-disc;
  let h=`<div class="ttl" style="color:var(--brand);margin:12px 0 8px">✅ ${u.ready}</div>
    <div class="summary">🧠 ${T(s.sum)}</div>`;
  if(s.bundle&&BUNDLES[s.bundle]){const bn=BUNDLES[s.bundle];
    h+=`<div class="bundlebanner"><span class="bb-ic">🎁</span>
      <div style="min-width:0"><span class="bb-tag">${u.bundleBadge}</span>
        <div class="bb-nm">${T(bn.nm)}</div><div class="bb-comp">${T(bn.comp)}</div></div>
      <div class="bb-save"><div class="bb-pct">${u.bundleOff(bn.save)}</div><div class="bb-lbl">${u.bundleSaveLbl}</div></div></div>`;}
  h+=state.basket.map((it,idx)=>`<div class="item"><div class="em"><img src="${it.img}" width="30" height="30" alt=""></div>
    <div style="min-width:0"><div class="nm">${T(it.nm)}</div><div class="fresh">❄ ${T(it.fresh)}</div><div class="wy">${T(it.wy)}</div></div>
    <div class="ctrls"><button class="qbtn" data-d="-1" data-i="${idx}">−</button><span class="qn">${it.q}</span>
      <button class="qbtn" data-d="1" data-i="${idx}">+</button><span class="ip">${yen(it.p*it.q)}</span>
      <button class="rm" data-rm="${idx}">✕</button></div></div>`).join('');
  if(state.allergy)h+=`<div class="guardnote">${u.allergyNote}</div>`;
  // delivery
  if(s.cold){
    h+=`<div class="blk-t">${u.slotsT}</div><div class="slots">${SLOTS.map((sl,j)=>`<div class="slot ${j===state.slot?'on':''}" data-slot="${j}"><div class="sd">${T(sl)[0]}</div><div class="st">${T(sl)[1]}</div></div>`).join('')}</div>
      <div class="coldnote">❄ ${u.cold}</div>`;
  }else{
    h+=`<div class="coldnote" style="margin-top:14px">🔁 ${u.ambient}</div>`;
  }
  // price
  h+=`<div class="pricerow" style="margin-top:14px"><span>${u.sub2}</span><span>${yen(sub)}</span></div>`;
  if(coupon)h+=`<div class="pricerow"><span>${u.coupon}</span><span class="disc">− ${yen(coupon)}</span></div>`;
  if(subDisc)h+=`<div class="pricerow"><span>${u.sub5}</span><span class="disc">− ${yen(subDisc)}</span></div>`;
  h+=`<div class="pricerow tot"><span>${u.total}</span><span>${yen(tot)}</span></div>
    <div class="pricerow"><span>${u.earn}</span><span class="pts">+${s.pts} pt</span></div>`;
  // autonomy
  h+=`<div class="auto"><div class="blk-t">${u.autoT}</div>
    <div class="autoseg"><button data-auto="ask" class="${state.auto==='ask'?'on':''}">${u.autoAsk}</button>
      <button data-auto="stand" class="${state.auto==='stand'?'on':''}">${u.autoStand}</button></div>
    ${state.auto==='stand'?`<div class="autonote">🤖 ${u.autoNote}</div>`:''}</div>`;
  h+=`<button class="confirm" id="cf"><span class="linebadge" style="background:rgba(255,255,255,.25)">Pay</span> ${u.confirm}</button>`;
  const r=$('#result');r.innerHTML=h;r.classList.add('show');$('#rs').style.display='block';
  $$('[data-d]').forEach(b=>b.onclick=()=>{const idx=+b.dataset.i;state.basket[idx].q=Math.max(1,state.basket[idx].q+(+b.dataset.d));renderResult();});
  $$('[data-rm]').forEach(b=>b.onclick=()=>{state.basket.splice(+b.dataset.rm,1);if(!state.basket.length){home();return;}renderResult();});
  $$('[data-slot]').forEach(b=>b.onclick=()=>{state.slot=+b.dataset.slot;renderResult();});
  $$('[data-auto]').forEach(b=>b.onclick=()=>{state.auto=b.dataset.auto;renderResult();});
  $('#cf').onclick=()=>confirmOrder(tot);}

function confirmOrder(tot){const u=U(),s=SCN[state.sc];const n=state.basket.reduce((a,it)=>a+it.q,0);
  const eta=s.cold?T(SLOTS[state.slot])[0]+' '+T(SLOTS[state.slot])[1]:u.eta;
  $('#result').innerHTML=`<div class="conf"><div class="big">🎉</div><h3>${u.placed}</h3>
    <div class="line">${u.items(n)} · ${yen(tot)} · +${s.pts} pt</div>
    <div class="line">📦 ${eta}</div>
    <div class="loop">${state.auto==='stand'?u.loopStand:u.loopAsk}</div></div>
    <div class="post" id="post"><div class="ttl">🤖 ${u.postT}</div>
      <div class="pstep" data-p="0"><div class="pic">📦</div><div><div class="pt">${u.p1t}</div><div class="ps">${u.p1s}</div></div></div>
      <div class="pstep alert" data-p="1"><div class="pic">⚠</div><div><div class="pt">${u.p2t}</div><div class="ps">${u.p2s}</div></div></div>
      <div class="pstep" data-p="2"><div class="pic">✓</div><div><div class="pt">${u.p3t}</div><div class="ps">${u.p3s}</div></div></div>
      <div id="resWrap"></div>
    </div>`;
  toast('🎉 '+u.placed);
  // reveal post-order steps one by one
  const ps=$$('#post .pstep');let j=0;(function rev(){if(j<ps.length){ps[j].classList.add('on');j++;setTimeout(rev,820);}
    else{$('#resWrap').innerHTML=`<button class="reschedule" id="resched">🗓 ${u.reschedule}</button>`;
      $('#resched').onclick=openReschedule;}})();}
function openReschedule(){const u=U();openDateTimePicker({title:u.reschedule,withTime:true,onConfirm:(dt,sl)=>{
  $('#resWrap').innerHTML=`<div class="autonote" style="margin-top:6px">✅ ${u.rescheduled} · ${dt?fmtGiftDate(dt):''} ${sl||''}</div>`;toast('✅ '+u.rescheduled);}});}
let dtpState={};
function openDateTimePicker(opts){const u=U();dtpState={month:new Date(),date:null,slot:null,withTime:!!opts.withTime,onConfirm:opts.onConfirm};dtpState.month.setDate(1);
  let mask=document.getElementById('dtpMask');if(!mask){mask=document.createElement('div');mask.id='dtpMask';mask.className='dtp-mask';document.body.appendChild(mask);}
  mask.innerHTML=`<div class="dtp"><div class="dtp-h"><span class="t">${opts.title}</span><button class="x" id="dtpX">✕</button></div>
    <div class="dtp-body"><div class="dtp-cal"><div class="cal-nav"><button id="calPrev">‹</button><span class="my" id="calMY"></span><button id="calNext">›</button></div><div class="cal-grid" id="calGrid"></div></div>
    ${opts.withTime?`<div class="dtp-slots"><div class="dtp-slabel">${u.rsSlot}</div><div class="slotc" id="slotc"></div></div>`:''}</div>
    <div class="dtp-f"><span class="sum" id="dtpSum"></span><button class="ok" id="dtpOk" disabled>${u.rsConfirm}</button></div></div>`;
  mask.classList.add('open');
  $('#dtpX').onclick=closeDtp;mask.onclick=e=>{if(e.target===mask)closeDtp();};
  $('#calPrev').onclick=()=>{dtpState.month.setMonth(dtpState.month.getMonth()-1);renderCal();};
  $('#calNext').onclick=()=>{dtpState.month.setMonth(dtpState.month.getMonth()+1);renderCal();};
  if(opts.withTime)renderDtpSlots();renderCal();
  $('#dtpOk').onclick=()=>{const cb=dtpState.onConfirm,dt=dtpState.date,sl=dtpState.slot;closeDtp();if(cb)cb(dt,sl);};}
function closeDtp(){const m=document.getElementById('dtpMask');if(m)m.classList.remove('open');}
function renderCal(){const m=dtpState.month,y=m.getFullYear(),mo=m.getMonth();
  const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate(),todayISO=new Date().toISOString().slice(0,10);
  const wd=state.lang==='en'?['Su','Mo','Tu','We','Th','Fr','Sa']:['日','月','火','水','木','金','土'];
  const my=state.lang==='en'?(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo]+' '+y):`${y}年${mo+1}月`;
  $('#calMY').textContent=my;
  let h=wd.map(w=>`<div class="wd">${w}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div class="cal-d off"></div>`;
  for(let dd=1;dd<=days;dd++){const iso=`${y}-${String(mo+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`,dis=iso<=todayISO,sel=dtpState.date===iso;
    h+=`<div class="cal-d${dis?' dis':''}${sel?' sel':''}" data-iso="${iso}">${dd}</div>`;}
  $('#calGrid').innerHTML=h;
  $$('#calGrid .cal-d[data-iso]').forEach(c=>{if(c.classList.contains('dis'))return;c.onclick=()=>{dtpState.date=c.dataset.iso;renderCal();updateDtpFoot();};});
  updateDtpFoot();}
function renderDtpSlots(){let h='';for(let k=10;k<=20;k++){const s=`${k}:00–${k+1}:00`;h+=`<button data-slot="${s}" class="${dtpState.slot===s?'on':''}">${s}</button>`;}
  $('#slotc').innerHTML=h;$$('#slotc button').forEach(b=>b.onclick=()=>{dtpState.slot=b.dataset.slot;renderDtpSlots();updateDtpFoot();});}
function updateDtpFoot(){const ok=$('#dtpOk');if(!ok)return;const need=dtpState.withTime?(dtpState.date&&dtpState.slot):dtpState.date;ok.disabled=!need;
  const s=$('#dtpSum');if(s)s.textContent=(dtpState.date?fmtGiftDate(dtpState.date):'')+(dtpState.withTime&&dtpState.slot?' · '+dtpState.slot:'');}

function budgetBuild(bud){const u=U(),g=GG();const list=BUDGET.baskets[bud].map(([k,q])=>({...PROD[k],q}));

function fmtGiftDate(iso){const dt=new Date(iso+'T00:00:00'),m=dt.getMonth()+1,d=dt.getDate(),wd=['日','月','火','水','木','金','土'][dt.getDay()];
  if(state.lang==='en'){const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[m-1]+' '+d;}
  if(state.lang==='ja')return `${m}月${d}日(${wd})`;
  return `${m}月${d}日`;}
function runGift(){if(state.running)return;gstate={step:0};renderGift();}
function renderGift(){const u=U(),g=GG(),gs=gstate;
  const cyc=GIFT.cycles.find(c=>c.v===gs.cycle),st=GIFT.starts.find(s=>s.v===gs.start),dur=GIFT.durs.find(d=>d.v===gs.dur);
  const startLabel=(gs.startDate!=null)?fmtGiftDate(gs.startDate):(st?T(st.t):null);
  const qa=(q,a)=>`<div class="qb-row"><div class="qb">🤖 ${q}</div></div><div class="said" style="margin:6px 0"><div class="b">${a}</div></div>`;
  const askq=(q,chips)=>`<div class="qb-row"><div class="qb">🤖 ${q}</div></div><div class="qr">${chips}</div>`;
  let logc='';
  if(gs.step>=1&&cyc)logc+=qa(g.giftCycleQ,T(cyc.t));
  if(gs.step>=2)logc+=qa(g.giftStartQ,startLabel);
  if(gs.step>=3&&dur)logc+=qa(g.giftDurQ,T(dur.t));
  let body='';
  if(gs.step===0)body=askq(g.giftCycleQ,GIFT.cycles.map(c=>`<button class="qrb" data-gv="cycle:${c.v}">${T(c.t)}</button>`).join(''));
  else if(gs.step===1){
    if(gs.start==='date'&&gs.startDate==null){
      body=qa(g.giftStartQ,T(GIFT.starts.find(s=>s.v==='date').t))
        +`<div class="qb-row"><div class="qb">🤖 ${g.giftDateQ}</div></div>`
        +`<div class="qr"><button class="qrb" id="gdatebtn">📅 ${g.giftPickDate}</button></div>`;
    }else body=askq(g.giftStartQ,GIFT.starts.map(s=>`<button class="qrb" data-gv="start:${s.v}">${T(s.t)}</button>`).join(''));}
  else if(gs.step===2)body=askq(g.giftDurQ,GIFT.durs.map(d=>`<button class="qrb" data-gv="dur:${d.v}">${T(d.t)}</button>`).join(''));
  else if(gs.step===3){const ships=dur.v*(cyc.v==='w1'?4:cyc.v==='m2'?2:1),pricePer=cyc.per*40,total=pricePer*ships;gstate._total=total;
    body=`<div class="giftsum">
      <div class="gr"><span>${g.giftTo}</span><b>${g.giftParents}</b></div>
      <div class="gr"><span>${g.giftContents}</span><b>${g.giftContentsVal}</b></div>
      <div class="gr"><span>${g.giftCycle}</span><b>${T(cyc.t)}</b></div>
      <div class="gr"><span>${g.giftStart}</span><b>${startLabel}</b></div>
      <div class="gr"><span>${g.giftPeriod}</span><b>${T(dur.t)} · ${g.giftShips.replace('{n}',ships)}</b></div>
      <div class="gr"><span>${g.giftNoshi}</span><b>${g.giftNoshiYes}</b></div>
      <div class="gr"><span>${g.giftPer}</span><b>${yen(pricePer)}</b></div>
      <div class="gr"><span>${g.giftPrepay}</span><b style="color:var(--brand)">${yen(total)}</b></div></div>
      <button class="confirm" id="gcf"><span class="linebadge" style="background:rgba(255,255,255,.25)">Pay</span> ${g.giftConfirm}</button>`;}
  else if(gs.step===4){body=`<div class="conf"><div class="big">🎁</div><h3>${g.giftPlaced}</h3>
      <div class="line">${g.giftParents} · ${T(cyc.t)} · ${startLabel}〜</div><div class="line">${g.giftPrepaid.replace('{t}',yen(gstate._total))}</div></div>
      <div class="reminder"><div class="rh">🔔 ${g.giftRemindH}</div>
        <div style="font-size:12.5px;color:var(--muted);margin-bottom:9px">${g.giftRemindB}</div>
        <div class="qr"><button class="qrb" data-grem="addr">${g.giftChAddr}</button><button class="qrb" data-grem="date">${g.giftChDate}</button><button class="qrb" data-grem="ok" style="border-color:var(--line);color:var(--muted);background:var(--bg)">${g.giftKeep}</button></div></div>`;}
  $('#main').innerHTML=`<div class="said"><div class="b">${T(GIFT.cmd)}</div></div>
    <div class="agent"><div class="ttl">✦ ${u.working}</div><div class="qb-row"><div class="qb">🧠 ${T(GIFT.reason)}</div></div>${logc}${body}</div>
    <button class="reset" id="rs">${u.reset}</button>`;
  $('#rs').onclick=()=>home();
  $$('.qrb[data-gv]').forEach(b=>b.onclick=()=>{const p=b.dataset.gv.split(':');
    if(p[0]==='start'&&p[1]==='date'){gstate.start='date';gstate.startDate=null;renderGift();return;}
    gstate[p[0]]=(p[0]==='dur')?+p[1]:p[1];gstate.step++;renderGift();});
  const gdb=$('#gdatebtn');if(gdb)gdb.onclick=()=>openDateTimePicker({title:GG().giftDateQ,withTime:false,onConfirm:dt=>{if(dt){gstate.startDate=dt;gstate.step++;renderGift();}}});
  const gcf=$('#gcf');if(gcf)gcf.onclick=()=>{gstate.step=4;renderGift();toast('🎁 '+GG().giftPlaced);};
  $$('.qrb[data-grem]').forEach(b=>b.onclick=()=>toast('✅ '+(b.dataset.grem==='ok'?GG().giftKept:GG().giftChDone)));}

function proute(v){v=(v||'').trim();if(!v)return;const low=v.toLowerCase();
  if(/請求|発票|発票|invoice|领收|領収|发票|インボイス/.test(low))return runInvoice();
  if(/注文状況|配送|追跡|order|status|订单|物流/.test(low))return runOrders();
  if(/比較|相談|詳細|去年|販売実績|compare|consult|sales|比较|咨询|销量/.test(low))return runCompare();
  if(/季節|夏|お中元|行事|トレンド|機会|season|trend|节日|趋势/.test(low))return runOpportunity();
  runRestock();}

function renderPlan(){const p=PBL(),p2=P2();
  const incl=state.planBase.filter(i=>!state.prej[i]);
  const highs=state.planSkip?PSKU.filter(s=>pstatus(s)==='high'):[];
  const sub=incl.reduce((a,i)=>a+PSKU[i].wpc*(state.pqty[i]||0),0);
  const cases=incl.reduce((a,i)=>a+(state.pqty[i]||0),0);
  const ct=CONTRACTS.find(c=>c.id===state.pcontract)||CONTRACTS[0];
  const afterContract=Math.round(sub*ct.mult);const contractDisc=sub-afterContract;
  let couponDisc=0;PCOUPONS.forEach(c=>{if(!state.pcoupons[c.id])return;if(c.min&&cases<c.min)return;couponDisc+=c.amt?c.amt:Math.round(afterContract*c.pct/100);});
  const total=Math.max(0,afterContract-couponDisc);
  let h=`<div class="ttl" style="color:var(--brand);margin:0 0 8px">✅ ${p.planT}</div><div class="summary">🧠 ${state.planSummary}</div>`;
  h+=incl.map(i=>{const s=PSKU[i],q=state.pqty[i]||0;return `<div class="item"><div class="em"><img src="${s.img}" width="30" height="30" alt=""></div>
    <div style="min-width:0"><div class="nm">${T(s.nm)}</div><div class="reasonchip">✦ ${T(s.reason)}</div>
      <button class="histbtn" data-phist="${i}">${p2.histBtn}</button></div>
    <div class="ctrls"><button class="qbtn" data-pd="-1" data-i="${i}">−</button><span class="qn">${q}</span><button class="qbtn" data-pd="1" data-i="${i}">+</button><span class="ip">${yen(s.wpc*q)}</span><button class="rej" data-prej="${i}">${p.reject}</button></div></div>${histRow(i)}`;}).join('');
  if(highs.length)h+=`<div class="skipnote">⏸ <b>${p.skipTitle}</b><br>${highs.map(s=>T(s.nm)+' — '+T(s.reason)).join('<br>')}</div>`;
  // contract frame
  h+=`<div class="blk-t" style="margin-top:16px">${p2.contractT}</div><div class="ctrseg">`;
  h+=CONTRACTS.map(c=>`<button class="ctrbtn ${state.pcontract===c.id?'on':''}" data-ctr="${c.id}"><b>${T(c.nm)}</b><small>${T(c.note)}</small></button>`).join('')+`</div>`;
  // coupons
  h+=`<div class="blk-t" style="margin-top:14px">${p2.couponT}</div>`;
  h+=PCOUPONS.map(c=>{const on=state.pcoupons[c.id],dis=c.min&&cases<c.min;
    return `<div class="coupChk ${on?'on':''} ${dis?'dis':''}" data-coup="${c.id}"><div class="cx">${on?'✓':''}</div>
      <div style="min-width:0"><div class="cn">${T(c.nm)}</div>${dis?`<div class="cdis">${p2.bulkNeed}</div>`:''}</div>
      <div class="cv">${c.amt?('−'+yen(c.amt)):('−'+c.pct+'%')}</div></div>`;}).join('');
  // totals
  h+=`<div class="pricerow" style="margin-top:14px"><span>${p2.rowSub}</span><span>${yen(sub)}</span></div>`;
  if(contractDisc>0)h+=`<div class="pricerow"><span>${p2.rowContract} · ${T(ct.nm)}</span><span class="disc">− ${yen(contractDisc)}</span></div>`;
  if(couponDisc>0)h+=`<div class="pricerow"><span>${p2.rowCoupon}</span><span class="disc">− ${yen(couponDisc)}</span></div>`;
  h+=`<div class="pricerow tot"><span>${p2.rowTotal}</span><span>${yen(total)}</span></div><div class="coldnote">📦 ${p.moq}</div>`;
  // autonomy
  h+=`<div class="auto"><div class="blk-t">${p.autoT}</div><div class="autoseg">
    <button data-pauto="ask" class="${state.pauto==='ask'?'on':''}">${p.autoAsk}</button>
    <button data-pauto="stand" class="${state.pauto==='stand'?'on':''}">${p.autoStand.replace('{thr}',yen(2400))}</button></div>
    ${state.pauto==='stand'?`<div class="autonote">🤖 ${p.autoNote.replace('{thr}',yen(2400))}</div>`:''}</div>`;
  h+=`<button class="confirm" id="pcf" style="background:var(--brand)">📦 ${p.confirm} · ${yen(total)}</button>`;
  $('#main').innerHTML=`<div class="said"><div class="b">${state.planSaid}</div></div><div class="agent">${h}</div><button class="reset" id="rs">${p.reset}</button>`;
  $('#rs').onclick=()=>partnerHome(false);
  $$('[data-pd]').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;state.pqty[i]=Math.max(1,(state.pqty[i]||0)+(+b.dataset.pd));renderPlan();});
  $$('[data-prej]').forEach(b=>b.onclick=()=>{if(incl.length<=1)return;state.prej[+b.dataset.prej]=true;toast('🚫 '+p.rejected);renderPlan();});
  $$('[data-phist]').forEach(b=>b.onclick=()=>{const el=$('#hist-'+b.dataset.phist);if(el)el.style.display=el.style.display==='none'?'block':'none';});
  $$('[data-ctr]').forEach(b=>b.onclick=()=>{state.pcontract=b.dataset.ctr;renderPlan();});
  $$('[data-coup]').forEach(b=>b.onclick=()=>{const id=b.dataset.coup,c=PCOUPONS.find(x=>x.id===id);if(c.min&&cases<c.min){toast('⚠ '+p2.bulkNeed);return;}state.pcoupons[id]=!state.pcoupons[id];renderPlan();});
  $$('[data-pauto]').forEach(b=>b.onclick=()=>{state.pauto=b.dataset.pauto;renderPlan();});
  $('#pcf').onclick=()=>confirmRestock(total,cases);}
function confirmRestock(total,cases){const p=PBL();
  $('#main').innerHTML=`<div class="conf"><div class="big">📦</div><h3>${p.placed}</h3>
    <div class="line">${cases} ${p.caseU} · ${yen(total)}</div><div class="line">🚚 ${p.eta}</div>
    <div class="loop">${p.loop}</div></div><button class="reset" id="rs">${p.reset}</button>`;
  $('#rs').onclick=()=>partnerHome(false);toast('📦 '+p.placed);}

function runCompare(){if(state.running)return;const p=PBL(),p2=P2();
  let h=`<div class="said"><div class="b">${p2.cmpT}</div></div><div class="agent"><div class="ttl">🔎 ${p2.cmpPick}</div>
    <div class="cmppick">${PSKU.map((s,i)=>`<button class="cmpitem" data-cmp="${i}"><img src="${s.img}" width="26" height="26" alt="">${T(s.nm)}</button>`).join('')}</div>
    <div id="cmpzone"></div></div><button class="reset" id="rs">${p.reset}</button>`;
  $('#main').innerHTML=h;$('#rs').onclick=()=>partnerHome(false);
  $$('[data-cmp]').forEach(b=>b.onclick=()=>compareDetail(+b.dataset.cmp));}
function compareDetail(i){const p2=P2();const s=PSKU[i],alt=PSKU[ALT[i]],hm=HISTMAP[i];
  const rec=Math.max(6,(hm?hm.next:s.sold)-s.stock);
  const row=(lab,a,b)=>`<tr><td>${lab}</td><td>${a}</td><td class="rec">${b}</td></tr>`;
  const z=$('#cmpzone');z.innerHTML=`
    <div class="cmpdetail"><div class="cmphead"><img src="${s.img}" width="34" height="34" alt=""><div><div class="nm">${T(s.nm)}</div>
      <div style="font-size:11.5px;color:var(--muted)">${p2.dWpc} ${yen(s.wpc)} · ${p2.dStock} ${s.stock} · ${p2.dSold} ${s.sold}<span class="trend ${s.trend>=0?'up':'dn'}"> ${s.trend>=0?'▲':'▼'}${Math.abs(s.trend)}%</span></div></div></div>
    ${hm?`<div class="histgrid" style="margin:10px 0"><div class="histcell"><div class="histlab">${p2.histSame}</div><div class="histnum">${hm.same}<small>${p2.histUnit}</small></div></div>
      <div class="histcell"><div class="histlab">${p2.histNext}</div><div class="histnum up">${hm.next}<small>${p2.histUnit}</small></div></div></div>`:''}
    <div class="aijudge">🧠 <b>${p2.aiJudge}:</b> ${rec} ${p2.histUnit}（${p2.histNext} ${hm?hm.next:'-'} − ${p2.dStock} ${s.stock}）</div>
    <div class="blk-t" style="margin-top:12px">${p2.cmpVs}</div>
    <table class="cmp"><thead><tr><th></th><th>${T(s.nm)}</th><th class="reccol">${T(alt.nm)}</th></tr></thead><tbody>
      ${row(p2.rWpc,yen(s.wpc),yen(alt.wpc))}
      ${row(p2.rSold,s.sold,alt.sold)}
      ${row(p2.rTrend,(s.trend>=0?'+':'')+s.trend+'%',(alt.trend>=0?'+':'')+alt.trend+'%')}
      ${row(p2.rHistN,(HISTMAP[i]?HISTMAP[i].next:'-'),(HISTMAP[ALT[i]]?HISTMAP[ALT[i]].next:'-'))}
    </tbody></table>
    <button class="confirm" id="cmpAdd" style="background:var(--brand);margin-top:12px">＋ ${p2.addToPlan}</button></div>`;
  $('#cmpAdd').onclick=()=>{state.prej={};state.pqty={};state.pcontract='std';state.pcoupons={};state.planBase=[i];state.pqty[i]=rec;
    state.planSaid=`${T(s.nm)} — ${p2.addToPlan}`;state.planSummary=`🧠 ${p2.aiJudge}: ${rec} ${p2.histUnit}`;state.planSkip=false;pAgentRun(state.planSaid,renderPlan);};}

function runOrders(){if(state.running)return;const p=PBL(),p2=P2();
  const stMap={processing:p2.stProcessing,transit:p2.stTransit,delivered:p2.stDelivered,invoicing:p2.stInvoicing};
  const stCls={processing:'high',transit:'low',delivered:'ok',invoicing:'high'};
  let h=`<div class="said"><div class="b">${p2.cOrders}</div></div><div class="agent"><div class="ttl">📦 ${p2.ordT}</div>`;
  h+=PORDERS.map((o,i)=>`<div class="ordcard"><div class="ordtop"><span class="ordno">${o.no}</span><span class="pill ${stCls[o.status]}">${stMap[o.status]}</span></div>
    <div class="orditems">${T(o.items)}</div>
    <div class="track">${p2.trackSteps.map((ts,k)=>`<div class="tstep ${k<=o.step?'on':''}"><div class="tdot"></div><span>${ts}</span></div>`).join('<div class="tline"></div>')}</div>
    <div class="ordeta">🚚 ${p2.ordEta}: ${T(o.eta)}</div></div>`).join('');
  h+=`</div><button class="reset" id="rs">${p.reset}</button>`;
  $('#main').innerHTML=h;$('#rs').onclick=()=>partnerHome(false);}

function runInvoice(){if(state.running)return;const p=PBL(),p2=P2();
  let h=`<div class="said"><div class="b">${p2.cInvoice}</div></div><div class="agent"><div class="ttl">🧾 ${p2.invT}</div>
    <div class="coldnote" style="margin-bottom:8px">${p2.invReg}</div>`;
  h+=PORDERS.map((o,i)=>`<div class="ordcard"><div class="ordtop"><span class="ordno">${o.no}</span><span style="font-size:11.5px;color:var(--muted)">${o.when}</span></div>
    <div class="orditems">${T(o.items)}</div>
    <div class="invbtns"><button class="invb prim" data-inv="${i}">${p2.reqInvoiceBtn}</button><button class="invb" data-rec="${i}">${p2.reqReceiptBtn}</button></div>
    <div class="invdone" id="invdone-${i}"></div></div>`).join('');
  h+=`</div><button class="reset" id="rs">${p.reset}</button>`;
  $('#main').innerHTML=h;$('#rs').onclick=()=>partnerHome(false);
  $$('[data-inv]').forEach(b=>b.onclick=()=>{const i=+b.dataset.inv;const no='INV-'+PORDERS[i].no.slice(3);
    $('#invdone-'+i).innerHTML=`<div class="autonote" style="margin-top:8px">✅ ${p2.invIssued} · ${p2.invNo} ${no}</div>`;toast('🧾 '+p2.invIssued);});
  $$('[data-rec]').forEach(b=>b.onclick=()=>{const i=+b.dataset.rec;$('#invdone-'+i).innerHTML=`<div class="autonote" style="margin-top:8px">✅ ${p2.invIssued}</div>`;toast('✅');});}

function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brand').innerHTML=b.logo+(b.sup?`<sup>${b.sup}</sup>`:'');
  $('#lineBadge').style.display=state.brand==='blackmores'?'inline-flex':'none';}
function applyText(){$('#sub').textContent=U().sub;
  document.documentElement.lang=state.lang;state.running=false;renderApp();}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

$('#fab').onclick=()=>{const k=Object.keys(BRANDS);const i=k.indexOf(state.brand);state.brand=k[(i+1)%k.length];applyBrand();renderApp();toast('🎨 '+BRANDS[state.brand].name);};
$$('#modeseg button').forEach(b=>b.onclick=()=>{if(state.audience===b.dataset.aud)return;state.audience=b.dataset.aud;state.running=false;renderApp();});
const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();applyText();};box.appendChild(b);});}
renderLangs();

const MARKETS=["ANZ","CN","SEA","JP"];
try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_l=_p.get("lang"),_m=_p.get("market");
  if(_b&&BRANDS[_b])state.brand=_b;if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;
  state.market=(_m&&MARKETS.indexOf(_m)>=0)?_m:"ANZ";}catch(e){state.market="ANZ";}
/* inbound market sync from the Studio shell → re-render with new currency */
window.addEventListener("message",function(e){try{var d=e.data;if(!d||d.t!=="es")return;var changed=false;if(d.market&&MARKETS.indexOf(d.market)>=0&&d.market!==state.market){state.market=d.market;changed=true;}if(d.lang&&["en","zh","ja","th"].indexOf(d.lang)>=0&&d.lang!==state.lang){state.lang=d.lang;changed=true;}if(d.brand&&BRANDS[d.brand]&&d.brand!==state.brand){state.brand=d.brand;changed=true;}if(changed){state.running=false;renderApp();}}catch(err){}});
applyBrand();applyText();renderLangs();
(function(){var _l="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"")+"|"+(state.market||"");if(c!==_l){_l=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null,market:state.market||null},"*");}}catch(e){}},400);})();
</script>
<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent=".langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
</body>
</html>
