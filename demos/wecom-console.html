<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeCom Console · General Mills · Experience Studio</title>
<style>
  :root{
    --brand:#009BA4; --brand-d:#007A82; --soft:#e0f2f3; --accent:#E91E63;
    --ink:#16201f; --muted:#6a7472; --bg:#f4f7fb; --card:#fff; --line:#e6ecf2;
    --neg:#c0563f; --warn:#b5731a; --ok:#077a3c; --black:#0b1320;
    --display:Georgia,'Times New Roman','Hiragino Mincho ProN','Songti SC',serif;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','PingFang SC','Microsoft YaHei','Thonburi','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  /* desktop console top bar */
  header{background:var(--black);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:12px;max-width:1180px;margin:0 auto;padding:12px 20px}
  .wm{width:30px;height:30px;border-radius:8px;background:var(--brand);display:grid;place-items:center;font-size:16px;flex-shrink:0}
  .brand{font-family:var(--display);font-weight:700;font-size:18px;color:#fff;letter-spacing:.02em}.brand sup{font-size:9px;color:var(--brand)}
  .sub{font-size:11px;color:#9fb4c8;border-left:1px solid #2a3647;padding-left:12px;letter-spacing:.04em}.sp{flex:1}
  .who{display:flex;align-items:center;gap:8px;color:#cbd6e3;font-size:11.5px;background:rgba(255,255,255,.05);border:1px solid #2a3647;border-radius:9px;padding:5px 10px}
  .who .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800}
  .langs{display:flex;gap:3px;background:rgba(255,255,255,.06);border:1px solid #2a3647;border-radius:9px;padding:3px}
  .langs button{border:0;background:0;font:inherit;font-size:12px;font-weight:700;color:#9fb4c8;min-width:30px;padding:5px 8px;border-radius:6px;transition:.15s}
  .langs button.on{background:#fff;color:var(--brand-d)}

  /* WeCom explainer strip */
  .explain{background:linear-gradient(90deg,var(--soft),#fff);border-bottom:1px solid var(--line)}
  .explain .in{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;gap:13px;align-items:center}
  .explain .ic{width:34px;height:34px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:17px;flex-shrink:0}
  .explain .tx{font-size:12.5px;color:var(--ink)}
  .explain .tx b{color:var(--brand-d)}
  .explain .tx .ww{font-weight:800}

  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 70px}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);font-weight:700}
  h1.h{font-family:var(--display);font-weight:400;font-size:clamp(20px,3.4vw,26px);margin:7px 0 5px;line-height:1.18}
  .lead{color:var(--muted);font-size:13px;max-width:78ch}

  /* tab bar */
  .tabs{display:flex;gap:4px;margin:18px 0 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tabs button{border:0;background:0;font:inherit;font-size:13.5px;font-weight:700;color:var(--muted);padding:11px 14px;border-bottom:2px solid transparent;display:flex;gap:7px;align-items:center}
  .tabs button.on{color:var(--brand);border-color:var(--brand)}
  .tabs .cnt{font-size:11px;background:var(--soft);color:var(--brand-d);border-radius:999px;padding:1px 8px;font-weight:800}

  .pane{display:none}.pane.on{display:block;animation:fin .3s ease}
  @keyframes fin{from{opacity:0;transform:translateY(6px)}}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
  .layerlab{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:2px 0 11px}

  /* toolrow */
  .toolrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .srch{flex:1;min-width:180px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
  .srch input{border:0;outline:0;font:inherit;font-size:13px;width:100%;background:0;color:var(--ink)}
  .chipf{display:flex;gap:6px;flex-wrap:wrap}
  .chipf button{border:1px solid var(--line);background:var(--card);font:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:999px}
  .chipf button.on{border-color:var(--brand);background:var(--soft);color:var(--brand-d)}

  /* SCRM split */
  .split{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
  @media(max-width:880px){.split{grid-template-columns:1fr}}
  .clist{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto}
  .crow{display:flex;gap:11px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px 11px;cursor:pointer;transition:.15s;background:var(--card)}
  .crow:hover{border-color:var(--brand)}
  .crow.on{border-color:var(--brand);background:var(--soft)}
  .crow .av{width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex-shrink:0}
  .crow.risk .av{background:var(--neg)}.crow.new .av{background:var(--accent)}
  .crow .cb{flex:1;min-width:0}
  .crow .cn{font-weight:700;font-size:13.5px}
  .crow .cm{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stg{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;border-radius:6px;padding:2px 7px;flex-shrink:0}
  .stg.new{background:#fdecf3;color:var(--accent)}.stg.active{background:#eafaf0;color:var(--ok)}.stg.risk{background:#fdecea;color:var(--neg)}
  .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .tag{font-size:10px;font-weight:700;background:var(--soft);color:var(--brand-d);border-radius:5px;padding:2px 7px}
  /* detail */
  .dhead{display:flex;gap:13px;align-items:center;margin-bottom:14px}
  .dhead .av{width:54px;height:54px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px;flex-shrink:0}
  .dhead.risk .av{background:var(--neg)}.dhead.new .av{background:var(--accent)}
  .dhead .dn{font-family:var(--display);font-size:19px}
  .dhead .dm{font-size:12px;color:var(--muted);margin-top:2px}
  .qrsrc{display:flex;gap:10px;align-items:center;background:var(--soft);border:1px dashed var(--brand);border-radius:11px;padding:10px 12px;margin-bottom:13px}
  .qrsrc .qr{width:40px;height:40px;flex-shrink:0}
  .qrsrc .qt{font-size:11.5px;color:var(--brand-d);font-weight:700}
  .qrsrc .qs{font-size:11px;color:var(--muted)}
  .dlab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:13px 0 8px}
  .ohist{display:flex;flex-direction:column;gap:7px}
  .orow{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .orow img{width:30px;height:30px;flex-shrink:0}
  .orow .on{font-weight:700;font-size:12.5px}.orow .od{font-size:10.5px;color:var(--muted)}
  .orow .op{margin-left:auto;font-weight:800;font-size:12.5px;color:var(--brand-d)}
  .ai{background:linear-gradient(135deg,#fff,var(--soft));border:1px solid var(--brand);border-radius:12px;padding:13px;margin-top:6px}
  .ai .al{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--brand-d);display:flex;align-items:center;gap:6px}
  .ai .at{font-size:13px;font-weight:600;margin:7px 0 10px}
  .ai .at b{color:var(--accent)}
  .btn{border:0;background:var(--brand);color:#fff;font:inherit;font-weight:700;font-size:13px;padding:10px 15px;border-radius:11px}
  .btn.o{background:var(--soft);color:var(--brand)}
  .btn.sm{padding:8px 12px;font-size:12px}
  .btn:disabled{opacity:.5}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:50px 20px}

  /* content push grid */
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px}
  .asset{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);display:flex;flex-direction:column}
  .asset .pv{height:108px;display:grid;place-items:center;font-size:40px;position:relative}
  .asset .pv.imm{background:linear-gradient(135deg,#e0f2f3,#b8e6e8)}
  .asset .pv.prod{background:linear-gradient(135deg,#fdecf3,#f8cfe0)}
  .asset .pv.camp{background:linear-gradient(135deg,#fff4e0,#ffe0b8)}
  .asset .pv.edu{background:linear-gradient(135deg,#e8f0fb,#cfe0f8)}
  .asset .ab{padding:11px 12px;flex:1;display:flex;flex-direction:column}
  .asset .acat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--brand-d)}
  .asset .an{font-weight:700;font-size:13px;margin:5px 0 4px;line-height:1.3}
  .asset .ad{font-size:11px;color:var(--muted);flex:1}
  .appr{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;border-radius:6px;padding:3px 8px;margin-top:8px;width:fit-content}
  .appr.ok{background:#eafaf0;color:var(--ok)}.appr.rev{background:#fff4e0;color:var(--warn)}
  .ashares{font-size:10.5px;color:var(--muted);margin-top:8px}
  .arow2{display:flex;gap:7px;margin-top:9px}
  .arow2 .btn{flex:1;text-align:center}

  /* assisted ordering */
  .ord{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
  @media(max-width:880px){.ord{grid-template-columns:1fr}}
  .recline{font-size:11.5px;color:var(--brand-d);font-weight:700;background:var(--soft);border-radius:9px;padding:8px 11px;margin-bottom:12px;display:flex;gap:7px;align-items:center}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
  .pcard{border:1px solid var(--line);border-radius:13px;padding:11px;text-align:center;background:var(--card);position:relative}
  .pcard.rec{border-color:var(--accent);box-shadow:0 0 0 2px rgba(233,30,99,.12)}
  .pcard .recb{position:absolute;top:7px;right:7px;font-size:9px;font-weight:800;background:var(--accent);color:#fff;border-radius:5px;padding:2px 6px}
  .pcard img{width:54px;height:54px;margin:4px auto}
  .pcard .pn{font-weight:700;font-size:12.5px;margin-top:4px;line-height:1.25}
  .pcard .pp{font-size:12px;color:var(--brand-d);font-weight:800;margin:5px 0 8px}
  .pcard .add{border:1px solid var(--brand);background:var(--soft);color:var(--brand-d);font:inherit;font-weight:700;font-size:11.5px;padding:6px 0;border-radius:8px;width:100%}
  .pcard .add:hover{background:var(--brand);color:#fff}
  .cart{position:sticky;top:80px}
  .citem{display:flex;gap:9px;align-items:center;border-bottom:1px solid var(--line);padding:9px 0}
  .citem:last-of-type{border-bottom:0}
  .citem img{width:30px;height:30px;flex-shrink:0}
  .citem .ci{flex:1;min-width:0}
  .citem .cin{font-weight:700;font-size:12px}.citem .cip{font-size:11px;color:var(--muted)}
  .qty{display:flex;align-items:center;gap:6px}
  .qty button{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--card);font-weight:800;color:var(--brand-d);font-size:13px;line-height:1}
  .qty span{min-width:16px;text-align:center;font-weight:700;font-size:12.5px}
  .crm{margin-left:4px;border:0;background:0;color:var(--muted);font-size:13px}
  .cside{display:flex;justify-content:space-between;font-size:12.5px;margin:7px 0}
  .cside.tot{font-weight:800;font-size:15px;border-top:1px solid var(--line);padding-top:9px;margin-top:9px}
  .cside.disc{color:var(--accent);font-weight:700}
  .coupon{display:flex;gap:8px;align-items:center;background:#fdecf3;border:1px dashed var(--accent);border-radius:10px;padding:9px 11px;margin:11px 0;font-size:11.5px;color:var(--accent);font-weight:700}
  .paylink{background:var(--soft);border:1px solid var(--brand);border-radius:11px;padding:12px;margin-top:11px;text-align:center;display:none}
  .paylink.show{display:block;animation:fin .3s}
  .paylink .pq{width:84px;height:84px;margin:4px auto 8px}
  .paylink .pst{font-size:11.5px;font-weight:800;color:var(--ok)}
  .paylink .plk{font-size:10.5px;color:var(--muted);word-break:break-all;margin-top:4px}

  /* dashboard */
  .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px}
  @media(max-width:880px){.kgrid{grid-template-columns:1fr 1fr}}
  .kc{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px}
  .kc .kl{font-size:10.5px;color:var(--muted);font-weight:700}
  .kc b{font-family:var(--display);font-size:25px;display:block;line-height:1.1;margin-top:5px}
  .kc .kt{font-size:10.5px;font-weight:800;margin-top:4px}.kt.up{color:var(--ok)}.kt.dn{color:var(--neg)}
  .dash2{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;align-items:start}
  @media(max-width:880px){.dash2{grid-template-columns:1fr}}
  .lbrow{display:flex;gap:11px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .lbrow:last-child{border-bottom:0}
  .lbrow .rk{width:24px;height:24px;border-radius:50%;background:var(--soft);color:var(--brand-d);display:grid;place-items:center;font-weight:800;font-size:11px;flex-shrink:0}
  .lbrow .rk.g1{background:#ffe9a8;color:#8a6d00}.lbrow .rk.g2{background:#e3e8ee;color:#5a6573}.lbrow .rk.g3{background:#f6dcc2;color:#8a5a2a}
  .lbrow .ln{flex:1;min-width:0}.lbrow .lnm{font-weight:700;font-size:12.5px}.lbrow .lst{font-size:10.5px;color:var(--muted)}
  .lbrow .bb{flex:1;height:11px;background:var(--soft);border-radius:5px;overflow:hidden;max-width:130px}.lbrow .bb i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-d))}
  .lbrow .lv{font-weight:800;font-size:12.5px;color:var(--brand-d);min-width:54px;text-align:right}
  .funnel{display:flex;flex-direction:column;gap:9px}
  .fstep{display:flex;align-items:center;gap:11px}
  .fstep .fbar{flex:1;height:34px;border-radius:9px;background:linear-gradient(90deg,var(--brand),var(--brand-d));display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:800;font-size:13px}
  .fstep .flab{min-width:120px;font-size:12px;font-weight:700}
  .fstep .fpct{font-size:11px;color:var(--muted);min-width:46px;text-align:right;font-weight:700}

  /* community */
  .ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
  .gcard{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--card)}
  .gcard .gh{display:flex;gap:10px;align-items:center;margin-bottom:9px}
  .gcard .gi{width:40px;height:40px;border-radius:11px;background:var(--soft);display:grid;place-items:center;font-size:20px;flex-shrink:0}
  .gcard .gn{font-weight:700;font-size:13.5px}.gcard .gm{font-size:11px;color:var(--muted)}
  .gchal{font-size:11.5px;background:var(--soft);border-radius:9px;padding:8px 10px;margin:9px 0;color:var(--brand-d);font-weight:600}
  .gact{display:flex;gap:7px}

  /* donut */
  .donutwrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .dleg{display:flex;flex-direction:column;gap:7px}
  .dleg .dl2{display:flex;align-items:center;gap:8px;font-size:12px}
  .dleg .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;font-weight:600;z-index:90;opacity:0;transition:.3s;max-width:90vw}
  .toast.show{transform:translateX(-50%);opacity:1}
  .fab{position:fixed;right:18px;bottom:18px;width:50px;height:50px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:20px;box-shadow:0 8px 22px rgba(0,0,0,.2);z-index:40;border:0}
</style>
<link rel="stylesheet" href="gm-demo-theme.css">
<script defer src="gm-demo-brand.js"></script>
</head>
<body>
<header><div class="nav">
  <div class="wm">💬</div>
  <div class="brand" id="brand">General Mills<sup>®</sup></div>
  <div class="sub" id="sub">WeCom Console</div><div class="sp"></div>
  <div class="who"><span class="av">LW</span><span id="whoTxt">Staff · retail store Warehouse Sydney</span></div>
  <div class="langs" id="langs"></div>
</div></header>

<div class="explain"><div class="in">
  <div class="ic">📖</div>
  <div class="tx" id="explainTxt"></div>
</div></div>

<div class="wrap">
  <div class="eyebrow" id="eye">Private Traffic · Staff Backend</div>
  <h1 class="h" id="title"></h1>
  <div class="lead" id="lead"></div>

  <div class="tabs" id="tabs"></div>

  <!-- SCRM -->
  <div class="pane on" id="pane-scrm">
    <div class="toolrow">
      <div class="srch">🔍 <input id="scrmSearch" placeholder="Search"></div>
      <div class="chipf" id="scrmFilter"></div>
    </div>
    <div class="split">
      <div class="clist" id="clist"></div>
      <div class="panel" id="cdetail"></div>
    </div>
  </div>

  <!-- Content Push -->
  <div class="pane" id="pane-content">
    <div class="toolrow"><div class="chipf" id="contentFilter"></div></div>
    <div class="cgrid" id="cgrid"></div>
  </div>

  <!-- Assisted Ordering -->
  <div class="pane" id="pane-order">
    <div class="recline" id="recline"></div>
    <div class="ord">
      <div>
        <div class="layerlab" id="catalogLab"></div>
        <div class="pgrid" id="pgrid"></div>
      </div>
      <div class="panel cart" id="cartPanel"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="pane" id="pane-dash">
    <div class="kgrid" id="kgrid"></div>
    <div class="dash2">
      <div class="panel">
        <div class="layerlab" id="lbLab"></div>
        <div id="lbList"></div>
      </div>
      <div class="panel">
        <div class="layerlab" id="funLab"></div>
        <div class="funnel" id="funnel"></div>
        <div class="layerlab" style="margin-top:18px" id="mixLab"></div>
        <div class="donutwrap"><div id="donut"></div><div class="dleg" id="dleg"></div></div>
      </div>
    </div>
  </div>

  <!-- Community -->
  <div class="pane" id="pane-comm">
    <div class="ggrid" id="ggrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" id="fab" title="brand">🎨</button>

<script>
const BRANDS={
  generalmills:{logo:"General Mills",sup:"®",name:"General Mills",c:["#009BA4","#007A82","#e0f2f3","#E91E63"]},
  bioceuticals:{logo:"BioCeuticals",sup:"",name:"BioCeuticals",c:["#1b3a5c","#10243a","#e7edf3","#c9a24a"]},
  family:{logo:"General Mills Family",sup:"",name:"General Mills Family",c:["#d63a2f","#a82a22","#fbe7e5","#1f9d57"]}};
const L=o=>o[state.lang]||o.en||o.zh;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const IMG="images/gm/gm-ai-foundation.jpg";

const T={
 sub:{en:"WeCom Console",zh:"企业微信控制台",ja:"WeCom コンソール",th:"คอนโซล WeCom"},
 who:{en:"Staff · retail store Warehouse Sydney",zh:"店员 · retail store Warehouse 悉尼",ja:"スタッフ · retail store Warehouse シドニー",th:"พนักงาน · retail store Warehouse Sydney"},
 explain:{

// ---- SCRM ----
function renderScrm(){
  const filters=[["all",L(T.fAll)],["new",L(T.fNew)],["active",L(T.fActive)],["risk",L(T.fRisk)]];
  $('#scrmFilter').innerHTML=filters.map(([k,l])=>`<button data-f="${k}" class="${state.scrmF===k?'on':''}">${l}</button>`).join('');
  $$('#scrmFilter button').forEach(b=>b.onclick=()=>{state.scrmF=b.dataset.f;renderScrm();});
  const sb=$('#scrmSearch');if(sb&&sb.value!==state.scrmQ)sb.value=state.scrmQ;
  if(sb)sb.oninput=()=>{state.scrmQ=sb.value;renderScrmList();};
  renderScrmList();renderCustDetail();
}
function custMatches(c){
  if(state.scrmF!=='all'&&c.stage!==state.scrmF)return false;
  const q=state.scrmQ.trim().toLowerCase();
  if(!q)return true;
  const hay=[L(c.nm),L(c.goal),...c.tags.map(t=>L(t))].join(' ').toLowerCase();
  return hay.indexOf(q)>=0;
}
function renderScrmList(){
  const list=CUSTOMERS.filter(custMatches);
  if(!list.length){$('#clist').innerHTML=`<div class="empty">—</div>`;return;}
  $('#clist').innerHTML=list.map(c=>{
    const stg=c.stage,sl=stg==='new'?L(T.stgNew):(stg==='active'?L(T.stgActive):L(T.stgRisk));
    return `<div class="crow ${stg} ${state.cust===c.id?'on':''}" data-id="${c.id}">
      <div class="av">${c.init}</div>
      <div class="cb"><div class="cn">${L(c.nm)}</div>
        <div class="cm">${L(c.goal)} · ${L(T.lastOrder)} ${c.lastDays}d</div>
        <div class="tags">${c.tags.map(t=>`<span class="tag">${L(t)}</span>`).join('')}</div></div>
      <span class="stg ${stg}">${sl}</span></div>`;
  }).join('');
  $$('.crow').forEach(el=>el.onclick=()=>{state.cust=+el.dataset.id;renderScrm();});
}

      <div class="lv">¥${s.gmv}k</div></div>`;
  }).join('');
  $('#funLab').textContent=L(T.funLab);
  const fun=[{l:L(T.fScan),v:4820,p:100},{l:L(T.fAdd),v:2640,p:55},{l:L(T.fProfile),v:1810,p:38},{l:L(T.fOrder),v:1140,p:24}];
  $('#funnel').innerHTML=fun.map(f=>`<div class="fstep"><div class="flab">${f.l}</div>
    <div class="fbar" style="width:${f.p}%">${f.v.toLocaleString()}</div><div class="fpct">${f.p}%</div></div>`).join('');
  // donut: lifecycle mix
  $('#mixLab').textContent=L(T.mixLab);
  const seg=[{l:L(T.fNew),v:34,c:"var(--accent)"},{l:L(T.fActive),v:48,c:"var(--brand)"},{l:L(T.fRisk),v:18,c:"var(--neg)"}];
  let acc=0;const R=46,C=2*Math.PI*R;
  const arcs=seg.map(s=>{const len=C*s.v/100;const dash=`${len} ${C-len}`;const off=-C*acc/100;acc+=s.v;
    return `<circle r="${R}" cx="60" cy="60" fill="none" stroke="${s.c}" stroke-width="18" stroke-dasharray="${dash}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/>`;}).join('');
  $('#donut').innerHTML=`<svg viewBox="0 0 120 120" width="120" height="120">${arcs}
    <text x="60" y="58" text-anchor="middle" font-family="var(--display)" font-size="20" fill="var(--ink)">1,260</text>
    <text x="60" y="74" text-anchor="middle" font-size="9" fill="var(--muted)">${L(T.kPriv)}</text></svg>`;
  $('#dleg').innerHTML=seg.map(s=>`<div class="dl2"><span class="sw" style="background:${s.c}"></span>${s.l} · <b>${s.v}%</b></div>`).join('');
}

// ---- Community ----
function renderComm(){
  $('#ggrid').innerHTML=GROUPS.map(g=>`<div class="gcard">
    <div class="gh"><div class="gi">${g.icon}</div><div><div class="gn">${L(g.nm)}</div>
      <div class="gm">${g.m} ${L(T.members)}</div></div></div>
    <div class="gchal">🏆 ${L(T.challenge)}: ${L(g.chal)}</div>
    <div class="gact"><button class="btn sm" data-bc="${g.id}">${L(T.broadcast)}</button>
      <button class="btn o sm" data-mg="${g.id}">${L(T.manage)}</button></div></div>`).join('');
  $$('[data-bc]').forEach(b=>b.onclick=()=>toast(L(T.broadcastDone)));
  $$('[data-mg]').forEach(b=>b.onclick=()=>{state.tab='content';sync();});
}

// ---- chrome ----
function toast(m){const t=$('#toast');t.innerHTML=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function applyBrand(){const b=BRANDS[state.brand],r=document.documentElement.style;
  r.setProperty('--brand',b.c[0]);r.setProperty('--brand-d',b.c[1]);r.setProperty('--soft',b.c[2]);r.setProperty('--accent',b.c[3]);
  $('#brand').innerHTML=b.logo+(b.sup?`<sup>${b.sup}</sup>`:'');}
$('#fab').onclick=()=>{const k=Object.keys(BRANDS),i=k.indexOf(state.brand);state.brand=k[(i+1)%k.length];applyBrand();toast('🎨 '+BRANDS[state.brand].name);};

const LANGS=[['en','EN'],['zh','中'],['ja','日'],['th','ไท']];
function renderLangs(){const box=$('#langs');box.innerHTML='';LANGS.forEach(([k,lab])=>{const b=document.createElement('button');b.textContent=lab;if(k===state.lang)b.className='on';b.onclick=()=>{state.lang=k;renderLangs();sync();};box.appendChild(b);});}
try{var _p=new URLSearchParams(location.search),_b=_p.get("brand"),_l=_p.get("lang");
  if(_l&&["en","zh","ja","th"].indexOf(_l)>=0)state.lang=_l;if(_b&&BRANDS[_b])state.brand=_b;}catch(e){}
renderLangs();applyBrand();sync();
// brand/lang sync up to studio shell
(function(){var _last="";setInterval(function(){try{if(typeof state==="undefined")return;var c=(state.brand||"")+"|"+(state.lang||"");if(c!==_last){_last=c;if(window.parent&&window.parent!==window)window.parent.postMessage({t:"es",brand:state.brand||null,lang:state.lang||null},"*");}}catch(e){}},400);})();
</script>
<script>/*__studioEmbedControls*/(function(){try{if(window.self!==window.top||new URLSearchParams(location.search).get("embed")==="1"){var s=document.createElement("style");s.textContent=".langs,#langs,.langsw,#langsw,.language-switcher,[data-studio-lang]{display:none!important}";(document.head||document.documentElement).appendChild(s);}}catch(e){}})();</script>
